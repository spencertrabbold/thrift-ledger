    // sending it for the rest of the session. Independent of structuredOutputsBroken:
    // a 400 naming "format" drops format; a 400 naming "effort" drops effort.
    let effortBroken = false;

    // SPE-24 fix 5: diagnostics from the most recent successful API extraction
    // (extractionPath / formatSent / effortSent / stopReason / continuations /
    // elapsedMs). generateApi sets it just before returning the draft; generate()
    // clears it at the start of each call so a stale record can't leak into a later
    // builtin/mock success. GenQueue reads it via getLastGenDiag() to build the
    // lastSuccess debug record.
    let lastGenDiag = null;
    function getLastGenDiag() { return lastGenDiag; }

    // SPE-22 test seam. Tests import/override the timeout constants without shipping
    // shortened values. Not part of the production flow.
    function __setTimeouts(perRequestMs, overallMs) {
      if (typeof perRequestMs === "number") API_TIMEOUT_MS = perRequestMs;
      if (typeof overallMs === "number") API_OVERALL_BUDGET_MS = overallMs;
    }
    function __getTimeouts() {
      return { perRequest: API_TIMEOUT_MS, overall: API_OVERALL_BUDGET_MS };
    }

    // JSON schema for the listing. NOTE (SPE-20): no numeric constraints
    // (minimum/maximum) or minLength — those are unsupported by structured
    // outputs and would 400.
    const LISTING_OUTPUT_CONFIG = {
      format: {
        type: "json_schema",
        schema: {
          type: "object",
          properties: {
            title: { type: "string" },
            description: { type: "string" },
            suggestedPrice: { type: "number" },
            platforms: {
              type: "object",
              properties: {
                poshmark: { type: "string" },
                ebay: { type: "string" },
                mercari: { type: "string" },
                depop: { type: "string" }
              },
              required: ["poshmark", "ebay", "mercari", "depop"],
              additionalProperties: false
            }
          },
          required: ["title", "description", "suggestedPrice", "platforms"],
          additionalProperties: false
        }
      }
    };

    // Map a fetch/HTTP failure to a friendly, user-facing message.
    function apiErrorMessage(status) {
      if (status === 401) return "API key looks invalid — check it in Settings.";
      if (status === 429) return "Rate limited — wait a minute and retry.";
      if (status === 529 || (status >= 500 && status < 600)) return "Anthropic is busy — try again.";
      return "The AI request failed (HTTP " + status + "). Try again.";
    }

    // One POST to /v1/messages with a per-request AbortController deadline
    // (API_TIMEOUT_MS, 180s — SPE-22). `body` is the full request object. Returns
    // the parsed JSON response, or throws an Error whose message is already
    // user-friendly. Every thrown error is tagged with `err.kind`
    // ("timeout" | "http" | "network") and `err.elapsedMs` so the caller can
    // capture debug on every failure path (SPE-22).
    async function apiRequest(key, body) {
      const controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
      let timer = null;
      if (controller) timer = setTimeout(function () { controller.abort(); }, API_TIMEOUT_MS);
      const startedAt = Date.now();
      let res;
      try {
        res = await fetch(ANTHROPIC_API_URL, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-api-key": key,
            "anthropic-version": ANTHROPIC_VERSION,
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify(body),
          signal: controller ? controller.signal : undefined
        });
      } catch (e) {
        if (timer) clearTimeout(timer);
        if (e && e.name === "AbortError") {
          // SPE-22: our own 180s deadline fired mid-research.
          const err = new Error("Research timed out — busy network or a complex item. Tap Retry.");
          err.kind = "timeout";
          err.elapsedMs = Date.now() - startedAt;
          throw err;
        }
        const err = new Error("Couldn't reach Anthropic — check your connection and retry.");
        err.kind = "network";
        err.rawMessage = (e && e.message) ? String(e.message) : String(e);
        err.elapsedMs = Date.now() - startedAt;
        throw err;
      }
      if (timer) clearTimeout(timer);
      if (!res.ok) {
        // Read the body so callers can inspect the error (SPE-20: detect a 400
        // that names output_config/format/effort so we can retry without it). We
        // still surface a friendly message; the raw text rides along on err.apiBody.
        let bodyText = "";
        try { bodyText = await res.text(); } catch (_) {}
        const err = new Error(apiErrorMessage(res.status));
        err.kind = "http";
        err.apiStatus = res.status;
        err.apiBody = bodyText;
        err.elapsedMs = Date.now() - startedAt;
        throw err;
      }
      try {
        return await res.json();
      } catch (e) {
        const err = new Error("The AI returned an unreadable response. Try again.");
        err.kind = "http";
        err.apiStatus = res.status;
        err.apiBody = "";
        err.elapsedMs = Date.now() - startedAt;
        throw err;
      }
    }

    // SPE-20/22: does this 400 name "format" (or output_config)? If so we retry once
    // without structured outputs and remember it for the session. SPE-22: we now
    // inspect WHICH field the 400 names — a 400 naming "effort" is handled by
    // isEffortError below and drops effort independently, so a format-only fallback
    // doesn't accidentally fire on an effort 400 (and vice versa).
    // SPE-24 fix 2: NARROWED. Previously any 400 body containing "format" tripped
    // structuredOutputsBroken for the whole session — far too broad (a validation
    // error mentioning a "format" of some unrelated field would wrongly disable
    // structured outputs). Now we require the body to name output_config
    // specifically, which is where our format lives. Logs a warn when it trips
    // (done at the call site).
    function isOutputConfigError(err) {
      if (!err || err.apiStatus !== 400) return false;
      return /output_config/i.test(err.apiBody || "");
    }
    // SPE-22 / SPE-24 fix 2: does this 400 name "effort" AND clearly point at our
    // output_config? Effort lives inside output_config, so a bare "effort" mention
    // anywhere in the body is not enough — we require /effort/i AND either
    // output_config is also named or the error's param path names effort
    // (e.g. "output_config.effort"). Drops effort for the session (independent of
    // the structured-outputs fallback).
    function isEffortError(err) {
      if (!err || err.apiStatus !== 400) return false;
      const body = (err.apiBody || "");
      if (!/effort/i.test(body)) return false;
      return /output_config/i.test(body) || /output_config\.effort|["']?effort["']?\s*(?:field|param|parameter|:)/i.test(body);
    }

    // SPE-22: request metadata attached to EVERY debug snapshot so a failure report
    // always says what we sent (model, web-search cap, whether effort/format rode
    // along). Never contains the API key.
    function requestMeta(useStructured, effortSent) {
      return {
        model: ANTHROPIC_MODEL,
        maxUses: 4,                                  // web_search_20260209 max_uses
        effortSent: effortSent || null,              // "medium" | null (dropped/skip)
        formatSent: !!useStructured                  // did output_config.format ride along?
      };
    }

    // SPE-24 fix 5: the debug blob is now an OBJECT with two independent slots:
    //   { lastFailure: {...}|null, lastSuccess: {...}|null }
    // so a success record doesn't wipe the last failure and vice versa (the field
    // team needs both to tell whether structured outputs are actually driving
    // results). We keep an in-memory cache so the async read-modify-write can't lose
    // the other slot under back-to-back writes. All fire-and-forget; never throws;
    // never contains the API key.
    let debugCache = null;   // { lastFailure, lastSuccess } once loaded/written
    function ensureDebugCache() {
      if (debugCache) return Promise.resolve(debugCache);
      return Storage.get(AI_DEBUG_STORAGE).then(function (v) {
        if (v && typeof v === "object" && ("lastFailure" in v || "lastSuccess" in v)) {
          debugCache = { lastFailure: v.lastFailure || null, lastSuccess: v.lastSuccess || null };
        } else if (v && typeof v === "object") {
          // Legacy flat snapshot (pre-SPE-24): treat it as the last failure.
          debugCache = { lastFailure: v, lastSuccess: null };
        } else {
          debugCache = { lastFailure: null, lastSuccess: null };
        }
        return debugCache;
      }).catch(function () {
        debugCache = { lastFailure: null, lastSuccess: null };
        return debugCache;
      });
    }
    function writeDebugSlot(slot, snapshot) {
      // slot: "lastFailure" | "lastSuccess". Merge into the cache, then persist the
      // whole object. Guard everything — debug capture must never break the flow.
      try {
        ensureDebugCache().then(function (cache) {
          try {
            cache[slot] = snapshot;
            Storage.set(AI_DEBUG_STORAGE, { lastFailure: cache.lastFailure || null, lastSuccess: cache.lastSuccess || null });
          } catch (_) {}
        }).catch(function () {});
      } catch (_) {}
    }

    // SPE-24 fix 5: record a compact success snapshot alongside any lastFailure.
    function recordSuccess(fields) {
      try {
        const snapshot = Object.assign(
          { when: new Date().toISOString(), appVersion: APP_VERSION },
          fields || {}
        );
        writeDebugSlot("lastSuccess", snapshot);
      } catch (_) { /* never throw */ }
    }

    // SPE-20/22: persist a redacted debug snapshot of a failed/rejected generation so
    // the user can copy it back to the developer. Overwrites the lastFailure slot
    // each time; the API key is never part of `response`/`meta`, so nothing
    // sensitive is stored. This is the RICH parse/empty-draft path — it keeps the
    // response content dump.
    function captureAiDebug(response, meta) {
      try {
        const content = (response && Array.isArray(response.content)) ? response.content : [];
        const blockTypes = content.map(function (b) {
          return (b && b.type) ? b.type : "unknown";
        });
        const text = content
          .filter(function (b) { return b && b.type === "text" && typeof b.text === "string"; })
          .map(function (b) { return b.text; })
          .join("\n")
          .slice(0, 20000);
        const snapshot = {
          when: new Date().toISOString(),
          appVersion: APP_VERSION,          // SPE-23: which build produced this failure
          kind: "parse",
          stop_reason: (response && response.stop_reason) || null,
          contentBlockTypes: blockTypes,
          text: text,
          request: meta || null
        };
        // Fire-and-forget; storage is async and failure here must not break the flow.
        writeDebugSlot("lastFailure", snapshot);
      } catch (_) { /* debug capture must never throw */ }
    }

    // SPE-22: capture debug on EVERY non-parse failure path (timeout / http /
    // network). `fields` carries the kind-specific data; `meta` is requestMeta().
    // Overwrite semantics + AI_DEBUG_STORAGE key unchanged; never the API key.
    function captureFailureDebug(fields, meta) {
      try {
        const snapshot = Object.assign(
          { when: new Date().toISOString(), appVersion: APP_VERSION },  // SPE-23
          fields || {},
          { request: meta || null }
        );
        writeDebugSlot("lastFailure", snapshot);
      } catch (_) { /* debug capture must never throw */ }
    }

    // Build the request body. `useStructured` gates output_config.format (SPE-20);
    // `useEffort` gates output_config.effort (SPE-22). The two are independent —
    // a 400 naming "format" drops format; a 400 naming "effort" drops effort — but
    // both live inside the SAME output_config object:
    //   output_config: { effort: "medium", format: {...} }
    function buildApiBody(messages, useStructured, useEffort) {
      const body = {
        model: ANTHROPIC_MODEL,
        max_tokens: 8000,
        tools: [{ type: "web_search_20260209", name: "web_search", max_uses: 4 }],
        messages: messages
      };
      const oc = {};
      if (useEffort) oc.effort = API_EFFORT;
      if (useStructured) oc.format = LISTING_OUTPUT_CONFIG.format;
      if (Object.keys(oc).length) body.output_config = oc;
      return body;
    }

    // Run the pause_turn continuation loop and return the ACCUMULATED content
    // blocks across every chunk (SPE-20 fix 3), plus the terminal response for
    // stop_reason inspection. Throws on terminal error stop_reasons.
    //
    // SPE-22:
    //   - Overall wall-clock budget (API_OVERALL_BUDGET_MS, 480s) across the whole
    //     continuation loop: before each continuation request we check elapsed and,
    //     if the budget is exhausted, fail with the existing "took too long"
    //     message rather than starting another 180s request.
    //   - Debug capture on EVERY failure path (timeout / http / network). apiRequest
    //     tags each error with `kind`; here we attach `phase` ("initial" |
    //     "continuation-N") and request metadata, then rethrow.
    async function runApiLoop(key, messages, useStructured, useEffort) {
      // Collect ALL content blocks from every response, in order. With structured
      // outputs the draft is in the final chunk anyway, but the fallback path
      // needs earlier chunks in case the JSON landed in a pause_turn chunk.
      const accumulated = [];
      let response = null;
      const meta = requestMeta(useStructured, useEffort ? API_EFFORT : null);
      const loopStart = Date.now();
      let continuations = 0;   // SPE-24 fix 5: how many pause_turn continuations ran

      for (let attempt = 0; attempt <= API_MAX_CONTINUATIONS; attempt++) {
        const phase = attempt === 0 ? "initial" : ("continuation-" + attempt);

        // SPE-22: overall wall-clock budget check BEFORE each continuation request.
        if (attempt > 0 && (Date.now() - loopStart) >= API_OVERALL_BUDGET_MS) {
          captureFailureDebug({
            kind: "timeout",
            elapsedMs: Date.now() - loopStart,
            attempt: attempt,
            phase: phase,
            reason: "overall-budget-exhausted"
          }, meta);
          throw new Error("The AI took too long researching prices. Try again.");
        }

        try {
          response = await apiRequest(key, buildApiBody(messages, useStructured, useEffort));
        } catch (err) {
          // SPE-22: capture debug for timeout / http / network — the paths that
          // previously threw before any snapshot was stored. A 400 that the caller
          // will handle via a format/effort fallback rides through with its debug
          // captured too (harmless — the successful retry overwrites it).
          const kind = err && err.kind;
          if (kind === "timeout") {
            captureFailureDebug({
              kind: "timeout",
              elapsedMs: (typeof err.elapsedMs === "number") ? err.elapsedMs : null,
              attempt: attempt,
              phase: phase
            }, meta);
          } else if (kind === "http") {
            captureFailureDebug({
              kind: "http",
              status: (err.apiStatus != null) ? err.apiStatus : null,
              bodySnippet: (err.apiBody || "").slice(0, 2000),
              attempt: attempt,
              phase: phase
            }, meta);
          } else if (kind === "network") {
            captureFailureDebug({
              kind: "network",
              message: err.rawMessage || err.message || "network error",
              attempt: attempt,
              phase: phase
            }, meta);
          }
          throw err;
        }

        if (response && Array.isArray(response.content)) {
          for (let i = 0; i < response.content.length; i++) accumulated.push(response.content[i]);
        }

        const stop = response && response.stop_reason;
        if (stop === "pause_turn") {
          // Server tool loop paused — re-send with the assistant content appended.
          if (attempt >= API_MAX_CONTINUATIONS) {
            captureFailureDebug({
              kind: "timeout",
              elapsedMs: Date.now() - loopStart,
              attempt: attempt,
              phase: phase,
              reason: "max-continuations"
            }, meta);
            throw new Error("The AI took too long researching prices. Try again.");
          }
          messages.push({ role: "assistant", content: response.content });
          continuations++;
          continue;
        }
        if (stop === "max_tokens") {
          throw new Error("The AI response was cut off. Try again.");
        }
        if (stop === "refusal") {
          throw new Error("The AI declined to generate this listing.");
        }
        // end_turn (or anything else terminal) — stop looping.
        break;
      }

      if (!response || !Array.isArray(response.content)) {
        throw new Error("The AI returned no listing. Try again.");
      }
      // Return a synthetic response whose content is the accumulated blocks so
      // parseResponse + debug capture see every text block from the whole turn.
      // SPE-24: also surface the terminal response separately (fix 1 parses ONLY
      // its last text block when structured outputs were in effect) plus the flags
      // and continuation count needed for success diagnostics (fix 5).
      return {
        stop_reason: response.stop_reason,
        content: accumulated,
        _terminal: response,
        _meta: meta,
        _formatSent: !!useStructured,
        _effortSent: useEffort ? API_EFFORT : null,
        _continuations: continuations,
        _elapsedMs: Date.now() - loopStart
      };
    }

    async function generateApi(payload) {
      const key = ApiKey.get();
      if (!key) throw new Error("No API key configured. Add one in Settings.");

      // A fresh prompt each attempt (runApiLoop mutates its messages array with
      // pause_turn continuations, so we can't reuse the same array across retries).
      function freshMessages() {
        return [{ role: "user", content: buildPrompt(payload, true) }];
      }

      // Structured outputs guarantee the final text block is the listing JSON —
      // unless we've already learned this session that the API rejects it (SPE-20).
      // Effort (SPE-22) is gated independently by effortBroken.
      let useStructured = !structuredOutputsBroken;
      let useEffort = !effortBroken;
      let result;
      // Up to two fallbacks may be needed (one for effort, one for format), so
      // loop a bounded number of times, dropping whichever field a 400 names.
      for (let tries = 0; ; tries++) {
        try {
          result = await runApiLoop(key, freshMessages(), useStructured, useEffort);
          break;
        } catch (err) {
          // SPE-22: inspect WHICH field a 400 names and drop only that one, setting
          // the matching session flag so later generations skip it. The two flags
          // are independent.
          if (tries < 2 && useEffort && isEffortError(err)) {
            console.warn("[AIListing] effortBroken tripped — dropping output_config.effort for this session. 400 body:", (err.apiBody || "").slice(0, 300));
            effortBroken = true;
            useEffort = false;
            continue;
          }
          if (tries < 2 && useStructured && isOutputConfigError(err)) {
            console.warn("[AIListing] structuredOutputsBroken tripped — dropping output_config.format for this session. 400 body:", (err.apiBody || "").slice(0, 300));
            structuredOutputsBroken = true;
            useStructured = false;
            continue;
          }
          throw err;
        }
      }

      // SPE-24 fix 1: PRECISE parsing when structured outputs were in effect.
      // If format was sent AND the terminal response ended cleanly (end_turn), the
      // schema-constrained JSON is exactly the LAST text block of the terminal
      // response. Parse ONLY that block first — it can't be polluted by research
      // prose in earlier blocks. Only if that fails do we fall back to the
      // accumulated-blocks brace-scan (the old, pollutable path). We record which
      // path produced the draft for success diagnostics (fix 5).
      const terminal = result._terminal || result;
      const terminalEndTurn = terminal && terminal.stop_reason === "end_turn";
      let draft = null;
      let extractionPath = null;

      if (result._formatSent && terminalEndTurn) {
        const finalText = lastTextBlock(terminal);
        if (finalText != null) {
          try {
            draft = parseResponse(finalText);
            extractionPath = "structured-final-block";
          } catch (_) {
            draft = null;   // fall through to the accumulated-blocks fallback
          }
        }
      }

      if (!draft) {
        try {
          draft = parseResponse(result.content);
          extractionPath = "accumulated-fallback";
        } catch (parseErr) {
          // Couldn't extract a listing from the accumulated text — snapshot (rich,
          // with request metadata) for the user to report, then rethrow so the UI
          // shows the error/retry step.
          captureAiDebug(result, result && result._meta);
          throw parseErr;
        }
      }

      // SPE-24 fix 5: stash the extraction diagnostics for GenQueue to fold into
      // the lastSuccess record once the draft is accepted (post-sanitation).
      lastGenDiag = {
        extractionPath: extractionPath,
        formatSent: !!result._formatSent,
        effortSent: result._effortSent || null,
        stopReason: (terminal && terminal.stop_reason) || null,
        continuations: (typeof result._continuations === "number") ? result._continuations : 0,
        elapsedMs: (typeof result._elapsedMs === "number") ? result._elapsedMs : null
      };
      return draft;
    }

    // Minimal real request used by the Settings "Test" button. Small, no tools,
    // returns { ok:true } or { ok:false, message } with the mapped error text.
    async function testKey(key) {
      const k = (key == null ? "" : String(key)).trim();
      if (!k) return { ok: false, message: "Enter an API key to test." };
      try {
        await apiRequest(k, {
          model: ANTHROPIC_MODEL,
          max_tokens: 32,
          messages: [{ role: "user", content: "Reply with OK" }]
        });
        return { ok: true };
      } catch (e) {
        return { ok: false, message: (e && e.message) ? e.message : "Test request failed." };
      }
    }

    /* ---- CLOUD (SPE-25) — Cloudflare Worker job client. ----
       The worker (worker/src/index.js) exposes:
         POST   /jobs         body {payload:{brand,category,size,condition,costPaid,hasPhoto}}
                              -> 202 {id,status:"pending"}
         GET    /jobs?ids=a,b -> {jobs:[{id,status,draft?,error?,...}]}
         DELETE /jobs?ids=... -> {deleted:[...]}
       All requests carry Authorization: Bearer <app token>. We NEVER send the photo
       data — only hasPhoto = !!photo (the worker emits the identical "a photo is
       available" prompt line the app does). The heavy Anthropic call runs server-
       side, so these are all short fetches. Errors are tagged like the direct-API
       errors (err.kind + err.apiStatus) so GenQueue's transient/terminal classifier
       and debug capture work unchanged. */

    // Map hasPhoto + structured fields into the worker's job payload. Deliberately
    // omits the photo dataURL (server-side research is text-only, like the app's).
    function cloudJobPayload(payload) {
      return {
        brand: payload.brand || "",
        category: payload.category || "",
        size: payload.size || "",
        condition: payload.condition || "",
        costPaid: Number(payload.costPaid) || 0,
        hasPhoto: !!payload.photo
      };
    }

    // Friendly message for a cloud HTTP status (POST or poll auth failure).
    function cloudErrorMessage(status) {
      if (status === 401) return "Cloud token rejected — check Settings";
      if (status === 429) return "Cloud is rate limited — try again in a minute.";
      if (status === 529 || (status >= 500 && status < 600)) return "The cloud worker is busy — try again.";
      return "The cloud request failed (HTTP " + status + "). Try again.";
    }

    // Low-level fetch to the worker. `path` includes leading slash + any query.
    // Returns the parsed JSON on 2xx; throws a tagged Error otherwise (err.kind =
    // "http"|"network", err.apiStatus for http). No AbortController deadline — these
    // are quick control-plane calls, not the multi-minute research fetch.
    async function cloudFetch(method, path, bodyObj) {
      const base = CloudSettings.url();
      const token = CloudSettings.token();
      if (!base || !token) {
        const err = new Error("Cloud research isn't configured.");
        err.kind = "config";
        throw err;
      }
      let res;
      try {
        res = await fetch(base + path, {
          method: method,
          headers: Object.assign(
            { "Authorization": "Bearer " + token },
            bodyObj ? { "content-type": "application/json" } : {}
          ),
          body: bodyObj ? JSON.stringify(bodyObj) : undefined
        });
      } catch (e) {
        const err = new Error("Couldn't reach the cloud worker — check your connection and Settings.");
        err.kind = "network";
        err.rawMessage = (e && e.message) ? String(e.message) : String(e);
        throw err;
      }
      if (!res.ok) {
        let bodyText = "";
        try { bodyText = await res.text(); } catch (_) {}
        const err = new Error(cloudErrorMessage(res.status));
        err.kind = "http";
        err.apiStatus = res.status;
        err.apiBody = bodyText;
        throw err;
      }
      try {
        return await res.json();
      } catch (e) {
        const err = new Error("The cloud worker returned an unreadable response. Try again.");
        err.kind = "http";
        err.apiStatus = res.status;
        err.apiBody = "";
        throw err;
      }
    }

    // POST /jobs — submit a research job. Returns { id, status }. Throws tagged.
    function cloudSubmit(payload) {
      return cloudFetch("POST", "/jobs", { payload: cloudJobPayload(payload) });
    }
    // GET /jobs?ids=a,b,c — batched poll. `ids` is an array. Returns { jobs:[...] }.
    function cloudPoll(ids) {
      const q = encodeURIComponent((ids || []).join(","));
      return cloudFetch("GET", "/jobs?ids=" + q, null);
    }
    // DELETE /jobs?ids=a,b — best-effort cleanup after consuming results.
    function cloudDelete(ids) {
      const q = encodeURIComponent((ids || []).join(","));
      return cloudFetch("DELETE", "/jobs?ids=" + q, null);
    }

    // Connection test for the Settings "Test" button: GET /jobs?ids=ping.
    // 200 => connected; 401 => token rejected; else mapped message.
    async function testCloud(rawUrl, rawToken) {
      const base = CloudSettings.normalizeUrl(rawUrl);
      const token = (rawToken == null ? "" : String(rawToken)).trim();
      if (!CloudSettings.isAllowedUrl(rawUrl)) {
        return { ok: false, message: "Worker URL must start with https:// (http:// allowed only for localhost)." };
      }
      if (!token) return { ok: false, message: "Enter the app password to test." };
      let res;
      try {
        res = await fetch(base + "/jobs?ids=ping", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });
      } catch (e) {
        return { ok: false, message: "Couldn't reach the worker — check the URL and your connection." };
      }
      if (res.status === 200) return { ok: true };
      if (res.status === 401) return { ok: false, message: "Token rejected — check the app password" };
      return { ok: false, message: cloudErrorMessage(res.status) };
    }

    // ---- MOCK (dev only) — clearly labelled placeholder content. ----
    function generateMock(payload) {
      return new Promise(function (resolve) {
        setTimeout(function () {
          const brand = payload.brand || "Unbranded";
          const cat = payload.category || "item";
          const size = payload.size || "OS";
          const condLabel = CONDITION_LABELS[payload.condition] || payload.condition || "Good";
          const cost = Number(payload.costPaid) || 0;
          // Naive mock price: 3x cost, floored at $12, rounded to .99
          const price = Math.max(12, Math.round(cost * 3)) - 0.01;
          const hashCat = cat.toLowerCase().replace(/[^a-z0-9]+/g, "");
          const hashBrand = brand.toLowerCase().replace(/[^a-z0-9]+/g, "");
          resolve({
            title: brand + " " + cat + " — Size " + size + " (" + condLabel + ")",
            description:
              "[MOCK DRAFT] " + condLabel + " " + brand + " " + cat + " in size " + size + ". " +
              "Great secondhand find, pictured as-is. Smoke-free. Bundle to save on shipping!",
            suggestedPrice: price,
            platforms: {
              poshmark: "Size " + size + " " + brand + " " + cat + "! 💕 " + condLabel +
                        " condition, so cute. Bundle & save! #" + hashBrand + " #" + hashCat + " #poshmark #thrifted",
              ebay: brand + " " + cat + " Size " + size + " Women's " + condLabel +
                    " — Fast Ship (Brand: " + brand + ", Size: " + size + ", Type: " + cat +
                    ", Condition: " + condLabel + ")",
              mercari: brand + " " + cat + ", size " + size + ", " + condLabel + " condition. Ships next day.",
              depop: "*mock* " + brand.toLowerCase() + " " + cat.toLowerCase() + " size " + size.toLowerCase() +
                     " ~ " + condLabel.toLowerCase() + " condition, dm for bundles #" + hashBrand + " #" +
                     hashCat + " #vintage #y2k #thrifted"
            }
          });
        }, 900);
      });
    }

    async function generate(payload) {
      lastGenDiag = null;   // SPE-24 fix 5: only the API path sets this; clear per call
      const m = mode();
      if (m === "builtin") return generateBuiltin(payload);
      if (m === "api") return generateApi(payload);
      return generateMock(payload);
    }

    return {
      isLive: isLive, mode: mode, generate: generate,
      buildPrompt: buildPrompt, parseResponse: parseResponse,
      testKey: testKey,
      // SPE-25: cloud worker client. GenQueue drives the POST/poll/DELETE lifecycle
      // (cloud mode is submit-then-poll, NOT the promise-returning generate() path).
      // parseResponse/sanitizeDraft/draftLooksBroken reuse the EXISTING pipeline on
      // the returned draft. testCloud powers the Settings "Test" button.
      cloudSubmit: cloudSubmit, cloudPoll: cloudPoll, cloudDelete: cloudDelete,
      testCloud: testCloud,
      // SPE-20: debug capture. captureAiDebug stores a redacted snapshot; used by
      // both the parse-failure path (inside generateApi) and the draft-validation
      // path (in the add flow). captureRawDebug builds a snapshot from a plain
      // draft object for the non-API (builtin/mock) validation-failure case.
      captureAiDebug: captureAiDebug,
      captureRawDebug: function (draft, stopReason, extraFields) {
        try {
          writeDebugSlot("lastFailure", Object.assign({
            when: new Date().toISOString(),
            appVersion: APP_VERSION,          // SPE-23: which build produced this failure
            kind: "empty_draft",
            stop_reason: stopReason || null,
            contentBlockTypes: [],
            text: (function () {
              try { return JSON.stringify(draft).slice(0, 20000); }
              catch (_) { return ""; }
            })()
          }, extraFields || {}));
        } catch (_) { /* never throw */ }
      },
      // SPE-24 fix 5: success diagnostics.
      recordSuccess: recordSuccess,
      getLastGenDiag: getLastGenDiag,
      // SPE-22 test seam: exposed so the verification harness can drive the direct-
      // API path (generateApi/buildApiBody) and monkeypatch the timeout constants
      // WITHOUT shipping shortened values. Not used by the production flow.
      generateApi: generateApi,
      buildApiBody: buildApiBody,
      __setTimeouts: __setTimeouts,
      __getTimeouts: __getTimeouts
    };
  })();

  // Human-readable label for the active AI mode (shown in Settings + loading copy).
  function aiModeLabel() {
    switch (AIListing.mode()) {
      case "cloud":   return "Cloud research (worker)";
      case "builtin": return "Claude (built-in)";
      case "api":     return "Claude API (your key)";
      default:        return "Demo mode";
    }
  }

  /* ===========================================================================
     [UPDATE CHECK]  — SPE-23 feature 1. Kills silent-stale-build failures.
     ---------------------------------------------------------------------------
     ROOT CAUSE (from the ticket's on-device evidence): iOS home-screen web apps
     aggressively cache the HTML. A retest surfaced the OLD pre-SPE-22 "AI request
     timed out" copy — proof the phone was running a stale cached build that never
     got the timeout/retry fixes. This module detects that: it fetches the live
     page bytes (cache-busted), reads the `app-version` marker comment, and if it
     differs from the running APP_VERSION shows a persistent tap-to-refresh banner.

     DESIGN:
       - Runs on boot and on every visibilitychange→visible, THROTTLED to at most
         once per CHECK_THROTTLE_MS (5 min) so rapid foreground/background flips
         don't hammer the network.
       - fetch(location.href, {cache:"reload"}) + a `?v=<ts>` cache-buster query so
         neither the HTTP cache nor a Service Worker can serve stale bytes.
       - NEVER auto-reloads (an in-progress intake/sale form must not be destroyed).
         Only a user tap on the banner calls location.reload().
       - Silent on any network error (offline is normal on a phone).
       - The banner shares the fixed slot family with #genPill; renderGenPill()
         handles stacking so they never overlap.
     =========================================================================== */
  const UpdateCheck = (function () {
    let throttleMs = 5 * 60 * 1000;            // at most one check per 5 minutes
    let lastCheck = 0;
    let updateReady = false;                   // latched true once a newer build seen
    // Test seam: the harness stubs fetch + shrinks the throttle without shipping it.
    let fetchImpl = (typeof fetch !== "undefined") ? fetch.bind(window) : null;

    // Pull the app-version marker out of fetched page text. Same token the HTML
    // marker uses: `app-version: 2026-07-05.2`.
    function parseVersion(text) {
      if (typeof text !== "string") return null;
      const m = text.match(/app-version:\s*([\w.\-]+)/);
      return m ? m[1] : null;
    }

    // Show the persistent banner (idempotent). Never auto-reloads.
    function showBanner() {
      updateReady = true;
      const el = document.getElementById("updateBanner");
      if (el) el.classList.add("show");
      // Re-run pill layout so the banner stacks above #genPill if both show.
      if (typeof renderGenPill === "function") renderGenPill();
    }
    function isReady() { return updateReady; }

    // Perform one check now (respecting the throttle unless force=true).
    async function check(force) {
      if (updateReady) return;                 // already flagged — nothing more to do
      const now = Date.now();
      if (!force && (now - lastCheck) < throttleMs) return;
      lastCheck = now;
      if (!fetchImpl) return;
      try {
        const url = location.href.split("#")[0];
        const sep = url.indexOf("?") === -1 ? "?" : "&";
        const bust = url + sep + "v=" + Date.now();
        const res = await fetchImpl(bust, { cache: "reload" });
        if (!res || !res.ok) return;           // silent on any non-200
        const text = await res.text();
        const remote = parseVersion(text);
        // Only flag when we positively read a DIFFERENT version. A missing marker
        // (parse failed) is treated as "can't tell" → stay silent.
        if (remote && remote !== APP_VERSION) showBanner();
      } catch (_) {
        /* offline / CORS / abort — silent by design */
      }
    }

    // Wire the banner tap (reload) + boot/visibility checks.
    function init() {
      const el = document.getElementById("updateBanner");
      if (el) el.addEventListener("click", function () { location.reload(); });
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") check(false);
      });
      check(true);                             // boot check (bypasses throttle once)
    }

    // Test seams: override fetch + throttle without shipping shortened values.
    function __setFetch(fn) { fetchImpl = fn; }
    function __setThrottle(ms) { if (typeof ms === "number") throttleMs = ms; }

    return {
      init: init, check: check, isReady: isReady, parseVersion: parseVersion,
      __setFetch: __setFetch, __setThrottle: __setThrottle
    };
  })();

  /* ===========================================================================
     [WAKE LOCK]  — SPE-23 feature 2. Keep the screen awake while researching.
     ---------------------------------------------------------------------------
     ROOT CAUSE (ticket evidence): "Interrupted" failures came from the page being
     suspended mid-research — most likely iOS auto-locking the screen during the
     1–3 minute wait, which pauses timers and kills the in-flight fetch. Holding a
     screen wake lock while GenQueue has pending work keeps the display on so the
     page isn't suspended.

     DESIGN:
       - Feature-detect navigator.wakeLock (older iOS lacks it → all no-ops).
       - acquire() while there is pending work; release() when the queue drains.
       - The OS auto-releases the lock when the page is hidden, so we reacquire on
         visibilitychange→visible IF work is still pending.
       - All failures are swallowed silently — a missing/blocked wake lock must
         never break generation, only make it less reliable on the screen-lock path.
       - Wired into GenQueue.pump (acquire) and the completion path (release when
         no work remains).
     =========================================================================== */
  const WakeLock = (function () {
    const supported = (typeof navigator !== "undefined") && !!navigator.wakeLock;
    let sentinel = null;       // the active WakeLockSentinel, or null
    let want = false;          // do we currently want a lock held?

    function isSupported() { return supported; }
    function isHeld() { return !!sentinel; }

    async function acquire() {
      want = true;
      if (!supported || sentinel) return;
      try {
        sentinel = await navigator.wakeLock.request("screen");
        // The OS releases on hide; drop our ref so a later reacquire() re-requests.
        sentinel.addEventListener("release", function () { sentinel = null; });
      } catch (_) {
        sentinel = null;       // request rejected (hidden tab, unsupported) — silent
      }
    }

    async function release() {
      want = false;
      if (!sentinel) return;
      try { await sentinel.release(); } catch (_) {}
      sentinel = null;
    }

    // Called on visibilitychange→visible: the lock auto-released while hidden, so
    // re-request it if we still want one.
    function reacquireIfWanted() {
      if (want && !sentinel) acquire();
    }

    return {
      isSupported: isSupported, isHeld: isHeld,
      acquire: acquire, release: release, reacquireIfWanted: reacquireIfWanted
    };
  })();

  /* ===========================================================================
     [GEN QUEUE]  — SPE-21. Background listing generation.
     ---------------------------------------------------------------------------
     Tapping "Generate listing" no longer blocks the Add flow. Instead the item is
     saved as a 'draft' with gen="pending" and enqueued here; research runs in the
     background while Alissa keeps adding items. Review happens later in Inventory
     item detail.

     DESIGN:
       - The PERSISTED item.gen field is the durable source of truth
         (null | "pending" | { failed:msg }). This in-memory module only tracks
         which ids are actively running (`active`) and which are waiting (`queue`)
         so we can cap concurrency and process FIFO. If the app dies, migrate()
         turns any orphaned "pending" into a failed/interrupted state on reboot.
       - Concurrency cap 2. Extra requests wait FIFO.
       - On completion: updateItem writes the listing, clears gen, keeps status
         'draft' (she reviews before it counts as listed), and fires a tappable
         "listing ready" toast -> jumps to that item's detail.
       - On failure: gen = { failed: msg } (SPE-20 error mapping) + debug capture,
         and a tappable "failed — tap to retry" toast.
       - If the item was deleted while pending, the resolved result is discarded
         (we re-check AppStore.getItem before writing).
       - Mock mode runs through the SAME lifecycle (it just resolves fast).

     PUBLIC API:
       GenQueue.enqueue(itemId)   -> mark pending + schedule generation
       GenQueue.pendingCount()    -> number of items pending (queued + in flight),
                                     read from the store so it survives re-renders.
     =========================================================================== */
  const GenQueue = (function () {
    const MAX_CONCURRENT = 2;
    const active = new Set();   // item ids currently generating (in flight)
    const queue = [];           // item ids waiting for a slot (FIFO)
    // SPE-22: when each pending item was enqueued, so the item-detail research panel
    // can show an elapsed timer. Best-effort/in-memory only (like `active`/`queue`);
    // after a reboot mid-research migrate() flips "pending" to failed, so a missing
    // entry just means the panel falls back to item.createdAt.
    const startedAt = Object.create(null);

    // Count of items the store considers pending. Durable truth, not the in-memory
    // sets — so a re-render or reboot-normalized state stays accurate.
    function pendingCount() {
      return AppStore.listItems().filter(function (i) { return i.gen === "pending"; }).length;
    }

    // A short label for toasts: listing title if present, else brand/category.
    function labelFor(item) {
      if (!item) return "item";
      if (item.listing && item.listing.title && item.listing.title.trim()) {
        return item.listing.title.trim();
      }
      const t = [item.brand, item.category].filter(Boolean).join(" ");
      return t || "item";
    }

    // Snapshot the generation payload from the item's structured fields (mirrors
    // readIntake()'s payload shape — that's what AIListing.generate expects).
    function payloadFor(item) {
      return {
        photo: item.photo || null,
        category: item.category || "",
        brand: item.brand || "",
        size: item.size || "",
        condition: item.condition || "",
        costPaid: Number(item.costPaid) || 0
      };
    }

    // Enqueue (or re-enqueue, for a retry) generation for an item id. Sets gen
    // "pending" durably, then tries to start it.
    // SPE-25: in CLOUD mode we branch entirely — submit a server job immediately
    // (NOT subject to the local cap-2; the worker handles concurrency), persist the
    // returned job id on item.genJob, and let CloudPoll pick up the result. In LOCAL
    // modes (builtin/api/mock) the behavior is unchanged: cap-2 FIFO queue.
    function enqueue(itemId) {
      const item = AppStore.getItem(itemId);
      if (!item) return;
      if (AIListing.mode() === "cloud") { enqueueCloud(itemId); return; }
      startedAt[itemId] = Date.now();                  // SPE-22: elapsed-timer anchor
      AppStore.updateItem(itemId, { gen: "pending", genJob: undefined }); // durable pending -> notify re-renders badges
      if (active.has(itemId) || queue.indexOf(itemId) !== -1) return; // already scheduled
      queue.push(itemId);
      pump();
    }

    // SPE-25: submit a cloud research job for this item. Sets gen "pending" up front
    // (research panel shows immediately), then POSTs. On success persist the job id
    // durably on item.genJob and kick CloudPoll. On failure: transient -> the same
    // auto-retry ladder as local (re-submit); 401 (token rejected) -> terminal fail
    // with the Settings message. NOT gated by the cap — submit immediately.
    function enqueueCloud(itemId) {
      const item = AppStore.getItem(itemId);
      if (!item) return;
      startedAt[itemId] = Date.now();                  // elapsed-timer anchor (best-effort)
      // Mark pending now; clear any stale genJob until the POST returns a fresh one.
      AppStore.updateItem(itemId, { gen: "pending", genJob: undefined });
      submitCloudJob(itemId, 0);
    }

    // POST /jobs for an item, with the same transient auto-retry ladder as local.
    // `attempt` is 0 for the first try, 1/2 for retries.
    function submitCloudJob(itemId, attempt) {
      attempt = attempt || 0;
      const item = AppStore.getItem(itemId);
      if (!item || item.gen !== "pending") return;     // deleted / superseded
      const payload = payloadFor(item);
      AIListing.cloudSubmit(payload).then(function (res) {
        const cur = AppStore.getItem(itemId);
        if (!cur || cur.gen !== "pending") return;     // deleted / superseded mid-flight
        const jobId = res && res.id;
        if (!jobId) {
          markFailed(itemId, "The cloud didn't accept the job — tap Retry");
          return;
        }
        // Persist the durable job handle. CloudPoll will now find + poll it.
        AppStore.updateItem(itemId, { gen: "pending", genJob: jobId });
        CloudPoll.kick();                              // start/continue polling now
      }).catch(function (err) {
        // 401 -> terminal, clear Settings message. Other transient -> retry ladder.
        if (err && err.kind === "http" && err.apiStatus === 401) {
          captureCloudFailureDebug(itemId, err, null);
          markFailed(itemId, "Cloud token rejected — check Settings");
          return;
        }
        if (attempt < MAX_TRANSIENT_RETRIES && isTransient(err) &&
            AppStore.getItem(itemId) && AppStore.getItem(itemId).gen === "pending") {
          const retryN = attempt + 1;
          const backoff = transientBackoff(retryN, err);
          console.warn("[GenQueue] cloud POST transient failure — auto-retry " + retryN + "/" +
            MAX_TRANSIENT_RETRIES + " in " + backoff + "ms:", err && err.message);
          setTimeout(function () {
            const c = AppStore.getItem(itemId);
            if (!c || c.gen !== "pending") return;
            submitCloudJob(itemId, attempt + 1);
          }, backoff);
          return;
        }
        // Terminal POST failure.
        captureCloudFailureDebug(itemId, err, null);
        markFailed(itemId, (err && err.message) ? err.message : "Couldn't reach the cloud worker — tap Retry");
      });
    }

    // SPE-25 debug: record a cloud failure into the EXISTING lastFailure slot with
    // mode:"cloud", the worker http status, and the jobId (never the token).
    function captureCloudFailureDebug(itemId, err, jobId) {
      try {
        const cur = AppStore.getItem(itemId);
        AIListing.captureRawDebug({}, "cloud", {
          kind: "cloud",
          mode: "cloud",
          httpStatus: (err && err.apiStatus != null) ? err.apiStatus : null,
          message: (err && err.message) ? err.message : null,
          jobId: jobId || (cur && cur.genJob) || null
        });
      } catch (_) {}
    }

    // SPE-22: epoch ms this item's current research started (for the elapsed timer).
    // Falls back to the item's createdAt if we have no in-memory anchor (e.g. after
    // a reboot that left an orphaned pending — though migrate() normally clears it).
    function startedAtFor(itemId) {
      if (startedAt[itemId]) return startedAt[itemId];
      const it = AppStore.getItem(itemId);
      return (it && it.createdAt) ? it.createdAt : Date.now();
    }

    // SPE-23/SPE-24: how long we wait before a silent auto-retry of a transient
    // failure. Module-level `let` so tests can scale it down without shipping the
    // shortened value (via __setRetryDelay). RETRY_DELAY_MS is the base still used
    // by the quality-regen path.
    let RETRY_DELAY_MS = 3000;

    // SPE-24 fix 6: 529/overload patience. We now allow TWO transient auto-retries
    // (was one) with escalating backoff: 10s then 30s. A 529 (Anthropic overloaded)
    // ALWAYS uses the longer 30s backoff regardless of which retry it is. These stay
    // within the 480s overall budget: worst case 3 attempts (~180s cap each is
    // itself budgeted inside runApiLoop) plus 10s+30s of backoff. Module-level `let`
    // so tests can scale them via __setBackoffs without shipping shortened values.
    let MAX_TRANSIENT_RETRIES = 2;
    let TRANSIENT_BACKOFF_MS = [10000, 30000];   // [before retry 1, before retry 2]
    let OVERLOAD_BACKOFF_MS = 30000;             // 529 always waits this long

    // Backoff (ms) to wait before transient retry N (1-based), given the error.
    function transientBackoff(retryN, err) {
      if (err && err.kind === "http" && err.apiStatus === 529) return OVERLOAD_BACKOFF_MS;
      const idx = Math.min(retryN - 1, TRANSIENT_BACKOFF_MS.length - 1);
      return TRANSIENT_BACKOFF_MS[idx];
    }

    // SPE-23: is this failure TRANSIENT (worth one silent auto-retry) vs. terminal
    // (fail immediately)? The SPE-22 error objects carry `kind` ("timeout" |
    // "network" | "http") and, for http, `apiStatus`. Transient kinds:
    //   - timeout   : our own deadline or the overall-budget/max-continuations cap
    //   - network   : couldn't reach Anthropic (flaky connection)
    //   - http 529  : Anthropic overloaded
    //   - http 5xx  : server-side error
    // Non-transient (fail now, no retry): 401 (bad key), 400 (bad request),
    // refusal, and parse/empty-draft (those don't carry a transient `kind`).
    function isTransient(err) {
      if (!err) return false;
      const kind = err.kind;
      if (kind === "timeout" || kind === "network") return true;
      if (kind === "http") {
        const st = err.apiStatus;
        if (st === 529) return true;
        if (typeof st === "number" && st >= 500 && st < 600) return true;
      }
      return false;
    }

    // Start as many queued jobs as the concurrency cap allows.
    function pump() {
      while (active.size < MAX_CONCURRENT && queue.length > 0) {
        const id = queue.shift();
        // Skip ids that no longer exist or are no longer pending (e.g. deleted,
        // or superseded). The store is the truth.
        const item = AppStore.getItem(id);
        if (!item || item.gen !== "pending") continue;
        run(id);
      }
      // SPE-23: hold a screen wake lock whenever there is pending work (in flight
      // or queued) so iOS doesn't auto-lock and suspend the page mid-research.
      syncWakeLock();
    }

    // SPE-23/SPE-25: acquire/release the screen wake lock to match pending LOCAL
    // work. Called from pump() (work may have started) and after each job settles
    // (work may have drained). All WakeLock calls are silent no-ops when unsupported.
    // IMPORTANT (SPE-25): only LOCAL jobs need the screen awake — the whole point of
    // cloud mode is that the server keeps working while the phone sleeps, so cloud
    // jobs must NOT hold a wake lock (battery win). `active`/`queue` only ever hold
    // LOCAL ids (cloud submits never push to them), so this is already cloud-safe.
    function syncWakeLock() {
      if (typeof WakeLock === "undefined") return;
      const busy = active.size > 0 || queue.length > 0;
      if (busy) WakeLock.acquire();
      else WakeLock.release();
    }

    // Run one generation. Never throws to the caller; resolves the item's gen
    // field one way or the other and always frees the slot + pumps the queue.
    // SPE-23: `attempt` is 0 for the first try, 1 for the single auto-retry.
    // SPE-24 fix 4: max quality-driven regenerations per generation (avoid loops).
    const MAX_QUALITY_REGENS = 1;

    function run(itemId, attempt, qualityRegens) {
      attempt = attempt || 0;
      qualityRegens = qualityRegens || 0;
      active.add(itemId);
      const item = AppStore.getItem(itemId);
      const payload = payloadFor(item);

      AIListing.generate(payload).then(function (draft) {
        // SPE-24 fix 5: grab extraction diagnostics BEFORE anything async can
        // overwrite them (getLastGenDiag reflects only the last generate() call).
        const diag = (typeof AIListing.getLastGenDiag === "function") ? AIListing.getLastGenDiag() : null;

        // SPE-24 fix 4: sanitize, then check for garbage. normalizeDraft happens
        // inside sanitizeDraft; isDraftUsable is the existing empty-draft safety net.
        const clean = sanitizeDraft(draft);

        if (!isDraftUsable(clean)) {
          // Empty even after sanitation — existing SPE-20 safety net (failure path).
          delete startedAt[itemId];
          if (!AppStore.getItem(itemId)) { settle(itemId); return; }
          AIListing.captureRawDebug(draft, "empty_draft");
          markFailed(itemId, "The AI returned an empty draft — tap to retry");
          settle(itemId);
          return;
        }

        if (draftLooksBroken(clean)) {
          if (qualityRegens < MAX_QUALITY_REGENS &&
              AppStore.getItem(itemId) && AppStore.getItem(itemId).gen === "pending") {
            // Silent quality-regen: treat like a transient retry (no toast, gen
            // stays "pending"). Counts against the quality budget (max 1).
            console.warn("[GenQueue] draft failed quality check — auto-regenerating once (quality regen).");
            active.delete(itemId);
            setTimeout(function () {
              const cur = AppStore.getItem(itemId);
              if (!cur || cur.gen !== "pending") { pump(); return; }
              run(itemId, attempt, qualityRegens + 1);
            }, RETRY_DELAY_MS);
            return;   // the regen owns the lifecycle
          }
          // Regen budget spent (or item gone): ACCEPT the (still-broken) draft so she
          // can edit it — never trap her behind an error — but flag it: capture a
          // quality debug snapshot with the offending fields.
          captureQualityDebug(draft, clean);
          finishSuccess(itemId, clean, diag, qualityRegens, true);
          settle(itemId);
          return;
        }

        // Clean draft — accept it.
        finishSuccess(itemId, clean, diag, qualityRegens, false);
        settle(itemId);
      }).catch(function (err) {
        // SPE-23/SPE-24 fix 6: up to TWO silent auto-retries on a TRANSIENT failure
        // with escalating backoff (10s then 30s; 529 always 30s). A fresh attempt
        // with its own budget — no toast, no intermediate {failed} state written,
        // gen stays "pending" so the research panel keeps showing. Free this slot
        // first so the retry (and other queued items) can schedule fairly.
        if (attempt < MAX_TRANSIENT_RETRIES && isTransient(err) && AppStore.getItem(itemId) &&
            AppStore.getItem(itemId).gen === "pending") {
          const retryN = attempt + 1;                 // 1-based retry number
          const backoff = transientBackoff(retryN, err);
          console.warn("[GenQueue] transient failure — auto-retry " + retryN + "/" +
            MAX_TRANSIENT_RETRIES + " in " + backoff + "ms:", err && err.message);
          active.delete(itemId);
          setTimeout(function () {
            // Re-check the item is still pending (not deleted / retried manually).
            const cur = AppStore.getItem(itemId);
            if (!cur || cur.gen !== "pending") { pump(); return; }
            run(itemId, attempt + 1, qualityRegens);
          }, backoff);
          return;   // do NOT settle now — the retry owns the lifecycle
        }
        // Terminal (non-transient, or the retry itself failed): mark failed + toast.
        finishFailure(itemId, err);
        settle(itemId);
      });
    }

    // SPE-24 fix 4: which fields tripped draftLooksBroken (for the quality debug).
    function offendingFields(clean) {
      const out = [];
      const title = (clean && typeof clean.title === "string") ? clean.title : "";
      const desc = (clean && typeof clean.description === "string") ? clean.description : "";
      if (title.trim() === "") out.push("title:empty");
      if (title.length > 120) out.push("title:too-long");
      DRAFT_TITLE_GARBAGE.forEach(function (g) { if (title.indexOf(g) !== -1) out.push("title:contains:" + g); });
      if (desc.trim().length < 20 && title.trim().length < 8) out.push("description:too-short");
      const plats = (clean && clean.platforms) || {};
      PLATFORMS.forEach(function (p) {
        const v = plats[p];
        if (typeof v !== "string" || v.trim().length < 25) out.push("platform:" + p + ":too-short");
      });
      const price = Number(clean && clean.suggestedPrice);
      if (isNaN(price) || price <= 0 || price > 500) out.push("suggestedPrice:out-of-range");
      return out;
    }

    // SPE-24 fix 4: capture a quality debug snapshot (kind:"quality") so we can study
    // drafts that stayed broken after a regen. Redacted; never the API key.
    function captureQualityDebug(rawDraft, clean) {
      try {
        AIListing.captureRawDebug(rawDraft, "quality", {
          kind: "quality",
          offendingFields: offendingFields(clean)
        });
      } catch (_) { /* never throw */ }
    }

    // Free the slot for a settled job and pump the queue + resync the wake lock.
    function settle(itemId) {
      active.delete(itemId);
      pump();          // pump() calls syncWakeLock() at the end
    }

    // SPE-25: track how many quality regens a given cloud item has spent (in-memory;
    // a fresh page load resets it, which is fine — worst case one extra regen).
    const cloudQualityRegens = Object.create(null);

    // SPE-25: consume a CLOUD "done" draft through the EXACT SAME pipeline as local:
    // sanitize -> isDraftUsable safety net -> draftLooksBroken quality gate. If broken
    // and the quality budget remains, submit ONE fresh job as the quality regen (same
    // accounting as local's regen); if broken again, accept + flag (like local). On a
    // clean/usable draft, finishSuccess writes the listing and clears gen + genJob.
    // `meta` is the worker's job meta (stopReason/continuations/elapsedMs) for diag.
    function consumeCloudDraft(itemId, draft, meta) {
      const item = AppStore.getItem(itemId);
      if (!item) { delete cloudQualityRegens[itemId]; return; }   // deleted while pending
      const clean = sanitizeDraft(draft);
      const diag = cloudDiag(meta);

      if (!isDraftUsable(clean)) {
        delete startedAt[itemId];
        AIListing.captureRawDebug(draft, "empty_draft", { mode: "cloud" });
        markFailed(itemId, "The cloud returned an empty draft — tap to retry");
        delete cloudQualityRegens[itemId];
        return;
      }

      if (draftLooksBroken(clean)) {
        const regens = cloudQualityRegens[itemId] || 0;
        if (regens < MAX_QUALITY_REGENS) {
          // Silent quality-regen: submit ONE fresh cloud job (gen stays "pending",
          // no toast). enqueueCloud clears the old genJob + posts a new one.
          console.warn("[GenQueue] cloud draft failed quality check — auto-regenerating once (quality regen).");
          cloudQualityRegens[itemId] = regens + 1;
          enqueueCloud(itemId);
          return;
        }
        // Budget spent: accept the still-broken draft (never trap her) + flag it.
        captureQualityDebug(draft, clean);
        finishSuccess(itemId, clean, diag, regens, true);
        delete cloudQualityRegens[itemId];
        return;
      }

      // Clean draft — accept it.
      finishSuccess(itemId, clean, diag, cloudQualityRegens[itemId] || 0, false);
      delete cloudQualityRegens[itemId];
    }

    // Build a diag object (for finishSuccess -> recordSuccess) from a cloud job's
    // meta. mode:"cloud" is stamped by finishSuccess via AIListing.mode().
    function cloudDiag(meta) {
      return {
        extractionPath: "cloud",
        formatSent: false,
        effortSent: null,
        stopReason: (meta && meta.stopReason) || null,
        continuations: (meta && typeof meta.continuations === "number") ? meta.continuations : 0,
        elapsedMs: (meta && typeof meta.elapsedMs === "number") ? meta.elapsedMs : null
      };
    }

    // SPE-24: `clean` is an ALREADY sanitized + usability-checked draft (run() did
    // that). `diag` is the API extraction diagnostics (or null for builtin/mock),
    // `qualityRegens` how many quality regenerations ran, `wasBroken` whether we're
    // accepting a still-broken draft (regen budget spent).
    function finishSuccess(itemId, clean, diag, qualityRegens, wasBroken) {
      delete startedAt[itemId];   // SPE-22: research done — drop the elapsed anchor
      // Discard if the item was deleted while research ran.
      const item = AppStore.getItem(itemId);
      if (!item) return;
      // Write listing, clear gen. Status stays 'draft' — she reviews before it
      // counts as listed (Mark as Listed lives in item detail now). SPE-25: also
      // clear genJob (cloud handle is consumed) — harmless no-op for local jobs.
      AppStore.updateItem(itemId, { listing: clean, gen: null, genJob: undefined });
      // SPE-24 fix 5: record success diagnostics alongside any lastFailure.
      try {
        AIListing.recordSuccess({
          extractionPath: (diag && diag.extractionPath) || (AIListing.mode() === "api" ? "unknown" : AIListing.mode()),
          formatSent: diag ? !!diag.formatSent : false,
          effortSent: diag ? (diag.effortSent || null) : null,
          stopReason: diag ? (diag.stopReason || null) : null,
          continuations: diag ? (diag.continuations || 0) : 0,
          qualityRegens: qualityRegens || 0,
          acceptedBroken: !!wasBroken,
          elapsedMs: diag ? (diag.elapsedMs || null) : null,
          mode: AIListing.mode()
        });
      } catch (_) {}
      const label = labelFor(AppStore.getItem(itemId));
      showGenToast("“" + label + "” listing ready — tap to review", itemId);
    }

    function finishFailure(itemId, err) {
      console.warn("[GenQueue] generation failed:", err);
      // Discard if the item was deleted while research ran.
      if (!AppStore.getItem(itemId)) return;
      const msg = (err && err.message) ? err.message : "The AI didn't return a usable listing.";
      markFailed(itemId, msg);
    }

    // Set gen.failed + fire the retry toast. (SPE-20 debug capture already
    // happened inside generateApi for API parse failures; empty-draft capture
    // happens in finishSuccess.)
    function markFailed(itemId, msg) {
      delete startedAt[itemId];   // SPE-22: research over — drop the elapsed anchor
      if (!AppStore.getItem(itemId)) return;
      // SPE-25: clear genJob on failure so CloudPoll stops tracking a dead job.
      AppStore.updateItem(itemId, { gen: { failed: msg }, genJob: undefined });
      const label = labelFor(AppStore.getItem(itemId));
      showGenToast("Listing failed for “" + label + "” — tap to retry", itemId);
    }

    // SPE-23 feature 4: is this item actively tracked by a live in-memory job?
    // A "pending" item with no live job means the fetch died while the page was
    // suspended (a zombie) — nothing will ever resolve it.
    function hasLiveJob(itemId) {
      return active.has(itemId) || queue.indexOf(itemId) !== -1;
    }

    // SPE-23 feature 4: re-enqueue a single pending item as a FRESH attempt. Used
    // by resumeZombies (visibility) and boot-time auto-requeue. enqueue() already
    // guards against double-scheduling and resets gen "pending" + the elapsed
    // anchor, so this is just a guarded pass-through.
    function requeue(itemId) {
      const it = AppStore.getItem(itemId);
      if (!it) return;
      enqueue(itemId);
    }

    // SPE-23 feature 4 (visibility path): scan for gen==="pending" items that have
    // NO live in-memory job (their fetch died while the page was suspended) and
    // silently re-enqueue them as fresh attempts. Safe to call repeatedly — items
    // that already have a live job are skipped by hasLiveJob.
    function resumeZombies() {
      AppStore.listItems().forEach(function (it) {
        // SPE-25: CLOUD pending items (genJob set) are NOT zombies — the server job
        // survives; CloudPoll resumes them. Only LOCAL pending with no live job is a
        // zombie (its in-memory fetch died while suspended).
        if (it && it.gen === "pending" && !it.genJob && !hasLiveJob(it.id)) {
          console.warn("[GenQueue] resuming zombie pending job:", it.id);
          requeue(it.id);
        }
      });
    }

    return {
      enqueue: enqueue, pendingCount: pendingCount, startedAtFor: startedAtFor,
      // SPE-23:
      resumeZombies: resumeZombies, hasLiveJob: hasLiveJob, requeue: requeue,
      isTransient: isTransient,
      // SPE-25: cloud lifecycle hooks used by CloudPoll.
      consumeCloudDraft: consumeCloudDraft,   // done  -> sanitize/quality pipeline
      cloudMarkFailed: markFailed,            // failed/unknown -> gen.failed + toast
      captureCloudFailureDebug: captureCloudFailureDebug,
      __setRetryDelay: function (ms) { if (typeof ms === "number") RETRY_DELAY_MS = ms; },
      // SPE-24 fix 6 test seam: scale the backoff schedule + max retries for the
      // verification harness WITHOUT shipping shortened values. Production ships
      // MAX_TRANSIENT_RETRIES=2, TRANSIENT_BACKOFF_MS=[10000,30000], overload 30000.
      __setBackoffs: function (arr, maxRetries, overloadMs) {
        if (Array.isArray(arr) && arr.length) TRANSIENT_BACKOFF_MS = arr.slice();
        if (typeof maxRetries === "number") MAX_TRANSIENT_RETRIES = maxRetries;
        if (typeof overloadMs === "number") OVERLOAD_BACKOFF_MS = overloadMs;
      },
      __getBackoffs: function () {
        return { schedule: TRANSIENT_BACKOFF_MS.slice(), max: MAX_TRANSIENT_RETRIES, overload: OVERLOAD_BACKOFF_MS };
      }
    };
  })();

  /* ===========================================================================
     [CLOUD POLL]  — SPE-25. Poll the Cloudflare Worker for outstanding cloud jobs.
     ---------------------------------------------------------------------------
     Cloud generations are submit-then-poll: GenQueue POSTs a job and persists its
     id on item.genJob. This module drives the read side. While ANY item has a
     genJob outstanding AND the page is visible, it polls GET /jobs every 10s in a
     SINGLE batched request covering all outstanding ids. It also polls immediately
     on boot and on every visibilitychange->visible (so results land the instant the
     phone is unlocked, without waiting out the interval).

     Per result:
       done    -> GenQueue.consumeCloudDraft (existing sanitize -> draftLooksBroken
                  pipeline; quality regen submits ONE fresh job); listing written,
                  gen+genJob cleared, success toast.
       failed  -> gen = { failed: worker error }, genJob cleared, failure toast.
       unknown -> gen = { failed: "The cloud lost this job — tap Retry" }, cleared.
     After consuming done/failed/unknown ids, batch-DELETE the done+failed ids
     (best-effort, silent failure OK — unknown ids are already gone server-side).

     CADENCE DECISIONS:
       - 10s interval: matches the ticket + the worker's ~2s (test) / 1–3min (real)
         job latency. Fast enough to feel responsive, slow enough to be gentle on a
         phone battery / the worker's request budget.
       - Single batched GET for ALL outstanding ids — never one-request-per-item.
       - No polling while hidden (iOS freezes timers anyway); the on-visible kick
         catches up the moment we're foregrounded.
       - Interval is torn down when nothing is outstanding and re-armed on kick().
     Test seam: __setInterval scales the cadence without shipping a shortened value.
     =========================================================================== */
  const CloudPoll = (function () {
    let INTERVAL_MS = 10000;        // 10s batched poll cadence (shipped value)
    let timerId = null;
    let inFlight = false;           // guard against overlapping polls

    // All item ids that currently carry a cloud job handle (gen pending + genJob).
    function outstandingIds() {
      return AppStore.listItems()
        .filter(function (i) { return i && i.gen === "pending" && i.genJob; })
        .map(function (i) { return i.genJob; });
    }
    // Map a returned job id back to the item that owns it (genJob === job.id).
    function itemForJob(jobId) {
      return AppStore.listItems().find(function (i) {
        return i && i.gen === "pending" && i.genJob === jobId;
      }) || null;
    }

    // One batched poll. Consumes every returned result, then best-effort DELETEs the
    // done+failed ids. Never throws (a transient poll error just retries next tick).
    async function pollOnce() {
      if (inFlight) return;
      const ids = outstandingIds();
      if (!ids.length) { stop(); return; }
      inFlight = true;
      let resp;
      try {
        resp = await AIListing.cloudPoll(ids);
      } catch (err) {
        // 401 on poll = token rejected: fail every outstanding job with the Settings
        // message (they can't be recovered without fixing the token).
        if (err && err.kind === "http" && err.apiStatus === 401) {
          outstandingIds().forEach(function (jobId) {
            const it = itemForJob(jobId);
            if (it) {
              GenQueue.captureCloudFailureDebug(it.id, err, jobId);
              GenQueue.cloudMarkFailed(it.id, "Cloud token rejected — check Settings");
            }
          });
        }
        // Other errors (network / 5xx): silent, retry on the next tick.
        inFlight = false;
        return;
      }
      inFlight = false;

      const jobs = (resp && Array.isArray(resp.jobs)) ? resp.jobs : [];
      const toDelete = [];   // done + failed ids to clean up server-side
      jobs.forEach(function (job) {
        if (!job || !job.id) return;
        const it = itemForJob(job.id);
        if (!it) return;     // item deleted / already resolved — nothing to do
        if (job.status === "done") {
          GenQueue.consumeCloudDraft(it.id, job.draft, job.meta || null);
          toDelete.push(job.id);
        } else if (job.status === "failed") {
          GenQueue.captureCloudFailureDebug(it.id, { apiStatus: null, message: job.error }, job.id);
          GenQueue.cloudMarkFailed(it.id, (job.error && String(job.error)) || "The cloud couldn't generate this listing — tap Retry");
          toDelete.push(job.id);
        } else if (job.status === "unknown") {
          // Server has no record (never created, deleted, or expired). Nothing to
          // DELETE — it's already gone. Surface a lost-job retry affordance.
          GenQueue.cloudMarkFailed(it.id, "The cloud lost this job — tap Retry");
        }
        // "pending" -> leave it; poll again next tick.
      });

      // Best-effort cleanup of consumed done/failed jobs. Silent failure is fine.
      if (toDelete.length) {
        AIListing.cloudDelete(toDelete).catch(function () {});
      }

      // If nothing is outstanding anymore, stop the interval; else keep ticking.
      if (!outstandingIds().length) stop();
    }

    // Start the interval if not already running (and there is work).
    function start() {
      if (timerId !== null) return;
      if (!outstandingIds().length) return;
      timerId = setInterval(function () {
        if (typeof document !== "undefined" && document.visibilityState === "hidden") return;
        pollOnce();
      }, INTERVAL_MS);
    }
    function stop() {
      if (timerId !== null) { clearInterval(timerId); timerId = null; }
    }

    // Kick: immediate poll + (re)arm the interval. Called on boot, on POST success,
    // and on visibilitychange->visible. Safe to call repeatedly.
    function kick() {
      if (!outstandingIds().length) { stop(); return; }
      start();
      // Only poll immediately when visible; a hidden kick just arms the interval.
      if (typeof document === "undefined" || document.visibilityState !== "hidden") {
        pollOnce();
      }
    }

    function isPolling() { return timerId !== null; }
    function __setInterval(ms) { if (typeof ms === "number" && ms > 0) { INTERVAL_MS = ms; if (timerId !== null) { stop(); start(); } } }

    return { kick: kick, pollOnce: pollOnce, start: start, stop: stop, isPolling: isPolling, outstandingIds: outstandingIds, __setInterval: __setInterval };
  })();

  /* ===========================================================================
     [GEN RESUME]  — SPE-23 feature 4 (boot path).
     ---------------------------------------------------------------------------
     migrate() normalizes any orphaned gen==="pending" to { failed: interrupted }
     on both boot and import (see [DATA MODEL] / migrate). On LIVE BOOT we want to
     go one better: if an AI mode is actually available, silently re-run those
     interrupted jobs ONCE instead of forcing the user to tap Retry — the app
     interrupted them, so the app should recover them.

     - Only fires when an AI mode is available (aiModeAvailable): built-in runtime,
       a saved API key, or mock. If genuinely nothing is available, the items keep
       their { failed: interrupted } marker (a normal retry affordance), NOT a
       stuck spinner.
     - Matches the EXACT GEN_INTERRUPTED_MSG marker so it only touches items the
       app itself interrupted — never a real user-facing failure like a 401.
     - Requeue flips gen back to "pending" and enqueues a fresh attempt; if that
       boot job then fails, the normal failure path applies (transient auto-retry,
       else { failed } + toast).
     - Runs ONCE per boot (right after AppStore.load()).
     =========================================================================== */
  // Is any AI generation mode available right now? mock is always the floor, so
  // this is normally true; kept as an explicit, test-overridable predicate so the
  // "no AI mode available" branch (items stay interrupted, not stuck) is testable.
  let __aiModeForced = null;   // test seam: null = real, or a forced boolean
  function aiModeAvailable() {
    if (__aiModeForced !== null) return __aiModeForced;
    // builtin / api / mock are the possible modes; all are "available" for
    // generation. (mock produces clearly-labelled demo copy but still resolves.)
    return AIListing.mode() != null;
  }
  function __setAiModeAvailable(v) { __aiModeForced = (v == null ? null : !!v); }

  function resumeInterruptedOnBoot() {
    if (!aiModeAvailable()) return;   // nothing can generate — leave interrupted markers
    AppStore.listItems().forEach(function (it) {
      if (it && it.gen && it.gen.failed === GEN_INTERRUPTED_MSG) {
        GenQueue.requeue(it.id);      // gen -> "pending", fresh job enqueued
      }
    });
  }

  /* SPE-25 (boot path, cloud). The HEADLINE feature: cloud jobs survive the app
     being killed. migrate() deliberately LEFT cloud pending items (gen==="pending"
     with a genJob) untouched — no interrupted marker, no re-enqueue. On boot we
     simply RESUME POLLING for them: CloudPoll.kick() reads item.genJob and polls
     the worker, so an in-flight job started before the reload lands with no manual
     retry and no interrupted state. Runs once per boot, right after load. */
  function resumeCloudOnBoot() {
    CloudPoll.kick();
  }

  /* ===========================================================================
     [SETTINGS]  — SPE-19. Modal overlay: API key management, connection test,
     AI mode indicator, and data backup / restore.
     ---------------------------------------------------------------------------
     - API key stored via ApiKey (separate storage key; never in exports).
     - Export: full store (items + bundles + schemaVersion) as a JSON download.
       Includes photo dataURLs (that's the point of a backup). NEVER the key.
     - Import: validate shape defensively, confirm (REPLACES data), load + persist.
     Transient UI scratch lives in settingsState (not persisted).
     =========================================================================== */
  const settingsState = {
    open: false,
    keyInput: "",           // working value of the key field
    feedback: null,         // { kind:'ok'|'err'|'info', msg } test/import result
    confirmImport: null,    // { data } parsed import awaiting confirmation
    // SPE-25: cloud research working values + its own feedback line (so a cloud
    // test result doesn't clobber an API-key test result and vice versa).
    cloudUrlInput: "",      // working value of the worker URL field
    cloudTokenInput: "",    // working value of the app token field
    cloudFeedback: null     // { kind, msg } cloud save/test/clear result
  };

  function openSettings() {
    settingsState.open = true;
    settingsState.keyInput = "";
    settingsState.feedback = null;
    settingsState.confirmImport = null;
    settingsState.cloudUrlInput = CloudSettings.url() || "";
    settingsState.cloudTokenInput = "";
    settingsState.cloudFeedback = null;
    renderSettings();
  }
  function closeSettings() {
    settingsState.open = false;
    const host = document.getElementById("settingsModal");
    if (host) host.remove();
  }

              : modeKey === "api"

    const savedRow = has

    const keyCard =
      '<div class="card">' +
        '<div class="section-label">Anthropic API key</div>' +
        savedRow +
        '<div class="field">' +

        '</div>' +

        (fb ? '<p class="settings-feedback ' + fb.kind + '">' + escapeHtml(fb.msg) + '</p>' : '') +
        '<p class="privacy-note">Your key is stored only on this device. It is never included in data exports.</p>' +

    const cloudConfigured = CloudSettings.configured();

    const cloudSavedRow = cloudConfigured
      ? '<div class="key-saved-row">' +
          '<span class="masked">' + escapeHtml(CloudSettings.url() || "") + '</span>' +
          '<button class="btn danger-ghost tiny" type="button" data-act="clear-cloud">Clear</button>' +
        '</div>' +

    const cloudCard =
