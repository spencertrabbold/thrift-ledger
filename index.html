  // 'draft', then removes the bundle. Used from bundled-item detail + dashboard.
  function deleteBundle(bundleId) {
    const bundle = AppStore.getBundle(bundleId);
    if (!bundle) return;
    (bundle.itemIds || []).forEach(function (iid) {
      const it = AppStore.getItem(iid);
      if (!it) return;
      const back = it.listing ? STATUS.LISTED : STATUS.DRAFT;
      AppStore.updateItem(iid, { sale: null, status: back });
    });
    AppStore.removeBundle(bundleId); // final mutation -> notify re-renders active view
  }

  // Guard mirroring suppressAddRerender: set true around store mutations inside
  // inventory-detail edit handlers so a mutation's notify() doesn't re-render the
  // detail view and blow away the caret / in-progress edit.
  let suppressInvRerender = false;
  function withoutInvRerender(fn) {
    suppressInvRerender = true;
    try { return fn(); } finally { suppressInvRerender = false; }
  }

  /* ---------------------------------------------------------------------------
     SPE-22: elapsed-time indicator for the item-detail research panel.
     ---------------------------------------------------------------------------
     The detail view is destroyed + rebuilt on EVERY store notify (renderInventory
     rewrites #inventoryList.innerHTML), so a naive setInterval would leak one timer
     per re-render. We keep a SINGLE owned handle here. stopResearchTimer() clears it;
     startResearchTimer() always stops the prior one first (idempotent), so no matter
     how often the detail re-renders or the user navigates away/back, at most one
     interval is ever live. Boot exposes window.__researchTimerActive() for the test
     harness to assert zero leaks after repeated navigation.
     --------------------------------------------------------------------------- */
  let researchTimerId = null;
  function stopResearchTimer() {
    if (researchTimerId !== null) { clearInterval(researchTimerId); researchTimerId = null; }
  }
  // Human "1m 20s" from a start epoch. Clamped at 0.
  function formatElapsed(startMs) {
    let secs = Math.max(0, Math.floor((Date.now() - startMs) / 1000));
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return m > 0 ? (m + "m " + s + "s") : (s + "s");
  }
  // Start (or restart) the 1s ticker for the given item's research panel. Writes
  // into the #researchElapsed span if it's present; if the span disappears (panel
  // gone) the tick self-clears so a stale interval never lingers.
  function startResearchTimer(itemId) {
    stopResearchTimer();                       // never stack intervals
    const startMs = GenQueue.startedAtFor(itemId);
    function paint() {
      const span = document.getElementById("researchElapsed");
      if (!span) { stopResearchTimer(); return; }   // panel unmounted — stop cleanly
      span.textContent = formatElapsed(startMs);
    }
    paint();                                   // immediate, no 1s blank
    researchTimerId = setInterval(paint, 1000);
  }

  /* ===========================================================================
     [DASHBOARD]  — SPE-14. Spend / revenue / fees / net profit + recent sales.
     All figures come from Sales.summary() / Sales.recentSales() (invariants I1-I5).
     dashState: { expanded: { bundleId: true } } — which bundle rows are open.
     =========================================================================== */
  const dashState = { expanded: {} };

  function renderDashboard() {
    const el = document.getElementById("dashboardBody");
    if (!el) return;

    const s = Sales.summary();
    const feed = Sales.recentSales();
    const netCls = s.netProfit >= 0 ? "pos" : "neg";

    // ---- Headline stat cards ----
    const statCards =
      '<div class="stat-grid">' +
        '<div class="stat hero">' +
          '<div class="stat-lbl">Net Profit</div>' +
          '<div class="stat-val ' + netCls + '">' + moneySigned(s.netProfit) + '</div>' +
          '<div class="stat-note">Revenue &minus; fees &minus; cost of sold items</div>' +
        '</div>' +
        '<div class="stat"><div class="stat-lbl">Total Spent</div>' +
          '<div class="stat-val">' + money(s.totalSpent) + '</div>' +
          '<div class="stat-note">All items, incl. unsold</div></div>' +
        '<div class="stat"><div class="stat-lbl">Total Revenue</div>' +
          '<div class="stat-val">' + money(s.revenue) + '</div>' +
          '<div class="stat-note">Sales + bundle totals</div></div>' +
        '<div class="stat"><div class="stat-lbl">Total Fees</div>' +
          '<div class="stat-val">' + money(s.fees) + '</div></div>' +
        '<div class="stat"><div class="stat-lbl">Unsold Inventory</div>' +
          '<div class="stat-val">' + money(s.unsoldCost) + '</div>' +
          '<div class="stat-note">Cost still on the shelf</div></div>' +
      '</div>';

    // ---- Counts strip ----
    const c = s.counts;
    const countsCard =
      '<div class="card">' +
        '<div class="section-label">Inventory status</div>' +
        '<div class="count-strip">' +
          '<span class="count-pill"><b>' + c.listed + '</b> Listed</span>' +
          '<span class="count-pill"><b>' + c.sold + '</b> Sold</span>' +
          '<span class="count-pill"><b>' + c.draft + '</b> Draft</span>' +
          '<span class="count-pill"><b>' + c["not-listing"] + '</b> Not Listing</span>' +
        '</div>' +
      '</div>';

    // ---- Recent sales ----
    let salesCard;
    if (feed.length === 0) {
      salesCard =
        '<div class="card"><div class="placeholder">' +
          '<span class="emoji">&#128181;</span>' +
          'No sales yet.' +
          '<div class="muted" style="margin-top:8px;">Mark an item sold or record a bundle sale from the Inventory tab.</div>' +
        '</div></div>';
    } else {
      salesCard =
        '<div class="section-label" style="margin-top:4px;">Recent sales</div>' +
        feed.map(saleRowHTML).join("");
    }

    el.innerHTML = statCards + countsCard + salesCard;
    wireDashboard();
  }

  // One recent-sales row (single sale OR bundle). Bundles can expand inline.
  function saleRowHTML(entry) {
    if (entry.kind === "single") {
      const i = entry.item;
      const profit = Sales.singleProfit(i);
      const sub = [
        PLATFORM_LABELS[i.sale.platform] || i.sale.platform || "—",
        formatSaleDate(i.sale.date)
      ].filter(Boolean).join(" · ");
      return '' +
        '<button class="sale-row" data-kind="single" data-item="' + i.id + '">' +
          '<div class="sale-thumb-wrap">' + thumbHTML(i, "inv-thumb") + '</div>' +
          '<div class="sale-meta">' +
            '<div class="sale-title">' + escapeHtml(itemDisplayTitle(i)) + '</div>' +
            '<div class="sale-sub">' + escapeHtml(sub) + '</div>' +
          '</div>' +
          '<div class="sale-right">' +
            '<div class="sale-amt">' + money(i.sale.price) + '</div>' +
            '<div class="sale-profit ' + (profit >= 0 ? "pos" : "neg") + '">' + moneySigned(profit) + '</div>' +
          '</div>' +
        '</button>';
    }

    // Bundle row.
    const b = entry.bundle;
    const items = Sales.bundleItems(b);
    const profit = Sales.bundleProfit(b);
    const first = items[0];
    const thumb = first
      ? thumbHTML(first, "inv-thumb")
      : '<div class="inv-thumb placeholder-thumb">&#128230;</div>';
    const sub = [
      PLATFORM_LABELS[b.platform] || b.platform || "—",
      formatSaleDate(b.date)
    ].filter(Boolean).join(" · ");
    const expanded = !!dashState.expanded[b.id];

    let children = "";
    if (expanded) {
      children = '<div class="bundle-children">' +
        items.map(function (i) {
          return '<button class="bundle-child" data-kind="child" data-item="' + i.id + '">' +
            thumbHTML(i, "inv-thumb") +
            '<div class="bc-meta"><div class="bc-title">' + escapeHtml(itemDisplayTitle(i)) + '</div>' +
            '<div class="bc-sub">Cost ' + money(i.costPaid) + '</div></div>' +
            '<span class="bc-chevron">&rsaquo;</span>' +
          '</button>';
        }).join("") +
        '</div>';
    }

    return '' +
      '<button class="sale-row" data-kind="bundle" data-bundle="' + b.id + '">' +
        '<div class="sale-thumb-wrap">' + thumb +
          '<span class="nbadge">&times;' + items.length + '</span>' +
        '</div>' +
        '<div class="sale-meta">' +
          '<div class="sale-title">Bundle — ' + items.length + ' item' + (items.length === 1 ? "" : "s") + '</div>' +
          '<div class="sale-sub">' + escapeHtml(sub) + (expanded ? " · tap to collapse" : " · tap to expand") + '</div>' +
        '</div>' +
        '<div class="sale-right">' +
          '<div class="sale-amt">' + money(b.totalPrice) + '</div>' +
          '<div class="sale-profit ' + (profit >= 0 ? "pos" : "neg") + '">' + moneySigned(profit) + '</div>' +
        '</div>' +
      '</button>' +
      children;
  }

  function wireDashboard() {
    const el = document.getElementById("dashboardBody");
    if (!el) return;
    el.querySelectorAll(".sale-row").forEach(function (row) {
      row.addEventListener("click", function () {
        const kind = row.getAttribute("data-kind");
        if (kind === "bundle") {
          const bid = row.getAttribute("data-bundle");
          if (dashState.expanded[bid]) delete dashState.expanded[bid];
          else dashState.expanded[bid] = true;
          renderDashboard();
        } else {
          jumpToItemDetail(row.getAttribute("data-item"));
        }
      });
    });
    // Expanded bundle child rows jump to that item's detail.
    el.querySelectorAll(".bundle-child").forEach(function (row) {
      row.addEventListener("click", function () {
        jumpToItemDetail(row.getAttribute("data-item"));
      });
    });
  }

  // Open an item's detail in the Inventory tab (from a dashboard sale row).
  function jumpToItemDetail(itemId) {
    if (!itemId || !AppStore.getItem(itemId)) return;
    exitBundleFlow();
    invState.mode = "detail";
    invState.itemId = itemId;
    resetDetailFlags();
    Router.go("inventory"); // triggers renderInventory via renderActive
  }

  function statusLabel(s) {
    switch (s) {
      case STATUS.LISTED: return "Listed";
      case STATUS.SOLD: return "Sold";
      case STATUS.NOT_LISTING: return "Not Listing";
      default: return "Draft";
    }
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // Re-render whatever tab is active. Views are idempotent, so it's cheap to
  // render all three; but we only touch the visible one to be tidy.
  function renderActive() {
    const tab = Router.current();
    // The Add flow renders itself explicitly at each step transition and holds
    // transient DOM state (focus, in-progress edits). Suppress store-driven
    // re-renders of it while a flow handler is mid-transition, so an intake
    // mutation's notify() doesn't clobber the form. Other tabs always re-render.
    if (tab === "add") { stopResearchTimer(); if (!suppressAddRerender) renderAdd(); }
    else if (tab === "inventory") { if (!suppressInvRerender) renderInventory(); }
    else if (tab === "dashboard") { stopResearchTimer(); renderDashboard(); }
    renderGenPill(); // SPE-21: keep the "N researching" pill in sync on every change
  }

  // SPE-21: show/update the persistent "🔎 N researching" pill. Runs on every
  // store change (via renderActive). It's a fixed element outside the views, so
  // it survives tab switches; hidden when nothing is in flight.
  function renderGenPill() {
    const pill = document.getElementById("genPill");
    if (!pill) return;
    const n = GenQueue.pendingCount();
    const genVisible = n > 0;
    if (genVisible) {
      const txt = document.getElementById("genPillText");
      if (txt) txt.textContent = n + " researching";
      pill.classList.add("show");
    } else {
      pill.classList.remove("show");
    }
    // SPE-23: stack the update banner above the gen pill when BOTH are visible so
    // they don't overlap. The update banner owns the higher slot (it's primary).
    const banner = document.getElementById("updateBanner");
    if (banner) {
      const bannerVisible = banner.classList.contains("show");
      banner.classList.toggle("with-gen-pill", bannerVisible && genVisible);
    }
  }
  // Set true around store mutations inside Add-flow handlers that will call
  // renderAdd() themselves afterward.
  let suppressAddRerender = false;
  function withoutAddRerender(fn) {
    suppressAddRerender = true;
    try { return fn(); } finally { suppressAddRerender = false; }
  }

  /* ===========================================================================
     [ROUTER]  — bottom-tab switching. No hash; single-page section toggle.
     =========================================================================== */
  const Router = (function () {
    let current = "add";
    const SUBTITLES = {
      add: "New item → AI listing",
      inventory: "Your active stock",
      dashboard: "Spend, revenue &amp; profit"
    };
    function go(tab) {
      current = tab;
      document.querySelectorAll(".view").forEach(v => {
        v.classList.toggle("active", v.dataset.tab === tab);
      });
      document.querySelectorAll("#tabBar button").forEach(b => {
        b.classList.toggle("active", b.dataset.tab === tab);
      });
      const sub = document.getElementById("headerSub");
      if (sub) sub.innerHTML = SUBTITLES[tab] || "";
      // Scroll main to top on tab change.
      const main = document.querySelector(".app-main");
      if (main) main.scrollTop = 0;
      renderActive();
    }
    return { go, current: () => current };
  })();

  /* ===========================================================================
     [BOOT]  — load persisted data, wire events, first render.
     =========================================================================== */
  (function boot() {
    // Tab bar clicks
    document.getElementById("tabBar").addEventListener("click", function (e) {
      const btn = e.target.closest("button[data-tab]");
      if (!btn) return;
      const tab = btn.dataset.tab;
      // SPE-24 fix 7: tapping the Inventory TAB always returns to the main list —
      // even when we're already on the Inventory tab in item-detail mode. Clears the
      // detail item + any transient detail flags and exits the bundle multi-select
      // flow, but KEEPS the current filter chip. (jumpToItemDetail sets detail mode
      // and calls Router.go directly, bypassing this handler, so deep-links still
      // open detail.) The detail back-button behavior is untouched — it has its own
      // handler in wireInventoryDetail.
      if (tab === "inventory") {
        invState.mode = "list";
        invState.itemId = null;
        resetDetailFlags();
        exitBundleFlow();
        invState.bundleDone = null;
      }
      Router.go(tab);
    });

    // Settings gear (SPE-19).
    const gear = document.getElementById("settingsBtn");
    if (gear) gear.addEventListener("click", function () { openSettings(); });

    // SPE-21: tapping the "N researching" pill jumps to Inventory.
    const pill = document.getElementById("genPill");
    if (pill) pill.addEventListener("click", function () { Router.go("inventory"); });
    // Close the settings modal with Escape.
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && settingsState.open) closeSettings();
    });

    // Intake flow (SPE-6..9) is rendered by renderAdd() into #addFlow and wires
    // its own events on each render (see [ADD FLOW]). No boot-time wiring needed.

    // Surface storage problems (quota / corruption) as a small non-blocking banner
    // instead of only console — Alissa's on a phone with no console open (SPE-15).
    Storage.onWarn(showStorageWarning);

    // SPE-22 test hook: lets the verification harness assert the research-panel
    // elapsed timer leaves no interval leaks after navigating away/back. Returns
    // true iff exactly one elapsed-timer interval is currently live.
    if (typeof window !== "undefined") {
      window.__researchTimerActive = function () { return researchTimerId !== null; };
    }

    // Views re-render on any store change.
    AppStore.subscribe(function () { renderActive(); });

    // Flush pending writes when the app is backgrounded / closed. Cover every path
    // that can precede a reload / tab close (SPE-15): 'pagehide' fires on both
    // reload and navigation-away; 'visibilitychange' -> hidden fires when the tab
    // is backgrounded (the reliable one on mobile Safari, where 'pagehide' can be
    // skipped). Flushing on hidden — while the page is still alive — gives the
    // async window.storage write a real chance to complete before teardown, which
    // closes the "reload within the 300ms debounce" data-loss window.
    window.addEventListener("pagehide", function () { AppStore.flush(); });
    window.addEventListener("beforeunload", function () { AppStore.flush(); });
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "hidden") AppStore.flush();
    });

    // SPE-23: on returning to the foreground, recover from a mid-research suspend.
    //   - WakeLock: the OS auto-released the screen lock while hidden; reacquire it
    //     if generation is still pending.
    //   - GenQueue.resumeZombies: any gen==="pending" whose in-memory fetch died
    //     while suspended has no live job — silently re-enqueue it.
    // (UpdateCheck also listens for visible; it wires that itself in init().)
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") {
        WakeLock.reacquireIfWanted();
        GenQueue.resumeZombies();
        // SPE-25: immediately poll outstanding cloud jobs on foreground so results
        // land the instant the phone is unlocked (don't wait out the 10s interval).
        CloudPoll.kick();
      }
    });

    // SPE-23 test seams: exposed so the verification harness can drive the new
    // modules without shipping shortened constants or real network calls.
    if (typeof window !== "undefined") {
      window.__thrift = {
        APP_VERSION: APP_VERSION,
        UpdateCheck: UpdateCheck,
        WakeLock: WakeLock,
        GenQueue: GenQueue,
        AIListing: AIListing,
        AppStore: AppStore,
        resumeInterruptedOnBoot: resumeInterruptedOnBoot,
        setAiModeAvailable: __setAiModeAvailable,
        // SPE-25: cloud research seams for the verification harness.
        CloudPoll: CloudPoll,
        CloudSettings: CloudSettings,
        resumeCloudOnBoot: resumeCloudOnBoot,
        CLOUD_URL_STORAGE: CLOUD_URL_STORAGE,
        CLOUD_TOKEN_STORAGE: CLOUD_TOKEN_STORAGE,
        // SPE-24: pure sanitation/detection helpers exposed for in-page unit checks.
        sanitizeDraft: sanitizeDraft,
        draftLooksBroken: draftLooksBroken,
        normalizeDraft: normalizeDraft,
        AI_DEBUG_STORAGE: AI_DEBUG_STORAGE,
        Storage: Storage,
        ApiKey: ApiKey
      };
    }

    // Load persisted data + the API key (SPE-19) + cloud settings (SPE-25) in
    // parallel, then paint. The key/cloud load determines the AI mode shown in the
    // intake/loading copy and Settings, and whether cloud jobs resume.
    Promise.all([AppStore.load(), ApiKey.load(), CloudSettings.load()]).then(function () {
      // SPE-25 (boot path, cloud): resume POLLING any cloud job that was in flight
      // before the app was killed (item.genJob persisted, gen still "pending"). This
      // is the headline reload-survival feature. Must run AFTER CloudSettings.load()
      // so the worker URL/token are available. Independent of the interrupted-marker
      // path below (cloud pending was NEVER flagged interrupted by migrate()).
      resumeCloudOnBoot();
      // SPE-23 feature 4 (boot path): auto-requeue LOCAL jobs the app interrupted
      // mid-research (migrate() flagged them with GEN_INTERRUPTED_MSG), once, when an
      // AI mode is available. Must run AFTER ApiKey.load() so "api" mode is visible.
      resumeInterruptedOnBoot();
      // SPE-23 feature 1: start the stale-build update checker (boot + on-visible).
      UpdateCheck.init();
      Router.go("add");
    }).catch(function (e) {
      console.error("[boot] load failed:", e);
      // Still start the update checker even if data load failed.
      try { UpdateCheck.init(); } catch (_) {}
      Router.go("add");
    });
  })();
  </script>
</body>
</html>
