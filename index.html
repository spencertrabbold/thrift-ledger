  function renderSettings() {
    // Remove any existing modal, then (if open) mount a fresh one.
    const existing = document.getElementById("settingsModal");
    if (existing) existing.remove();
    if (!settingsState.open) return;

    document.body.insertAdjacentHTML("beforeend", settingsModalHTML());
    // Trigger the enter transition.
    const overlay = document.getElementById("settingsModal");
    if (overlay) { void overlay.offsetWidth; overlay.classList.add("show"); }
    wireSettings();
  }

  function wireSettings() {
    const host = document.getElementById("settingsModal");
    if (!host) return;

    // Close when tapping the backdrop (but not the sheet).
    host.addEventListener("click", function (e) {
      if (e.target === host) closeSettings();
    });

    // Keep the key field value in scratch across re-renders.
    const keyInput = document.getElementById("apiKeyInput");
    if (keyInput) keyInput.addEventListener("input", function () {
      settingsState.keyInput = keyInput.value;
    });

    // SPE-25: keep the cloud fields in scratch across re-renders.
    const cloudUrlInput = document.getElementById("cloudUrlInput");
    if (cloudUrlInput) cloudUrlInput.addEventListener("input", function () {
      settingsState.cloudUrlInput = cloudUrlInput.value;
    });
    const cloudTokenInput = document.getElementById("cloudTokenInput");
    if (cloudTokenInput) cloudTokenInput.addEventListener("input", function () {
      settingsState.cloudTokenInput = cloudTokenInput.value;
    });

    host.querySelectorAll("[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const act = btn.getAttribute("data-act");
        if (act === "close") { closeSettings(); }
        else if (act === "save-key") { onSaveKey(); }
        else if (act === "clear-key") { onClearKey(); }
        else if (act === "test-key") { onTestKey(btn); }
        else if (act === "save-cloud") { onSaveCloud(); }
        else if (act === "clear-cloud") { onClearCloud(); }
        else if (act === "test-cloud") { onTestCloud(btn); }
        else if (act === "export") { onExportData(); }
        else if (act === "import") { triggerImportPicker(); }
        else if (act === "import-confirm") { onImportConfirm(); }
        else if (act === "import-cancel") { settingsState.confirmImport = null; renderSettings(); }
      });
    });

    // Import file picker.
    const fileInput = document.getElementById("importFileInput");
    const importBtn = host.querySelector('[data-act="import"]');
    if (importBtn && fileInput) {
      // (button click is handled above via triggerImportPicker)
      fileInput.addEventListener("change", onImportFileChosen);
    }
  }

  function setSettingsFeedback(kind, msg) {
    settingsState.feedback = { kind: kind, msg: msg };
    renderSettings();
  }

  async function onSaveKey() {
    const val = (settingsState.keyInput || "").trim();
    if (!val) { setSettingsFeedback("err", "Enter an API key to save."); return; }
    await ApiKey.set(val);
    settingsState.keyInput = "";
    setSettingsFeedback("ok", "Key saved on this device.");
  }

  async function onClearKey() {
    await ApiKey.clear();
    settingsState.keyInput = "";
    setSettingsFeedback("info", "Key cleared.");
  }

  async function onTestKey(btn) {
    // Test the field value if present, else the saved key.
    const candidate = (settingsState.keyInput || "").trim() || ApiKey.get() || "";
    settingsState.feedback = { kind: "info", msg: "Testing connection…" };
    renderSettings();
    // Disable the just-rendered Test button while in flight.
    const testBtn = document.querySelector('#settingsModal [data-act="test-key"]');
    if (testBtn) testBtn.setAttribute("disabled", "");
    const res = await AIListing.testKey(candidate);
    if (res.ok) setSettingsFeedback("ok", "Success — the API key works.");
    else setSettingsFeedback("err", res.message || "Test failed.");
  }

  /* ---------------------- Cloud research (SPE-25) ---------------------- */
  function setCloudFeedback(kind, msg) {
    settingsState.cloudFeedback = { kind: kind, msg: msg };
    renderSettings();
  }

  async function onSaveCloud() {
    const url = (settingsState.cloudUrlInput || "").trim();
    // If configured and the token field is left blank, keep the existing token.
    let token = (settingsState.cloudTokenInput || "").trim();
    if (!token && CloudSettings.configured()) token = CloudSettings.token() || "";
    const res = await CloudSettings.save(url, token);
    if (res.ok) {
      settingsState.cloudTokenInput = "";
      setCloudFeedback("ok", "Cloud research saved on this device.");
      // Mode may have flipped to "cloud" — refresh the mode label + resume polling
      // for any outstanding cloud jobs (e.g. after fixing a token).
      CloudPoll.kick();
    } else {
      setCloudFeedback("err", res.message || "Couldn't save cloud settings.");
    }
  }

  async function onClearCloud() {
    await CloudSettings.clear();
    settingsState.cloudUrlInput = "";
    settingsState.cloudTokenInput = "";
    setCloudFeedback("info", "Cloud research cleared.");
  }

  async function onTestCloud(btn) {
    const url = (settingsState.cloudUrlInput || "").trim() || CloudSettings.url() || "";
    const token = (settingsState.cloudTokenInput || "").trim() || CloudSettings.token() || "";
    settingsState.cloudFeedback = { kind: "info", msg: "Testing connection…" };
    renderSettings();
    const testBtn = document.querySelector('#settingsModal [data-act="test-cloud"]');
    if (testBtn) testBtn.setAttribute("disabled", "");
    const res = await AIListing.testCloud(url, token);
    if (res.ok) setCloudFeedback("ok", "Connected ✓");
    else setCloudFeedback("err", res.message || "Test failed.");
  }

  /* ---------------------- Export (SPE-19 / Task 3) ---------------------- */
  function onExportData() {
    // Serialize the full store — items + bundles + schemaVersion — NEVER the key,
    // and NEVER the cloud URL/token (those live under their own storage keys, not in
    // the blob). SPE-25: also strip the transient item.genJob handle from exports —
    // it's a server-job pointer, meaningless in a backup restored elsewhere/later.
    const state = AppStore.getState();
    const items = (state.items || []).map(function (it) {
      if (it && "genJob" in it) {
        const copy = Object.assign({}, it);
        delete copy.genJob;
        return copy;
      }
      return it;
    });
    const payload = {
      schemaVersion: state.schemaVersion || SCHEMA_VERSION,
      items: items,
      bundles: state.bundles || []
    };
    let json;
    try {
      json = JSON.stringify(payload, null, 2);
    } catch (e) {
      setSettingsFeedback("err", "Couldn't prepare the backup.");
      return;
    }
    const d = new Date();
    const p = function (n) { return String(n).padStart(2, "0"); };
    const name = "thrift-ledger-backup-" + d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + ".json";
    try {
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Revoke shortly after so iOS has time to open the share sheet.
      setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
      setSettingsFeedback("ok", "Backup ready: " + name);
    } catch (e) {
      setSettingsFeedback("err", "Export failed on this device.");
    }
  }

  /* ---------------------- Import (SPE-19 / Task 3) ---------------------- */
  function triggerImportPicker() {
    const fileInput = document.getElementById("importFileInput");
    if (fileInput) fileInput.click();
  }

  // Defensive shape check: needs a schemaVersion and an items ARRAY.
  function isValidBackup(obj) {
    return obj && typeof obj === "object" &&
      (typeof obj.schemaVersion === "number") &&
      Array.isArray(obj.items) &&
      (obj.bundles == null || Array.isArray(obj.bundles));
  }

  function onImportFileChosen(e) {
    const file = e.target.files && e.target.files[0];
    // Reset the input so re-choosing the same file re-fires change.
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onerror = function () {
      setSettingsFeedback("err", "Couldn't read that file.");
    };
    reader.onload = function () {
      let parsed;
      try {
        parsed = JSON.parse(String(reader.result));
      } catch (err) {
        setSettingsFeedback("err", "That file isn't valid JSON. No data was changed.");
        return;
      }
      if (!isValidBackup(parsed)) {
        setSettingsFeedback("err", "That doesn't look like a Thrift Ledger backup. No data was changed.");
        return;
      }
      settingsState.confirmImport = { data: parsed };
      settingsState.feedback = null;
      renderSettings();
    };
    reader.readAsText(file);
  }

  async function onImportConfirm() {
    const ci = settingsState.confirmImport;
    if (!ci || !isValidBackup(ci.data)) { settingsState.confirmImport = null; renderSettings(); return; }
    settingsState.confirmImport = null;
    const ok = await AppStore.replaceAll(ci.data);
    if (ok) setSettingsFeedback("ok", "Backup restored.");
    else setSettingsFeedback("err", "Import failed — your data is unchanged.");
  }

  /* ===========================================================================
     [VIEWS]  — one render fn per tab. Read ONLY through AppStore.
     Later phases replace the placeholder bodies; keep the render signatures.
     =========================================================================== */

  function money(n) { return "$" + (Number(n) || 0).toFixed(2); }
  // Signed money for profit ("+$4.00" / "-$2.50"). 0 renders as "$0.00".
  function moneySigned(n) {
    const v = Number(n) || 0;
    const sign = v > 0 ? "+" : (v < 0 ? "-" : "");
    return sign + "$" + Math.abs(v).toFixed(2);
  }

  /* ===========================================================================
     [SALES MATH]  — SPE-12/13/14. Single source of truth for profit math.
     All formulas follow the documented invariants I1..I5 exactly.
     ---------------------------------------------------------------------------
     I5: single-sale profit = sale.price - costPaid - sale.fee
         bundle profit      = bundle.totalPrice - Σ costPaid(items) - bundle.fee
     A "single sale" is a sold item whose sale.bundleId is null. Bundled items
     carry sale.price = 0 and sale.fee = 0 (revenue/fee live on the Bundle, I4),
     so they are NEVER counted individually — only via their Bundle.
     =========================================================================== */
  const Sales = (function () {
    function num(n) { return Number(n) || 0; }

    // A sold, non-bundled item.
    function isSingleSale(i) {
      return i && i.status === STATUS.SOLD && i.sale && i.sale.bundleId == null;
    }
    function singleProfit(i) {
      return num(i.sale.price) - num(i.costPaid) - num(i.sale.fee);
    }
    // Items belonging to a bundle (resolved from the bundle's itemIds).
    function bundleItems(bundle) {
      return (bundle.itemIds || []).map(function (id) { return AppStore.getItem(id); })
        .filter(Boolean);
    }
    function bundleCost(bundle) {
      return bundleItems(bundle).reduce(function (s, it) { return s + num(it.costPaid); }, 0);
    }
    function bundleProfit(bundle) {
      return num(bundle.totalPrice) - bundleCost(bundle) - num(bundle.fee);
    }

    // ---- Dashboard aggregates (SPE-14) ----
    function summary() {
      const items = AppStore.listItems();       // ALL items
      const bundles = AppStore.listBundles();

      // Total spend: costPaid of EVERY item, any status (I1/I2).
      const totalSpent = items.reduce(function (s, i) { return s + num(i.costPaid); }, 0);

      const singles = items.filter(isSingleSale);

      // Revenue = Σ single-sale prices + Σ bundle totalPrices.
      const singleRevenue = singles.reduce(function (s, i) { return s + num(i.sale.price); }, 0);
      const bundleRevenue = bundles.reduce(function (s, b) { return s + num(b.totalPrice); }, 0);
      const revenue = singleRevenue + bundleRevenue;

      // Fees = Σ single-sale fees + Σ bundle fees.
      const singleFees = singles.reduce(function (s, i) { return s + num(i.sale.fee); }, 0);
      const bundleFees = bundles.reduce(function (s, b) { return s + num(b.fee); }, 0);
      const fees = singleFees + bundleFees;

      // Net profit = Σ profit of each sale/bundle. This equals
      // revenue - fees - (cost of SOLD items only). We do NOT subtract the cost
      // of unsold inventory here.
      const singleProfitTotal = singles.reduce(function (s, i) { return s + singleProfit(i); }, 0);
      const bundleProfitTotal = bundles.reduce(function (s, b) { return s + bundleProfit(b); }, 0);
      const netProfit = singleProfitTotal + bundleProfitTotal;

      // Cost of sold items (for the transparency line): revenue - fees - profit.
      const costOfSold = revenue - fees - netProfit;
      // Unsold inventory cost = total spent - cost of sold items.
      const unsoldCost = totalSpent - costOfSold;

      // Status counts.
      const counts = { draft: 0, listed: 0, sold: 0, "not-listing": 0 };
      items.forEach(function (i) { if (counts[i.status] != null) counts[i.status]++; });

      return {
        totalSpent: totalSpent,
        revenue: revenue,
        fees: fees,
        netProfit: netProfit,
        costOfSold: costOfSold,
        unsoldCost: unsoldCost,
        counts: counts,
        soldCount: singles.length,   // sold ITEMS via single sales
        bundleCount: bundles.length
      };
    }

    // ---- Recent sales feed (SPE-14): single sales + bundles, newest first ----
    // Each entry: { kind:'single'|'bundle', date, ...refs }.
    function recentSales() {
      const out = [];
      AppStore.listItems().filter(isSingleSale).forEach(function (i) {
        out.push({ kind: "single", date: (i.sale && i.sale.date) || i.createdAt, item: i });
      });
      AppStore.listBundles().forEach(function (b) {
        out.push({ kind: "bundle", date: b.date, bundle: b });
      });
      out.sort(function (a, b) { return b.date - a.date; });
      return out;
    }

    return {
      isSingleSale: isSingleSale, singleProfit: singleProfit,
      bundleItems: bundleItems, bundleCost: bundleCost, bundleProfit: bundleProfit,
      summary: summary, recentSales: recentSales
    };
  })();

  // Format an epoch-ms date as a short, friendly label (e.g. "Jul 4, 2026").
  function formatSaleDate(ms) {
    const d = new Date(Number(ms) || Date.now());
    if (isNaN(d.getTime())) return "";
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }
  // Today as a yyyy-mm-dd string for <input type="date"> defaults.
  function todayInputValue() {
    const d = new Date();
    const p = function (n) { return String(n).padStart(2, "0"); };
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
  }
  // Parse a yyyy-mm-dd input value into epoch ms (local midnight). Falls back to now.
  function dateInputToMs(val) {
    if (!val) return Date.now();
    const parts = String(val).split("-");
    if (parts.length !== 3) return Date.now();
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return isNaN(d.getTime()) ? Date.now() : d.getTime();
  }

  /* ===========================================================================
     [ADD FLOW]  — SPE-6 (intake) / SPE-7 (AI listing) / SPE-9 (links)
     ---------------------------------------------------------------------------
     The Add Item tab is a small step machine rendered into #addFlow by
     renderAdd(). Steps:
       'intake'  - photo + fields form (SPE-6)
       'done'    - saved confirmation (only via "Save without listing")

     SPE-21: "Generate listing" is now NON-BLOCKING. It saves the draft item,
     enqueues background research (GenQueue), toasts, and resets straight back to
     a fresh intake form — it no longer walks through 'loading'/'review'/'error'
     here. Those steps are gone from the Add flow; review + the failure/retry
     escape hatches (retry, fill-in-manually, copy-debug — all from SPE-20) now
     live in Inventory item detail (see inventoryDetailHTML / GenQueue).

     All transient step state lives in `addState` (NOT in AppStore — it's UI
     scratch, not persisted). The item itself is created in AppStore as a
     'draft' the moment intake is saved.
     =========================================================================== */
  const addState = {
    step: "intake",
    // intake form working values
    form: null,          // { photo, category, categoryOther, brand, size, condition, costPaid }
    error: "",           // validation error text
    // the draft Item id once created in the store
    itemId: null
  };

  function freshForm() {
    return { photo: null, category: "", categoryOther: "", brand: "", size: "", condition: "", costPaid: "" };
  }

  function renderAdd() {
    const host = document.getElementById("addFlow");
    if (!host) return;
    if (!addState.form) addState.form = freshForm();

    switch (addState.step) {
      case "done":    host.innerHTML = addFlowDoneHTML(); break;
      case "intake":
      default:        host.innerHTML = addFlowIntakeHTML(); break;
    }
    wireAddFlow();
  }

  function addFlowDoneHTML() {

  function numOrEmpty(n) {
    if (n == null || n === "" || isNaN(Number(n))) return "";
    return String(Number(n));
  }

  /* ---------------------- event wiring for the current step ---------------------- */
  function wireAddFlow() {
    const host = document.getElementById("addFlow");
    if (!host) return;

    // Persist form field edits back into addState on input (so re-renders keep them).
    function bindInput(id, key) {
      const el = document.getElementById(id);
      if (el) el.addEventListener("input", function () { addState.form[key] = el.value; });
    }

    if (addState.step === "intake") {
      // Photo picking
      const photoInput = document.getElementById("photoInput");
      const libraryInput = document.getElementById("photoLibraryInput");
      const zone = host.querySelector('[data-act="pickphoto"]');
      if (zone && photoInput) zone.addEventListener("click", function () { photoInput.click(); });
      const retake = host.querySelector('[data-act="retake"]');
      if (retake && photoInput) retake.addEventListener("click", function () { photoInput.click(); });
      host.querySelectorAll('[data-act="picklibrary"]').forEach(function (btn) {
        if (libraryInput) btn.addEventListener("click", function () { libraryInput.click(); });
      });
      const removeP = host.querySelector('[data-act="removephoto"]');
      if (removeP) removeP.addEventListener("click", function () {
        addState.form.photo = null; renderAdd();
      });
      if (photoInput) photoInput.addEventListener("change", onPhotoChosen);
      if (libraryInput) libraryInput.addEventListener("change", onPhotoChosen);

      // Text fields
      bindInput("f-brand", "brand");
      bindInput("f-size", "size");
      bindInput("f-cost", "costPaid");
      bindInput("f-category-other", "categoryOther");
      const cat = document.getElementById("f-category");
      if (cat) cat.addEventListener("change", function () {
        addState.form.category = cat.value;
        renderAdd(); // re-render to show/hide the custom field
      });
      const cond = document.getElementById("f-condition");
      if (cond) cond.addEventListener("change", function () { addState.form.condition = cond.value; });

      const genBtn = document.getElementById("genListingBtn");
      if (genBtn) genBtn.addEventListener("click", onGenerateListing);
      const saveNo = document.getElementById("saveNoListingBtn");
      if (saveNo) saveNo.addEventListener("click", onSaveWithoutListing);
    }

    if (addState.step === "done") {
      const again = document.getElementById("addAnotherBtn");
      if (again) again.addEventListener("click", function () { resetAddFlow(); renderAdd(); });
      const inv = document.getElementById("viewInventoryBtn");
      if (inv) inv.addEventListener("click", function () { resetAddFlow(); Router.go("inventory"); });
    }
  }

  /* ---------------------- intake actions (SPE-6) ---------------------- */
  async function onPhotoChosen(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      addState.form.photo = await compressImage(file, PHOTO_MAX_EDGE, PHOTO_QUALITY);
    } catch (err) {
      console.error("[photo] compression failed:", err);
      addState.error = { field: "photo", msg: "Couldn't read that image. Try another." };
    }
    renderAdd();
  }

  // Read a File, draw to canvas capped at maxEdge, export JPEG dataURL.
  function compressImage(file, maxEdge, quality) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader();
      reader.onerror = function () { reject(new Error("read error")); };
      reader.onload = function () {
        const img = new Image();
        img.onerror = function () { reject(new Error("decode error")); };
        img.onload = function () {
          let w = img.naturalWidth || img.width;
          let h = img.naturalHeight || img.height;
          if (!w || !h) { reject(new Error("bad dimensions")); return; }
          const scale = Math.min(1, maxEdge / Math.max(w, h));
          const cw = Math.max(1, Math.round(w * scale));
          const ch = Math.max(1, Math.round(h * scale));
          const canvas = document.createElement("canvas");
          canvas.width = cw; canvas.height = ch;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, cw, ch);
          try {
            resolve(canvas.toDataURL("image/jpeg", quality));
          } catch (err) { reject(err); }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // Validate + build the item payload from the intake form.
  // Returns { ok:true, payload } or { ok:false, error:{field,msg} }.
  function readIntake() {
    const f = addState.form;
    const category = (f.category === "__other" ? f.categoryOther : f.category).trim();
    const brand = (f.brand || "").trim();
    const costRaw = String(f.costPaid).trim();
    const cost = parseFloat(costRaw);

    if (costRaw === "" || isNaN(cost) || cost < 0) {
      return { ok: false, error: { field: "cost", msg: "Cost paid is required (0 or more)." } };
    }
    if (!category && !brand) {
      return { ok: false, error: { field: "category", msg: "Enter at least a category or a brand." } };
    }
    return {
      ok: true,
      payload: {
        photo: f.photo || null,
        category: category,
        brand: brand,
        size: (f.size || "").trim(),
        condition: f.condition || "",
        costPaid: cost
      }
    };
  }

  // Ensure a draft Item exists in the store for the current intake; returns id.
  function ensureDraftItem(payload) {
    if (addState.itemId && AppStore.getItem(addState.itemId)) {
      AppStore.updateItem(addState.itemId, payload);
      return addState.itemId;
    }
    const item = AppStore.addItem(Object.assign({ status: STATUS.DRAFT }, payload));
    addState.itemId = item.id;
    return item.id;
  }

  function onSaveWithoutListing() {
    const res = readIntake();
    if (!res.ok) { addState.error = res.error; renderAdd(); return; }
    addState.error = "";
    withoutAddRerender(function () { ensureDraftItem(res.payload); }); // stays 'draft', no listing
    addState.step = "done";
    renderAdd();
  }

  // SPE-21: "Generate listing" is now NON-BLOCKING. We save the item as a draft,
  // enqueue background research for it, briefly confirm, and immediately reset the
  // Add flow to a fresh intake form so Alissa can photograph the next item while
  // research runs. Review happens later in Inventory item detail (see GenQueue).
  function onGenerateListing() {
    const res = readIntake();
    if (!res.ok) { addState.error = res.error; addState.step = "intake"; renderAdd(); return; }
    addState.error = "";
    let itemId = null;
    withoutAddRerender(function () {
      itemId = ensureDraftItem(res.payload); // create/refresh the draft item
    });
    // Kick off background generation (sets gen:"pending" + notifies).
    if (itemId) GenQueue.enqueue(itemId);
    // Confirm + reset to a fresh intake form for the next item.
    showCopiedToast("Researching prices — keep adding items");
    resetAddFlow();
    renderAdd();
  }

  // SPE-20: a draft is usable if it has a non-empty title OR at least one
  // non-empty platform text. Anything less is a blank review — reject it.
  function isDraftUsable(d) {
    if (!d || typeof d !== "object") return false;
    if (typeof d.title === "string" && d.title.trim() !== "") return true;
    const plats = d.platforms || {};
    for (let i = 0; i < PLATFORMS.length; i++) {
      const v = plats[PLATFORMS[i]];
      if (typeof v === "string" && v.trim() !== "") return true;
    }
    return false;
  }

  // Coerce whatever generate() returned into a clean listing object.
  function normalizeDraft(raw) {
    const base = AppStore.makeListing();
    if (raw && typeof raw === "object") {
      if (typeof raw.title === "string") base.title = raw.title;
      if (typeof raw.description === "string") base.description = raw.description;
      const sp = Number(raw.suggestedPrice);
      base.suggestedPrice = isNaN(sp) ? "" : sp;
      if (raw.platforms && typeof raw.platforms === "object") {
        PLATFORMS.forEach(function (p) {
          if (typeof raw.platforms[p] === "string") base.platforms[p] = raw.platforms[p];
        });
      }
    }
    return base;
  }

  /* ===========================================================================
     SPE-24 fix 4 — post-parse sanitation + garbage detection.
     ---------------------------------------------------------------------------
     On-device evidence showed generated copy containing:
       - literal emoji-escape residue: `ud83dude0a`, `u2728` (backslashes eaten)
       - stray leading `t` from a mangled `\t`
       - titles that were research prose / fragments / just `","`
       - a fractional price like 22.261
     sanitizeDraft() scrubs each string field; draftLooksBroken() flags a draft
     that is still garbage after scrubbing so GenQueue can auto-regenerate once.
     Both are pure — no DOM, no store — so they're unit-testable in-page.
     =========================================================================== */

  // Reconstruct the real character from a surrogate PAIR (e.g. "d83d","de0a" -> 😊)
  // or a lone BMP codepoint ("2728" -> ✨). Returns the character, or "" if the
  // hex doesn't form a plausible codepoint.
  function reconstructFromHex(hi, lo) {
    try {
      if (hi && lo) {
        const h = parseInt(hi, 16), l = parseInt(lo, 16);
        if (h >= 0xd800 && h <= 0xdbff && l >= 0xdc00 && l <= 0xdfff) {
          return String.fromCharCode(h, l);   // valid surrogate pair
        }
        return "";
      }
      if (hi) {
        const cp = parseInt(hi, 16);
        // Plausible standalone codepoint (skip lone surrogate halves — those are
        // broken residue with nothing to pair, so drop them).
        if (cp >= 0x20 && cp <= 0xffff && !(cp >= 0xd800 && cp <= 0xdfff)) {
          return String.fromCharCode(cp);
        }
      }
    } catch (_) {}
    return "";
  }

  // Strip orphaned escape artifacts: `ud83dude0a`-style surrogate-pair residue
  // (reconstruct the emoji), and standalone `uXXXX` hex (reconstruct or drop).
  // Only touches sequences NOT preceded by a backslash (a real "\uXXXX" inside a
  // JSON string was already decoded by JSON.parse; what's left here is visible-text
  // residue from broken escaping) and NOT part of a longer word.
  function stripEscapeResidue(s) {
    if (typeof s !== "string" || !s) return s;
    let out = s;
    // Surrogate PAIR: u d[89ab]xx u d[cdef]xx  -> reconstruct to the real emoji.
    out = out.replace(/(?<!\\)\bu(d[89ab][0-9a-f]{2})u(d[c-f][0-9a-f]{2})\b/gi, function (m, hi, lo) {
      return reconstructFromHex(hi, lo) || "";
    });
    // Any remaining lone surrogate-half residue like `ud83d` with no partner -> drop.
    out = out.replace(/(?<!\\)\bu(d[89ab][0-9a-f]{2})\b/gi, function () { return ""; });
    // Standalone uXXXX (a plausible BMP codepoint) -> reconstruct the character.
    out = out.replace(/(?<!\\)(?<!\w)u([0-9a-f]{4})\b/gi, function (m, hex) {
      const ch = reconstructFromHex(hex, null);
      return ch !== "" ? ch : m;   // leave it if it isn't a plausible codepoint
    });
    return out;
  }

  // Sanitize one string field. `isTitle` true => strip ALL control chars (tabs +
  // newlines); otherwise keep newlines (paragraphs matter in descriptions / platform
  // texts) but still drop tabs and other control chars.
  function sanitizeString(s, isTitle) {
    if (typeof s !== "string") return s;
    let out = stripEscapeResidue(s);
    if (isTitle) {
      // Titles are single-line: ALL control chars (tabs/newlines/etc.) -> space.
      out = out.replace(/[\x00-\x1f\x7f]+/g, " ");
    } else {
      // Keep newlines (\x0a) + CR (\x0d); drop tabs and other control chars. A
      // mangled \t shows as a stray leading "t", but a genuine tab is possible too
      // — turn tabs into a space, strip the rest.
      out = out.replace(/\t+/g, " ").replace(/[\x00-\x09\x0b\x0c\x0e-\x1f\x7f]+/g, "");
    }
    // Collapse runs of spaces/tabs (but not newlines) into a single space.
    out = out.replace(/[ \t]{2,}/g, " ");
    if (isTitle) {
      // Trim leading/trailing junk punctuation (commas, colons, periods, quotes,
      // semicolons) plus surrounding whitespace.
      out = out.replace(/^[\s"',:;.‘’“”]+/, "")
               .replace(/[\s"',:;‘’“”]+$/, "")
               .trim();
    } else {
      out = out.replace(/[ \t]+\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
    }
    return out;
  }

  // Sanitize an already-normalized draft (mutates a copy; returns it).
  function sanitizeDraft(draft) {
    const d = normalizeDraft(draft);   // guarantees shape even if given a raw obj
    d.title = sanitizeString(d.title, true);
    d.description = sanitizeString(d.description, false);
    if (d.platforms && typeof d.platforms === "object") {
      PLATFORMS.forEach(function (p) {
        d.platforms[p] = sanitizeString(d.platforms[p], false);
      });
    }
    // Round price to 2 decimals (22.261 -> 22.26). Keep "" if not numeric.
    const sp = Number(d.suggestedPrice);
    d.suggestedPrice = isNaN(sp) ? "" : Math.round(sp * 100) / 100;
    return d;
  }

  // Heuristic: does a SANITIZED draft still look like garbage? Any one trips it.
  // Substrings taken from the on-device Calia/research-prose evidence.
  const DRAFT_TITLE_GARBAGE = ["<", "code_execution", "$ range", "Poshmark, and eBay", "http", "search result"];
  function draftLooksBroken(draft) {
    if (!draft || typeof draft !== "object") return true;
    const title = typeof draft.title === "string" ? draft.title : "";
    const desc = typeof draft.description === "string" ? draft.description : "";
    if (title.trim() === "") return true;
    if (title.length > 120) return true;
    for (let i = 0; i < DRAFT_TITLE_GARBAGE.length; i++) {
      if (title.indexOf(DRAFT_TITLE_GARBAGE[i]) !== -1) return true;
    }
    if (desc.trim().length < 20 && title.trim().length < 8) return true;
    const plats = draft.platforms || {};
    for (let i = 0; i < PLATFORMS.length; i++) {
      const v = plats[PLATFORMS[i]];
      if (typeof v !== "string" || v.trim().length < 25) return true;
    }
    const price = Number(draft.suggestedPrice);
    if (isNaN(price) || price <= 0 || price > 500) return true;
    return false;
  }

  function resetAddFlow() {
    addState.step = "intake";
    addState.form = freshForm();
    addState.error = "";
    addState.itemId = null;
  }

  /* ---------------------- copy-to-clipboard w/ fallback (SPE-8) ---------------------- */
  let copyToastTimer = null;
  function showCopiedToast(msg) {
    let el = document.getElementById("copiedToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "copiedToast";
      el.className = "copied-toast";
      document.body.appendChild(el);
    }
    el.textContent = msg || "Copied!";
    // force reflow so re-triggering the transition works
    void el.offsetWidth;
    el.classList.add("show");
    if (copyToastTimer) clearTimeout(copyToastTimer);
    copyToastTimer = setTimeout(function () { el.classList.remove("show"); }, 1400);
  }

  // SPE-21: tappable toast for background-generation results. Reuses the
  // .copied-toast pill look but adds .tappable styling + an onTap handler
  // (typically jumpToItemDetail). Stays a little longer than the copy toast so
  // Alissa — who may be mid-typing on the next item — has time to tap it.
  let genToastTimer = null;
  function showGenToast(msg, itemId) {
    let el = document.getElementById("genToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "genToast";
      el.className = "copied-toast gen-toast";
      el.setAttribute("role", "status");
      document.body.appendChild(el);
    }
    el.textContent = msg;
    // Rebind the tap handler for THIS toast's item (clone to drop old listeners).
    const fresh = el.cloneNode(true);
    el.parentNode.replaceChild(fresh, el);
    el = fresh;
    el.addEventListener("click", function () {
      el.classList.remove("show");
      if (itemId && AppStore.getItem(itemId)) jumpToItemDetail(itemId);
    });
    void el.offsetWidth;
    el.classList.add("show");
    if (genToastTimer) clearTimeout(genToastTimer);
    genToastTimer = setTimeout(function () { el.classList.remove("show"); }, 4200);
  }

  // Non-blocking storage warning banner (SPE-15). Shows briefly; never blocks.
  let storageWarnTimer = null;
  function showStorageWarning(msg) {
    let el = document.getElementById("storageWarn");
    if (!el) {
      el = document.createElement("div");
      el.id = "storageWarn";
      el.className = "storage-warn";
      el.setAttribute("role", "status");
      document.body.appendChild(el);
    }
    el.textContent = msg;
    void el.offsetWidth;
    el.classList.add("show");
    if (storageWarnTimer) clearTimeout(storageWarnTimer);
    storageWarnTimer = setTimeout(function () { el.classList.remove("show"); }, 6000);
  }

  function copyText(text, btn) {
    function done() {
      showCopiedToast("Copied!");
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(function () { btn.textContent = orig; }, 1200);
      }
    }
    function fallback() {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        done();
      } catch (e) {
        console.warn("[copy] fallback failed:", e);
      }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else {
      fallback();
    }
  }

  /* ===========================================================================
     [INVENTORY]  — SPE-10 (list + detail) / SPE-11 (Not Listing / delete)
     ---------------------------------------------------------------------------
     The Inventory tab is a two-mode view (list <-> item detail) rendered by
     renderInventory() into #inventoryList. Like the Add flow, it keeps transient
     UI scratch in `invState` (NOT persisted — it's view state, not data).

     Because the store notifies on every mutation and renderActive() re-renders
     the visible tab, renderInventory() must be safe to call at any time: it
     rebuilds from invState + AppStore each call. Detail-view edits save via
     AppStore.updateItem; the resulting notify() re-renders detail in place.
     If the currently-open detail item is deleted, we fall back to the list.

     invState = {
       mode:   'list' | 'detail',
       filter: one of INV_FILTERS keys (default 'active'),
       itemId: string|null,            // item shown in detail mode
       confirmDelete: bool             // delete-confirm step visible in detail
     }
     =========================================================================== */
  const invState = {
    mode: "list", filter: "active", itemId: null, confirmDelete: false,
    // SPE-12: in-detail "Mark as Sold" form + success moment.
    saleForm: null,        // { price, platform, fee } working values, or null when closed
    saleDone: null,        // { profit } to show the success moment after confirming
    confirmUndo: false,    // undo-sale confirm step
    // SPE-13: delete-bundle confirm (shown on a bundled item's detail)
    confirmBundleDelete: false,
    // SPE-13: multi-select bundle mode over the list
    selectMode: false,
    selected: {},          // { itemId: true }
    bundleStep: "select",  // 'select' | 'form'
    bundleForm: null,      // { totalPrice, platform, fee, date }
    bundleDone: null       // { bundleId, profit } success moment after creating a bundle
  };

  // Filter chips. `test(item)` decides membership. "Active" excludes both
  // not-listing and sold (ticket SPE-10); the store's {active:true} only drops
  // not-listing, so we filter here to also drop sold.
  const INV_FILTERS = [
    { key: "active",      label: "Active",      test: function (i) { return i.status !== STATUS.NOT_LISTING && i.status !== STATUS.SOLD; } },
    { key: "all",         label: "All",         test: function () { return true; } },
    { key: "listed",      label: "Listed",      test: function (i) { return i.status === STATUS.LISTED; } },
    { key: "draft",       label: "Draft",       test: function (i) { return i.status === STATUS.DRAFT; } },
    { key: "sold",        label: "Sold",        test: function (i) { return i.status === STATUS.SOLD; } },
    { key: "not-listing", label: "Not Listing", test: function (i) { return i.status === STATUS.NOT_LISTING; } }
  ];

  // Display title for an item: listing title if present, else brand + category.
  function itemDisplayTitle(i) {
    if (i.listing && i.listing.title && i.listing.title.trim()) return i.listing.title.trim();
    const t = [i.brand, i.category].filter(Boolean).join(" ");
    return t || "Untitled item";
  }

  // Key-details line: brand · size · condition · cost paid (only present bits).
  function itemDetailLine(i) {
    return [
      i.brand || "",
      i.size ? "Size " + i.size : "",
      i.condition ? (CONDITION_LABELS[i.condition] || i.condition) : "",
      "Cost " + money(i.costPaid)
    ].filter(Boolean).join(" · ");
  }

  // Neutral placeholder icon markup for items without a photo.
  function thumbHTML(i, cls) {
    if (i.photo) {
      return '<img class="' + cls + '" src="' + i.photo + '" alt="" />';
    }
    return '<div class="' + cls + ' placeholder-thumb">&#128248;</div>'; // 📸
  }

  // ---- Inventory dispatcher (SPE-10/11/13) ----
  function renderInventory() {
    const el = document.getElementById("inventoryList");
    if (!el) return;

    // SPE-22: the whole #inventoryList is about to be rebuilt, tearing down any
    // research-panel span. Kill the elapsed-timer interval up front; if the new
    // render is a pending detail, wireInventoryDetail() starts a fresh one. This
    // single choke point guarantees at most one live interval across every path
    // (detail↔list, tab switch, item deleted, gen resolved).
    stopResearchTimer();

    // Bundle success moment (SPE-13) takes over the whole list view briefly.
    if (invState.bundleDone) {
      el.innerHTML = bundleDoneHTML();
      wireBundleDone();
      return;
    }

    // Bundle multi-select / form flow (SPE-13) replaces the normal list.
    if (invState.selectMode) {
      if (invState.bundleStep === "form") {
        el.innerHTML = bundleFormHTML();
        wireBundleForm();
      } else {
        el.innerHTML = bundleSelectHTML();
        wireBundleSelect();
      }
      return;
    }

    if (invState.mode === "detail") {
      const item = invState.itemId ? AppStore.getItem(invState.itemId) : null;
      if (!item) {
        // Item vanished (e.g. deleted) — fall back to the list.
        invState.mode = "list";
        invState.itemId = null;
        resetDetailFlags();
      } else {
        el.innerHTML = inventoryDetailHTML(item);
        wireInventoryDetail(item);
        return;
      }
    }
    el.innerHTML = inventoryListHTML();
    wireInventoryList();
  }

  // Items eligible for a bundle sale: not already sold, not "not-listing".
  function sellableItems() {
    return AppStore.listItems().filter(function (i) {
      return i.status !== STATUS.SOLD && i.status !== STATUS.NOT_LISTING;
    });
  }

  /* ---------------------- MODE: list (SPE-10) ---------------------- */
  function inventoryListHTML() {
    const all = AppStore.listItems(); // newest first
    const active = INV_FILTERS.find(function (f) { return f.key === invState.filter; }) || INV_FILTERS[0];
    const shown = all.filter(active.test);

    const chips = INV_FILTERS.map(function (f) {
      const count = all.filter(f.test).length;
      return '<button class="chip' + (f.key === invState.filter ? " active" : "") + '" ' +
        'data-filter="' + f.key + '">' + escapeHtml(f.label) +
        '<span class="count">' + count + '</span></button>';
    }).join("");

    let body;
    if (all.length === 0) {
      body =
        '<div class="card"><div class="placeholder">' +
        '<span class="emoji">&#128230;</span>' +
        'No items yet. Add your first from the <b>Add Item</b> tab.' +
        '</div></div>';
    } else if (shown.length === 0) {
      body =
        '<div class="card"><div class="placeholder">' +
        '<span class="emoji">&#128269;</span>' +
        'Nothing under <b>' + escapeHtml(active.label) + '</b>.' +
        '<div class="muted" style="margin-top:8px;">Try another filter, or add items from the <b>Add Item</b> tab.</div>' +
        '</div></div>';
    } else {
      body = shown.map(inventoryRowHTML).join("");
    }

    // "Bundle Sale" entry point (SPE-13): only when >=2 sellable items exist.
    const bundleBar = sellableItems().length >= 2
      ? '<div class="bundle-bar">' +
          '<button class="btn secondary small" type="button" id="startBundleBtn">' +
          '&#128230; Bundle Sale</button>' +
        '</div>'
      : "";

    return '<div class="filter-chips">' + chips + '</div>' + bundleBar + body;
  }

  function inventoryRowHTML(i) {
    // SPE-21: background-generation badge alongside the status badge.
    //   gen === "pending"  -> animated "Researching…" pill
    //   gen.failed         -> warning "Failed — retry" pill
    var genBadge = "";
    if (i.gen === "pending") {
      genBadge = '<span class="badge gen-pending">&#128269; Researching&hellip;</span>';
    } else if (i.gen && i.gen.failed) {
      genBadge = '<span class="badge gen-failed">Failed — retry</span>';
    }
    return '' +
      '<button class="inv-row" data-item="' + i.id + '">' +
        thumbHTML(i, "inv-thumb") +
        '<div class="inv-meta">' +
          '<div class="inv-title">' + escapeHtml(itemDisplayTitle(i)) + '</div>' +
          '<div class="inv-sub">' + escapeHtml(itemDetailLine(i)) + '</div>' +
          '<div class="inv-badges"><span class="badge ' + i.status + '">' + statusLabel(i.status) + '</span>' +
            genBadge + '</div>' +
        '</div>' +
        '<span class="inv-chevron">&rsaquo;</span>' +
      '</button>';
  }

  function wireInventoryList() {
    const el = document.getElementById("inventoryList");
    if (!el) return;
    const startBundle = document.getElementById("startBundleBtn");
    if (startBundle) startBundle.addEventListener("click", function () {
      invState.selectMode = true;
      invState.bundleStep = "select";
      invState.selected = {};
      invState.bundleForm = null;
      renderInventory();
    });
    el.querySelectorAll(".chip").forEach(function (btn) {
      btn.addEventListener("click", function () {
        invState.filter = btn.getAttribute("data-filter");
        renderInventory();
      });
    });
    el.querySelectorAll(".inv-row").forEach(function (row) {
      row.addEventListener("click", function () {
        // In multi-select mode, rows toggle selection instead of opening detail.
        if (invState.selectMode) {
          const iid = row.getAttribute("data-item");
          if (invState.selected[iid]) delete invState.selected[iid];
          else invState.selected[iid] = true;
          renderInventory();
          return;
        }
        invState.itemId = row.getAttribute("data-item");
        invState.mode = "detail";
        resetDetailFlags();
        const main = document.querySelector(".app-main");
        if (main) main.scrollTop = 0;
        renderInventory();
      });
    });
  }

  // Reset all per-detail transient flags (SPE-12/13) when entering/leaving detail.
  function resetDetailFlags() {
    invState.confirmDelete = false;
    invState.saleForm = null;
    invState.saleDone = null;
    invState.confirmUndo = false;
    invState.confirmBundleDelete = false;
  }

  /* =========================================================================
     SPE-13: Bundle sale flow (multi-select -> form -> confirm -> success)
     ========================================================================= */

  // Fully exit the bundle flow back to the plain list.
  function exitBundleFlow() {
    invState.selectMode = false;
    invState.bundleStep = "select";
    invState.selected = {};
    invState.bundleForm = null;
  }

  function selectedIds() {
    return Object.keys(invState.selected).filter(function (k) { return invState.selected[k]; });
  }

  /* ---------------------- STEP: multi-select ---------------------- */
  function bundleSelectHTML() {
    const items = sellableItems(); // non-sold, non-not-listing
    const n = selectedIds().length;

    const rows = items.map(function (i) {
      const on = !!invState.selected[i.id];
      return '' +
        '<button class="inv-row selectable' + (on ? " selected" : "") + '" data-item="' + i.id + '">' +
          '<span class="sel-check">' + (on ? "&#10003;" : "") + '</span>' +
          thumbHTML(i, "inv-thumb") +
          '<div class="inv-meta">' +
            '<div class="inv-title">' + escapeHtml(itemDisplayTitle(i)) + '</div>' +
            '<div class="inv-sub">' + escapeHtml(itemDetailLine(i)) + '</div>' +
            '<div class="inv-badges"><span class="badge ' + i.status + '">' + statusLabel(i.status) + '</span></div>' +
          '</div>' +
        '</button>';
    }).join("");

    return '' +
      '<div class="card">' +
        '<h2>Bundle Sale</h2>' +
        '<p class="muted">Select the items sold together, then enter one total price and one fee.</p>' +
      '</div>' +
      '<div class="select-hint">' + n + ' selected' +
        (n < 2 ? ' &middot; pick at least 2' : '') + '</div>' +
      rows +
      '<div class="bundle-actionbar">' +
        '<button class="btn secondary" type="button" data-act="bundle-cancel" style="flex:1;">Cancel</button>' +
        '<button class="btn" type="button" data-act="bundle-next" style="flex:1;"' +
          (n < 2 ? ' disabled' : '') + '>Next &rarr;</button>' +
      '</div>';
  }

  function wireBundleSelect() {
    const el = document.getElementById("inventoryList");
    if (!el) return;
    el.querySelectorAll(".inv-row").forEach(function (row) {
      row.addEventListener("click", function () {
        const iid = row.getAttribute("data-item");
        if (invState.selected[iid]) delete invState.selected[iid];
        else invState.selected[iid] = true;
        renderInventory();
      });
    });
    el.querySelectorAll("[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const act = btn.getAttribute("data-act");
        if (act === "bundle-cancel") { exitBundleFlow(); renderInventory(); }
        else if (act === "bundle-next") {
          if (selectedIds().length < 2) return;
          invState.bundleForm = { totalPrice: "", platform: PLATFORMS[0], fee: "0", date: todayInputValue() };
          invState.bundleStep = "form";
          const main = document.querySelector(".app-main");
          if (main) main.scrollTop = 0;
          renderInventory();
        }
      });
    });
  }

  /* ---------------------- STEP: bundle form ---------------------- */
  function bundleFormHTML() {
    const bf = invState.bundleForm || { totalPrice: "", platform: PLATFORMS[0], fee: "0", date: todayInputValue() };
    const ids = selectedIds();
    const items = ids.map(AppStore.getItem).filter(Boolean);
    const totalCost = items.reduce(function (s, i) { return s + (Number(i.costPaid) || 0); }, 0);

    // Summary strip of chosen items.
    const chosen = items.map(function (i) {
      return '<div class="bundle-child">' +
        thumbHTML(i, "inv-thumb") +
        '<div class="bc-meta"><div class="bc-title">' + escapeHtml(itemDisplayTitle(i)) + '</div>' +
        '<div class="bc-sub">Cost ' + money(i.costPaid) + '</div></div></div>';
    }).join("");

    const platOpts = PLATFORMS.map(function (p) {
      return '<option value="' + p + '"' + (bf.platform === p ? " selected" : "") + '>' +
        escapeHtml(PLATFORM_LABELS[p]) + '</option>';
    }).join("") +
      '<option value="other"' + (bf.platform === "other" ? " selected" : "") + '>Other</option>';

    return '' +
      '<div class="card">' +
        '<h2>Bundle Sale &middot; ' + items.length + ' items</h2>' +
        '<p class="muted">Combined cost of these items: ' + money(totalCost) + '</p>' +
        '<div class="kv-list" style="margin-top:8px;">' +
          '<div class="bundle-children" style="margin:0;">' + chosen + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="section-label">Sale details</div>' +
        '<div class="field"><label>Total price (USD)</label>' +
          '<div class="price-input-wrap"><span class="dollar">$</span>' +
          '<input id="bfTotal" type="number" inputmode="decimal" step="0.01" min="0" ' +
            'value="' + escapeHtml(bf.totalPrice) + '" placeholder="0.00" /></div></div>' +
        '<div class="row">' +
          '<div class="field"><label>Platform</label>' +
            '<select id="bfPlatform">' + platOpts + '</select></div>' +
          '<div class="field"><label>Fee (USD)</label>' +
            '<div class="price-input-wrap"><span class="dollar">$</span>' +
            '<input id="bfFee" type="number" inputmode="decimal" step="0.01" min="0" ' +
              'value="' + escapeHtml(bf.fee) + '" placeholder="0.00" /></div></div>' +
        '</div>' +
        '<div class="field"><label>Sale date</label>' +
          '<input id="bfDate" type="date" value="' + escapeHtml(bf.date) + '" /></div>' +
      '</div>' +
      '<button class="btn" type="button" data-act="bundle-confirm">Confirm bundle sale</button>' +
      '<button class="btn secondary" type="button" data-act="bundle-back" style="margin-top:10px;">&lsaquo; Back to selection</button>';
  }

  function wireBundleForm() {
    const bind = function (elId, key) {
      const inp = document.getElementById(elId);
      if (inp) inp.addEventListener("input", function () { invState.bundleForm[key] = inp.value; });
    };
    bind("bfTotal", "totalPrice");
    bind("bfFee", "fee");
    bind("bfDate", "date");
    const plat = document.getElementById("bfPlatform");
    if (plat) plat.addEventListener("change", function () { invState.bundleForm.platform = plat.value; });

    const el = document.getElementById("inventoryList");
    if (!el) return;
    el.querySelectorAll("[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const act = btn.getAttribute("data-act");
        if (act === "bundle-back") {
          invState.bundleStep = "select";
          renderInventory();
        } else if (act === "bundle-confirm") {
          onConfirmBundleSale();
        }
      });
    });
  }

  function onConfirmBundleSale() {
    const bf = invState.bundleForm;
    const ids = selectedIds();
    if (!bf || ids.length < 2) return;
    const total = parseFloat(bf.totalPrice);
    const fee = parseFloat(bf.fee);
    const platform = bf.platform || "other";
    const dateMs = dateInputToMs(bf.date);

    // Perform all store mutations together, suppressing intermediate re-renders
    // (they'd redraw the form mid-loop), then set success state + render once.
    let bundle;
    withoutInvRerender(function () {
      // Create the Bundle first (revenue + fee live here, per I4).
      bundle = AppStore.addBundle({
        date: dateMs,
        platform: platform,
        totalPrice: isNaN(total) ? 0 : total,
        fee: isNaN(fee) ? 0 : fee,
        itemIds: ids.slice()
      });
      // Mark every selected item sold, with per-item price=0 and fee=0 (I4).
      ids.forEach(function (iid) {
        AppStore.updateItem(iid, {
          status: STATUS.SOLD,
          sale: { price: 0, platform: platform, fee: 0, date: dateMs, bundleId: bundle.id }
        });
      });
    });

    const profit = Sales.bundleProfit(bundle);
    // Leave select mode; show success moment.
    invState.selectMode = false;
    invState.bundleStep = "select";
    invState.selected = {};
    invState.bundleForm = null;
    invState.bundleDone = { bundleId: bundle.id, profit: profit };
    const main = document.querySelector(".app-main");
    if (main) main.scrollTop = 0;
    renderInventory();
  }

  /* ---------------------- STEP: bundle success ---------------------- */
  function bundleDoneHTML() {
    const bd = invState.bundleDone;
    const bundle = bd ? AppStore.getBundle(bd.bundleId) : null;
    const pr = bd ? bd.profit : 0;
    const n = bundle ? (bundle.itemIds || []).length : 0;
    return '' +
      '<div class="card">' +
        '<div class="sale-form"><div class="profit-pop">' +
          '<span class="emoji">&#127881;</span>' +
          '<div class="lbl">Bundle sold &middot; ' + n + ' items</div>' +
          '<div class="amt ' + (pr >= 0 ? "pos" : "neg") + '">' + moneySigned(pr) + '</div>' +
          (bundle
            ? '<div class="sub">' + money(bundle.totalPrice) + ' total &minus; ' +
              money(Sales.bundleCost(bundle)) + ' cost &minus; ' + money(bundle.fee) + ' fee</div>'
            : '') +
        '</div></div>' +
        '<button class="btn" type="button" data-act="bundle-done-ok">Done</button>' +
      '</div>';
  }

  function wireBundleDone() {
    const el = document.getElementById("inventoryList");
    if (!el) return;
    el.querySelectorAll("[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        if (btn.getAttribute("data-act") === "bundle-done-ok") {
          invState.bundleDone = null;
          invState.filter = "active";
          renderInventory();
        }
      });
    });
  }

  /* ---------------------- MODE: item detail (SPE-10/11) ---------------------- */
  function inventoryDetailHTML(i) {
    const catLine = [i.brand, i.category].filter(Boolean).join(" ") || "Untitled item";

    // Core fields (always shown).
    const fields = [
      ["Status", statusLabel(i.status)],
      ["Brand", i.brand || "—"],
      ["Category", i.category || "—"],
      ["Size", i.size || "—"],
      ["Condition", i.condition ? (CONDITION_LABELS[i.condition] || i.condition) : "—"],
      ["Cost paid", money(i.costPaid)]
    ];
    // Sold info (SPE-12 single sale / SPE-13 bundled sale). Bundled items show the
    // bundle's figures, not per-item ones (per I4). `profitCls` colours the row.
    const soldRows = []; // each: [k, v, valueClass?]
    let bundleForItem = null;
    if (i.status === STATUS.SOLD && i.sale) {
      const platLabel = PLATFORM_LABELS[i.sale.platform] || i.sale.platform || "—";
      if (i.sale.bundleId) {
        bundleForItem = AppStore.getBundle(i.sale.bundleId);
        if (bundleForItem) {
          const bp = Sales.bundleProfit(bundleForItem);
          soldRows.push(["Sold on", PLATFORM_LABELS[bundleForItem.platform] || bundleForItem.platform || "—"]);
          soldRows.push(["Sold date", formatSaleDate(bundleForItem.date)]);
          soldRows.push(["Bundle total", money(bundleForItem.totalPrice)]);
          soldRows.push(["Bundle fee", money(bundleForItem.fee)]);
          soldRows.push(["Bundle profit", moneySigned(bp), bp >= 0 ? "pos" : "neg"]);
        }
      } else {
        const p = Sales.singleProfit(i);
        soldRows.push(["Sold for", money(i.sale.price)]);
        soldRows.push(["Sold on", platLabel]);
        soldRows.push(["Sold date", formatSaleDate(i.sale.date)]);
        soldRows.push(["Platform fee", money(i.sale.fee)]);
        soldRows.push(["Profit", moneySigned(p), p >= 0 ? "pos" : "neg"]);
      }
    }
    fields.push.apply(fields, soldRows.map(function (r) { return [r[0], r[1]]; }));

    const kv = fields.map(function (f, idx) {
      // fields beyond the base 6 are sold rows; carry their value class if any.
      const soldIdx = idx - 6;
      const cls = (soldIdx >= 0 && soldRows[soldIdx] && soldRows[soldIdx][2]) ? " " + soldRows[soldIdx][2] : "";
      return '<div class="kv-row"><span class="k">' + escapeHtml(f[0]) + '</span>' +
        '<span class="v' + cls + '">' + escapeHtml(f[1]) + '</span></div>';
    }).join("");

    // Listing block. SPE-21 adds two states BEFORE a listing exists:
    //   gen === "pending"  -> research-in-progress panel (no editable fields yet)
    //   gen.failed         -> failure panel: message + Retry + Fill-in-manually +
    //                         Copy debug info (the SPE-20 error-step escape hatches,
    //                         moved here from the old add-flow error step)
    // Otherwise: editable listing (if present) or the plain no-listing placeholder.
    let listingBlock = "";
    if (i.gen === "pending") {
      // Animated research panel — CSS pulse, no gif.
      listingBlock =
        '<div class="card">' +
          '<div class="research-panel">' +
            '<div class="research-orbit"><span class="research-dot"></span></div>' +
            '<div style="font-weight:650;color:var(--ink);">&#128269; Researching prices&hellip;</div>' +
            // SPE-22: elapsed indicator — ticks via a 1s interval wired in
            // wireInventoryDetail; span filled by startResearchTimer().
            '<div class="muted" style="margin-top:6px;">Researching for ' +
              '<span id="researchElapsed">0s</span> — typically takes 1–3 minutes</div>' +
            '<div class="muted" style="margin-top:6px;">Searching Poshmark, eBay, Mercari &amp; Depop for comparables. ' +
              'You can keep adding items — the listing will land here when it’s ready.</div>' +
          '</div>' +
        '</div>';
    } else if (i.gen && i.gen.failed) {
      // Failure panel (SPE-20 escape hatches moved to detail).
      listingBlock =
        '<div class="card">' +
          '<h2>Couldn’t generate a listing</h2>' +
          '<p class="muted">' + escapeHtml(i.gen.failed) + '</p>' +
          '<button class="btn" type="button" data-act="gen-retry">Retry</button>' +
          '<button class="btn secondary" type="button" data-act="gen-manual" style="margin-top:10px;">Fill in manually</button>' +
          // SPE-20: copy a redacted debug snapshot to send to the developer.
          '<button class="btn ghost debug-copy-btn" type="button" data-act="gen-copy-debug">Copy debug info</button>' +
        '</div>';
    } else if (i.listing) {
      const d = i.listing;
      const platformBlocks = PLATFORMS.map(function (p) {
        return '' +
          '<div class="platform-block" data-platform="' + p + '">' +
            '<div class="phead">' +
              '<span class="pname"><span class="pdot ' + p + '"></span>' + escapeHtml(PLATFORM_LABELS[p]) + '</span>' +
              '<div class="pactions">' +
                '<button class="btn secondary" type="button" data-copy="' + p + '">Copy</button>' +
                '<button class="btn ghost" type="button" data-go="' + p + '">Go to ' + escapeHtml(PLATFORM_LABELS[p]) + '</button>' +
              '</div>' +
            '</div>' +
            '<textarea data-dfield="platform" data-platform-field="' + p + '">' + escapeHtml(d.platforms[p] || "") + '</textarea>' +
          '</div>';
      }).join("");

      listingBlock = '' +
        '<div class="card">' +
          '<div class="section-label">Listing &middot; everything editable</div>' +
          '<div class="field"><label>Title</label>' +
            '<input data-dfield="title" value="' + escapeHtml(d.title || "") + '" /></div>' +
          '<div class="field"><label>Description</label>' +
            '<textarea data-dfield="description" style="min-height:110px;">' + escapeHtml(d.description || "") + '</textarea></div>' +
          '<div class="field"><label>Suggested price (USD)</label>' +
            '<div class="price-input-wrap"><span class="dollar">$</span>' +
            '<input data-dfield="suggestedPrice" type="number" inputmode="decimal" step="0.01" min="0" ' +
              'value="' + escapeHtml(numOrEmpty(d.suggestedPrice)) + '" /></div></div>' +
        '</div>' +
        '<div class="card">' +
          '<div class="section-label">Per-platform text</div>' +
          platformBlocks +
        '</div>';
    } else {
      listingBlock =
        '<div class="card"><div class="placeholder" style="padding:24px 12px;">' +
        '<span class="emoji">&#128221;</span>' +
        'No listing yet for this item.' +
        '<div class="muted" style="margin-top:6px;">This is a draft. Generate a listing from the Add Item tab.</div>' +
        '</div></div>';
    }

    // Status actions (SPE-11) + Mark as Sold / Undo sale (SPE-12/13).
    let statusActions = "";
    const isNotListing = i.status === STATUS.NOT_LISTING;
    if (isNotListing) {
      // Reverse action: relist. Back to draft if no listing, else listed.
      statusActions =
        '<button class="btn secondary" type="button" data-act="relist">Back to inventory</button>';
    } else if (i.status === STATUS.SOLD) {
      // ---- Sold item: success moment (just marked) OR Undo sale action ----
      if (invState.saleDone && invState.saleDone.itemId === i.id) {
        const pr = invState.saleDone.profit;
        statusActions =
          '<div class="sale-form"><div class="profit-pop">' +
            '<span class="emoji">&#127881;</span>' +
            '<div class="lbl">Sold! Your profit</div>' +
            '<div class="amt ' + (pr >= 0 ? "pos" : "neg") + '">' + moneySigned(pr) + '</div>' +
            '<div class="sub">' + money(i.sale.price) + ' sale &minus; ' + money(i.costPaid) +
              ' cost &minus; ' + money(i.sale.fee) + ' fee</div>' +
          '</div></div>' +
          '<button class="btn" type="button" data-act="sale-done-ok" style="margin-top:10px;">Done</button>';
      } else if (i.sale && i.sale.bundleId) {
        // Part of a bundle — undo is blocked; must delete the bundle instead.
        if (invState.confirmBundleDelete && bundleForItem) {
          const others = (bundleForItem.itemIds || []).length;
          statusActions =
            '<div class="confirm-box">' +
              '<p>Delete this bundle sale? All ' + others + ' item' + (others === 1 ? "" : "s") +
                ' in it will be un-sold and returned to inventory.</p>' +
              '<div class="row">' +
                '<button class="btn danger" type="button" data-act="bundle-delete-confirm" style="flex:1;">Delete bundle</button>' +
                '<button class="btn secondary" type="button" data-act="bundle-delete-cancel" style="flex:1;">Cancel</button>' +
              '</div>' +
            '</div>';
        } else {
          statusActions =
            '<p class="muted" style="margin:0 0 10px;">This item was sold as part of a bundle. ' +
              'To un-sell it, delete the whole bundle.</p>' +
            '<button class="btn danger-ghost" type="button" data-act="bundle-delete">Delete bundle sale</button>';
        }
      } else {
        // Single sale — offer Undo (with confirm).
        if (invState.confirmUndo) {
          statusActions =
            '<div class="confirm-box">' +
              '<p>Undo this sale? The item goes back to your active inventory.</p>' +
              '<div class="row">' +
                '<button class="btn danger" type="button" data-act="undo-confirm" style="flex:1;">Undo sale</button>' +
                '<button class="btn secondary" type="button" data-act="undo-cancel" style="flex:1;">Cancel</button>' +
              '</div>' +
            '</div>';
        } else {
          statusActions =
            '<button class="btn secondary" type="button" data-act="undo-sale">Undo sale</button>';
        }
      }
    } else if (invState.saleForm && invState.saleForm.itemId === i.id) {
      // ---- Mark as Sold form is open (SPE-12) ----
      const sf = invState.saleForm;
      const platOpts = PLATFORMS.map(function (p) {
        return '<option value="' + p + '"' + (sf.platform === p ? " selected" : "") + '>' +
          escapeHtml(PLATFORM_LABELS[p]) + '</option>';
      }).join("") +
        '<option value="other"' + (sf.platform === "other" ? " selected" : "") + '>Other</option>';
      statusActions =
        '<div class="sale-form">' +
          '<div class="section-label">Mark as sold</div>' +
          '<div class="field"><label>Sale price (USD)</label>' +
            '<div class="price-input-wrap"><span class="dollar">$</span>' +
            '<input id="salerPrice" type="number" inputmode="decimal" step="0.01" min="0" ' +
              'value="' + escapeHtml(sf.price) + '" placeholder="0.00" /></div></div>' +
          '<div class="form-row">' +
            '<div class="field"><label>Platform sold on</label>' +
              '<select id="salerPlatform">' + platOpts + '</select></div>' +
            '<div class="field"><label>Platform fee (USD)</label>' +
              '<div class="price-input-wrap"><span class="dollar">$</span>' +
              '<input id="salerFee" type="number" inputmode="decimal" step="0.01" min="0" ' +
                'value="' + escapeHtml(sf.fee) + '" placeholder="0.00" /></div></div>' +
          '</div>' +
          '<div class="helper">Enter the platform’s cut (shipping/selling fees) so profit is accurate.</div>' +
          '<button class="btn" type="button" data-act="sale-confirm">Confirm sale</button>' +
          '<button class="btn secondary" type="button" data-act="sale-cancel" style="margin-top:10px;">Cancel</button>' +
        '</div>';
    } else {
      // ---- Default sellable-item actions ----
      // SPE-21: a DRAFT whose listing is ready (not pending, not failed) gets a
      // clear primary "Mark as Listed" — this replaces the old add-flow review's
      // save action. Mark as Sold then drops to a secondary style.
      const listingReady = i.status === STATUS.DRAFT && i.listing &&
                           i.gen !== "pending" && !(i.gen && i.gen.failed);
      const markListedBtn = listingReady
        ? '<button class="btn" type="button" data-act="mark-listed">Mark as Listed</button>'
        : '';
      const soldBtn = listingReady
        ? '<button class="btn secondary" type="button" id="markSoldBtn" data-act="mark-sold">Mark as Sold</button>'
        : '<button class="btn" type="button" id="markSoldBtn" data-act="mark-sold">Mark as Sold</button>';
      statusActions =
        markListedBtn +
        soldBtn +
        '<button class="btn secondary" type="button" data-act="not-listing">Mark &ldquo;Not Listing&rdquo;</button>';
    }

    // Delete (with confirm step). Hidden while a sale form / success moment /
    // undo or bundle-delete confirm is showing, to keep the action area focused.
    const saleFlowActive =
      (invState.saleForm && invState.saleForm.itemId === i.id) ||
      (invState.saleDone && invState.saleDone.itemId === i.id) ||
      invState.confirmUndo || invState.confirmBundleDelete;
    const deleteBlock = saleFlowActive
      ? ""
      : (invState.confirmDelete
        ? '<div class="confirm-box">' +
            '<p>Delete this item permanently? This can’t be undone.</p>' +
            '<div class="row">' +
              '<button class="btn danger" type="button" data-act="delete-confirm" style="flex:1;">Delete</button>' +
              '<button class="btn secondary" type="button" data-act="delete-cancel" style="flex:1;">Cancel</button>' +
            '</div>' +
          '</div>'
        : '<button class="btn danger-ghost" type="button" data-act="delete">Delete item</button>');

    // "Sold in bundle" note (SPE-13) shown on bundled items' detail.
    const soldNote = (i.status === STATUS.SOLD && i.sale && i.sale.bundleId && bundleForItem)
      ? '<div class="sold-note"><span>&#128230;</span><span>Sold in bundle &middot; ' +
          (bundleForItem.itemIds || []).length + ' items on ' +
          escapeHtml(PLATFORM_LABELS[bundleForItem.platform] || bundleForItem.platform || "—") +
          '</span></div>'
      : "";

    return '' +
      '<button class="detail-back" type="button" id="detailBackBtn">&lsaquo; Inventory</button>' +
      '<div class="card">' +
        thumbHTML(i, "detail-photo") +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px;">' +
          '<h2 style="margin:0;font-size:16px;">' + escapeHtml(catLine) + '</h2>' +
          '<span class="badge ' + i.status + '">' + statusLabel(i.status) + '</span>' +
        '</div>' +
        soldNote +
        '<div class="kv-list">' + kv + '</div>' +
      '</div>' +
      listingBlock +
      '<div class="card">' +
        '<div class="section-label">Actions</div>' +
        '<div class="detail-actions">' +
          statusActions +
          deleteBlock +
        '</div>' +
      '</div>';
  }

  function wireInventoryDetail(item) {
    const el = document.getElementById("inventoryList");
    if (!el) return;
    const id = item.id;

    // SPE-22: research in progress — start the 1s elapsed ticker for this item.
    // renderInventory() already stopped any prior interval, so this is the sole
    // owner. If gen isn't pending, no timer is started (and the choke-point stop
    // in renderInventory left us with none).
    if (item.gen === "pending") startResearchTimer(id);

    const back = document.getElementById("detailBackBtn");
    if (back) back.addEventListener("click", function () {
      invState.mode = "list";
      invState.itemId = null;
      resetDetailFlags();
      const main = document.querySelector(".app-main");
      if (main) main.scrollTop = 0;
      renderInventory();
    });

    // Live-save listing field edits back to the store (SPE-8 pattern reused).
    // We mutate a fresh copy of the listing and updateItem so getters stay clean.
    if (item.listing) {
      el.querySelectorAll("[data-dfield]").forEach(function (elm) {
        elm.addEventListener("input", function () {
          const cur = AppStore.getItem(id);
          if (!cur || !cur.listing) return;
          const field = elm.getAttribute("data-dfield");
          const listing = Object.assign({}, cur.listing, {
            platforms: Object.assign({}, cur.listing.platforms)
          });
          if (field === "platform") {
            listing.platforms[elm.getAttribute("data-platform-field")] = elm.value;
          } else if (field === "suggestedPrice") {
            const v = parseFloat(elm.value);
            listing.suggestedPrice = isNaN(v) ? 0 : v;
          } else {
            listing[field] = elm.value;
          }
          // Suppress the store-driven re-render so we don't clobber the field
          // the user is actively typing in (mirrors suppressAddRerender intent).
          withoutInvRerender(function () { AppStore.updateItem(id, { listing: listing }); });
        });
      });
      // Copy buttons (reuse copyText helper).
      el.querySelectorAll("[data-copy]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const cur = AppStore.getItem(id);
          const p = btn.getAttribute("data-copy");
          copyText((cur && cur.listing && cur.listing.platforms[p]) || "", btn);
        });
      });
      // Go-to-platform buttons (reuse PLATFORM_URLS).
      el.querySelectorAll("[data-go]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const url = PLATFORM_URLS[btn.getAttribute("data-go")];
          if (url) window.open(url, "_blank", "noopener");
        });
      });
    }

    // Live-bind the Mark-as-Sold form fields into invState.saleForm so a
    // store-driven re-render (should one happen) can't clobber typed values.
    // These are plain UI-scratch fields (not store data), so no store write here.
    if (invState.saleForm && invState.saleForm.itemId === id) {
      const bind = function (elId, key) {
        const inp = document.getElementById(elId);
        if (inp) inp.addEventListener("input", function () { invState.saleForm[key] = inp.value; });
      };
      bind("salerPrice", "price");
      bind("salerFee", "fee");
      const plat = document.getElementById("salerPlatform");
      if (plat) plat.addEventListener("change", function () { invState.saleForm.platform = plat.value; });
    }

    // Status + sale + delete actions.
    el.querySelectorAll("[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const act = btn.getAttribute("data-act");
        if (act === "not-listing") {
          AppStore.updateItem(id, { status: STATUS.NOT_LISTING });
          // store notify() re-renders detail in place with the new status/actions.
        // ---- SPE-21: background-generation actions (detail-context) ----
        } else if (act === "mark-listed") {
          // Draft's listing is ready & reviewed -> promote to 'listed'. This
          // replaces the old add-flow review's "Save listing" action.
          AppStore.updateItem(id, { status: STATUS.LISTED }); // notify -> re-render
        } else if (act === "gen-retry") {
          // Re-enqueue background generation (gen back to "pending").
          GenQueue.enqueue(id); // notify -> re-render shows the research panel
        } else if (act === "gen-manual") {
          // Fill-in-manually: clear the failed state and drop an empty editable
          // listing in so she can type it herself (SPE-20 fallback, moved here).
          AppStore.updateItem(id, { gen: null, listing: AppStore.makeListing() });
        } else if (act === "gen-copy-debug") {
          // Copy the redacted debug snapshot (never the key) to send to the dev.
          (async function () {
            let snapshot = null;
            try { snapshot = await Storage.get(AI_DEBUG_STORAGE); } catch (_) {}
            if (!snapshot) { showCopiedToast("No debug info yet."); return; }
            let json;
            try { json = JSON.stringify(snapshot, null, 2); }
            catch (_) { json = String(snapshot); }
            copyText(json, btn);
          })();
        } else if (act === "relist") {
          // Reverse: go back to 'listed' if a listing exists, else 'draft'.
          const cur = AppStore.getItem(id);
          const back = (cur && cur.listing) ? STATUS.LISTED : STATUS.DRAFT;
          AppStore.updateItem(id, { status: back });
        // ---- Mark as Sold (SPE-12) ----
        } else if (act === "mark-sold") {
          const cur = AppStore.getItem(id);
          const suggested = (cur && cur.listing && cur.listing.suggestedPrice)
            ? numOrEmpty(cur.listing.suggestedPrice) : "";
          invState.saleForm = { itemId: id, price: suggested, platform: PLATFORMS[0], fee: "0" };
          invState.saleDone = null;
          renderInventory();
        } else if (act === "sale-cancel") {
          invState.saleForm = null;
          renderInventory();
        } else if (act === "sale-done-ok") {
          // Dismiss the single-sale success moment; item stays sold.
          invState.saleDone = null;
          renderInventory();
        } else if (act === "sale-confirm") {
          onConfirmSingleSale(id);
        } else if (act === "undo-sale") {
          invState.confirmUndo = true;
          renderInventory();
        } else if (act === "undo-cancel") {
          invState.confirmUndo = false;
          renderInventory();
        } else if (act === "undo-confirm") {
          onUndoSale(id);
        // ---- Delete bundle from a bundled item's detail (SPE-13) ----
        } else if (act === "bundle-delete") {
          invState.confirmBundleDelete = true;
          renderInventory();
        } else if (act === "bundle-delete-cancel") {
          invState.confirmBundleDelete = false;
          renderInventory();
        } else if (act === "bundle-delete-confirm") {
          const cur = AppStore.getItem(id);
          invState.confirmBundleDelete = false;
          if (cur && cur.sale && cur.sale.bundleId) deleteBundle(cur.sale.bundleId);
          // deleteBundle un-sells items + commits; notify re-renders this detail
          // (item is now unsold, so its actions flip back automatically).
        } else if (act === "delete") {
          invState.confirmDelete = true;
          renderInventory();
        } else if (act === "delete-cancel") {
          invState.confirmDelete = false;
          renderInventory();
        } else if (act === "delete-confirm") {
          invState.mode = "list";
          invState.itemId = null;
          invState.confirmDelete = false;
          AppStore.removeItem(id); // notify() re-renders the list
        }
      });
    });
  }

  /* ---------------------- SPE-12: single-sale confirm / undo ---------------------- */
  function onConfirmSingleSale(id) {
    const sf = invState.saleForm;
    if (!sf) return;
    const price = parseFloat(sf.price);
    const fee = parseFloat(sf.fee);
    const item = AppStore.getItem(id);
    if (!item) return;
    const sale = {
      price: isNaN(price) ? 0 : price,
      platform: sf.platform || "other",
      fee: isNaN(fee) ? 0 : fee,
      date: Date.now(),
      bundleId: null
    };
    const profit = sale.price - (Number(item.costPaid) || 0) - sale.fee;
    invState.saleForm = null;
    invState.saleDone = { itemId: id, profit: profit };
    AppStore.updateItem(id, { sale: sale, status: STATUS.SOLD }); // notify -> re-render shows success moment
  }

  function onUndoSale(id) {
    const item = AppStore.getItem(id);
    if (!item) return;
    // Safety: bundled items must not be undone here (handled via delete-bundle).
    if (item.sale && item.sale.bundleId) { invState.confirmUndo = false; renderInventory(); return; }
    const back = item.listing ? STATUS.LISTED : STATUS.DRAFT;
    invState.confirmUndo = false;
    invState.saleDone = null;
    AppStore.updateItem(id, { sale: null, status: back }); // notify -> re-render
  }

  /* ---------------------- SPE-13: delete a bundle (un-sell its items) ---------------------- */
  // Clears sale on every item in the bundle, restores 'listed' (has listing) or
