<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first viewport, tuned for ~390px iPhone. viewport-fit=cover lets us
       paint into the safe-area (notch / home indicator) using env() insets below. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />

  <!-- Home-screen install (Safari "Add to Home Screen") -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Thrift Ledger" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#111418" />

  <title>Thrift Ledger</title>

  <style>
    /* =========================================================================
       DESIGN TOKENS
       ========================================================================= */
    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --surface-2: #eef0f3;
      --ink:       #111418;
      --ink-soft:  #565d66;
      --ink-faint: #8b929b;
      --line:      #e2e5ea;
      --accent:    #2f6bff;
      --accent-ink:#ffffff;
      --good:      #1a9d5a;
      --warn:      #c8781a;
      --danger:    #d23b3b;

      --tab-h: 64px;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);

      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
              Arial, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    /* App is a single fixed-height column: header / scrolling main / tab bar */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 640px;      /* stay phone-shaped on wide screens */
      margin: 0 auto;
      background: var(--bg);
    }

    /* ---- Header ---- */
    header.app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: calc(var(--safe-top) + 14px) 18px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    header.app-header h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header.app-header .sub {
      margin: 2px 0 0;
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    /* ---- Main scroll area ---- */
    main.app-main {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--tab-h) + var(--safe-bot) + 24px);
    }

    .view { display: none; }
    .view.active { display: block; animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

    /* ---- Cards / placeholders ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .card h2 { margin: 0 0 6px; font-size: 15px; font-weight: 650; }
    .muted { color: var(--ink-soft); font-size: 14px; }
    .placeholder {
      text-align: center;
      color: var(--ink-faint);
      padding: 40px 16px;
    }
    .placeholder .emoji { font-size: 34px; display: block; margin-bottom: 10px; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px; font-weight: 600; }
    .field input, .field select, .field textarea {
      width: 100%;
      font: inherit;
      font-size: 16px;               /* >=16px stops iOS zoom-on-focus */
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--ink);
    }
    .field textarea { resize: vertical; min-height: 72px; }

    /* Review-step controls live outside .field (in .platform-block); give them
       the same look as .field inputs. */
    .platform-block textarea {
      width: 100%;
      font: inherit;
      font-size: 16px;               /* >=16px stops iOS zoom-on-focus */
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--ink);
      resize: vertical;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      font: inherit; font-weight: 650; font-size: 16px;
      padding: 13px 16px;
      border: none; border-radius: 12px;
      background: var(--accent); color: var(--accent-ink);
      cursor: pointer;
    }
    .btn:active { filter: brightness(.94); }
    .btn.secondary { background: var(--surface-2); color: var(--ink); }

    /* ---- Bottom tab bar ---- */
    nav.tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      max-width: 640px;
      margin: 0 auto;
      background: rgba(255,255,255,0.92);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-top: 1px solid var(--line);
      padding-bottom: var(--safe-bot);
    }
    nav.tab-bar button {
      flex: 1 1 0;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      height: var(--tab-h);
      padding: 8px 4px 0;
      border: none; background: none; cursor: pointer;
      color: var(--ink-faint);
      font: inherit; font-size: 11px; font-weight: 600;
    }
    nav.tab-bar button .ico { font-size: 21px; line-height: 1; }
    nav.tab-bar button.active { color: var(--accent); }

    .badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      background: var(--surface-2); color: var(--ink-soft);
    }
    .badge.listed { background: #e6efff; color: #2f6bff; }
    .badge.sold   { background: #e4f6ec; color: var(--good); }
    .badge.draft  { background: #f0f1f4; color: var(--ink-soft); }
    .badge.not-listing { background: #f9ece1; color: var(--warn); }

    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    /* =========================================================================
       PHASE 2 (SPE-6..9) — intake / generation / review UI
       ========================================================================= */

    /* ---- Photo drop zone + thumbnail preview (SPE-6) ---- */
    .photo-zone {
      position: relative;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      overflow: hidden;
    }
    .photo-zone.empty {
      text-align: center;
      color: var(--ink-faint);
      padding: 30px 16px;
      cursor: pointer;
    }
    .photo-zone.empty .emoji { font-size: 32px; display: block; margin-bottom: 8px; }
    .photo-zone.empty .hint { font-size: 12.5px; margin-top: 4px; color: var(--ink-faint); }
    .photo-zone img.thumb {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      background: #000;
    }
    .photo-zone .photo-actions {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: var(--surface);
      border-top: 1px solid var(--line);
    }
    .photo-zone .photo-actions .btn { font-size: 14px; padding: 9px 12px; }
    .library-link {
      display: block;
      width: 100%;
      margin-top: 8px;
      font-size: 16px;
    }

    /* Visually-hidden file input (label wraps the zone) */
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }

    /* ---- Inline validation error ---- */
    .form-error {
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      margin: 4px 0 12px;
    }
    .field.invalid input,
    .field.invalid select { border-color: var(--danger); }

    /* ---- Button variants ---- */
    .btn.small { width: auto; font-size: 14px; padding: 9px 14px; }
    .btn.ghost {
      background: transparent; color: var(--accent);
      border: 1px solid var(--line);
    }
    .btn.wide-row { flex: 1; }
    .btn[disabled] { opacity: .55; cursor: default; }

    /* ---- Loading state (SPE-7) ---- */
    .loading-block { text-align: center; padding: 34px 16px; color: var(--ink-soft); }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 14px;
      border: 3px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Item summary strip in review step ---- */
    .item-strip { display: flex; gap: 12px; align-items: center; }
    .item-strip img {
      width: 56px; height: 56px; border-radius: 8px;
      object-fit: cover; background: var(--surface-2); flex: 0 0 auto;
    }
    .item-strip .meta { min-width: 0; }
    .item-strip .meta .t { font-weight: 650; font-size: 14px; }
    .item-strip .meta .s { font-size: 12.5px; color: var(--ink-soft); }

    /* ---- Per-platform review blocks (SPE-8/9) ---- */
    .platform-block { margin-bottom: 14px; }
    .platform-block .phead {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .platform-block .phead .pname {
      font-size: 13px; font-weight: 700; text-transform: capitalize;
      display: flex; align-items: center; gap: 7px;
    }
    .platform-block .phead .pdot {
      width: 9px; height: 9px; border-radius: 50%; display: inline-block;
    }
    .pdot.poshmark { background: #e0115f; }
    .pdot.ebay     { background: #0064d2; }
    .pdot.mercari  { background: #ff5a1f; }
    .pdot.depop    { background: #ff2300; }

    .platform-block .pactions { display: flex; gap: 8px; }
    .platform-block .pactions .btn { font-size: 13px; padding: 8px 12px; }
    .platform-block textarea { min-height: 84px; }

    .copied-toast {
      position: fixed;
      left: 50%; bottom: calc(var(--tab-h) + var(--safe-bot) + 18px);
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 9px 16px; border-radius: 999px;
      z-index: 60; opacity: 0; pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Non-blocking storage warning banner (SPE-15 hardening). Sits above the tab
       bar; auto-dismisses; never blocks interaction. */
    .storage-warn {
      position: fixed;
      left: 12px; right: 12px;
      bottom: calc(var(--tab-h) + var(--safe-bot) + 12px);
      max-width: 616px; margin: 0 auto;
      background: #3a2a12; color: #ffe9cf;
      font-size: 13px; font-weight: 600; line-height: 1.35;
      padding: 11px 14px; border-radius: 12px;
      box-shadow: 0 6px 22px rgba(0,0,0,.28);
      z-index: 70; opacity: 0; transform: translateY(8px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
    }
    .storage-warn.show { opacity: 1; transform: translateY(0); }

    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--ink-faint);
      margin: 2px 0 10px;
    }
    .price-input-wrap { position: relative; }
    .price-input-wrap span.dollar {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--ink-soft); font-size: 16px; pointer-events: none;
    }
    .price-input-wrap input { padding-left: 24px; }

    /* =========================================================================
       PHASE 3 (SPE-10 / SPE-11) — inventory list + item detail
       ========================================================================= */

    /* ---- Filter chips (horizontally scrollable) ---- */
    .filter-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 2px 2px 12px;
      margin: 0 -2px;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      font: inherit; font-size: 13px; font-weight: 600;
      padding: 7px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
    }
    .chip:active { filter: brightness(.96); }
    .chip.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .chip .count {
      font-size: 11px;
      opacity: .7;
      margin-left: 4px;
    }

    /* ---- Inventory list rows ---- */
    .inv-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      font: inherit;
      color: inherit;
    }
    .inv-row:active { filter: brightness(.98); }
    .inv-thumb {
      width: 60px; height: 60px;
      flex: 0 0 auto;
      border-radius: 9px;
      object-fit: cover;
      background: var(--surface-2);
    }
    .inv-thumb.placeholder-thumb {
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--ink-faint);
    }
    .inv-meta { min-width: 0; flex: 1 1 auto; }
    .inv-meta .inv-title {
      font-weight: 650; font-size: 14.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .inv-meta .inv-sub {
      font-size: 12.5px; color: var(--ink-soft); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .inv-meta .inv-badges { margin-top: 6px; display: flex; gap: 6px; align-items: center; }
    .inv-chevron { flex: 0 0 auto; color: var(--ink-faint); font-size: 20px; padding-right: 4px; }

    /* ---- Item detail view ---- */
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      font: inherit; font-size: 15px; font-weight: 600;
      color: var(--accent);
      padding: 4px 0;
      margin-bottom: 8px;
    }
    .detail-photo {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      background: #000;
      border-radius: var(--radius);
      display: block;
    }
    .detail-photo.placeholder-thumb {
      display: flex; align-items: center; justify-content: center;
      min-height: 180px; font-size: 44px; color: var(--ink-faint);
      background: var(--surface-2);
    }
    .kv-list { margin: 6px 0 0; }
    .kv-row {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-row .k { color: var(--ink-soft); flex: 0 0 auto; }
    .kv-row .v { text-align: right; font-weight: 600; min-width: 0; word-break: break-word; }

    /* Detail action buttons */
    .detail-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.danger-ghost {
      background: transparent; color: var(--danger);
      border: 1px solid var(--danger);
    }
    .confirm-box {
      background: #fdecec;
      border: 1px solid #f3c0c0;
      border-radius: 10px;
      padding: 12px;
      margin-top: 4px;
    }
    .confirm-box p { margin: 0 0 10px; font-size: 13.5px; color: var(--danger); font-weight: 600; }

    /* =========================================================================
       PHASE 4 (SPE-12 / SPE-13 / SPE-14) — sales, bundles & dashboard
       ========================================================================= */

    /* ---- In-detail "Mark as Sold" form (SPE-12) ---- */
    .sale-form {
      background: #eef7f0;
      border: 1px solid #cfe8d8;
      border-radius: 10px;
      padding: 12px;
      margin-top: 4px;
    }
    .sale-form .section-label { color: var(--good); }
    .sale-form .field label { color: #2f6b4a; }
    .sale-form .helper {
      font-size: 12px; color: var(--ink-soft); margin: -6px 0 12px;
    }
    .sale-form .form-row { display: flex; gap: 10px; }
    .sale-form .form-row > * { flex: 1; }

    /* ---- Profit success moment (SPE-12/13) ---- */
    .profit-pop {
      text-align: center;
      padding: 22px 14px;
    }
    .profit-pop .emoji { font-size: 34px; display: block; margin-bottom: 8px; }
    .profit-pop .lbl { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
    .profit-pop .amt { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin-top: 2px; }
    .profit-pop .amt.pos { color: var(--good); }
    .profit-pop .amt.neg { color: var(--danger); }
    .profit-pop .sub { font-size: 12.5px; color: var(--ink-faint); margin-top: 6px; }

    /* Inline profit value colouring reused in kv rows and dashboard */
    .v.pos { color: var(--good); }
    .v.neg { color: var(--danger); }

    /* ---- Sold / bundle info card ---- */
    .sold-note {
      background: #e4f6ec;
      border: 1px solid #c6e8d3;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 13px;
      color: #1a6d43;
      font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }

    /* ---- Bundle multi-select mode (SPE-13) ---- */
    .bundle-bar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 12px;
    }
    .bundle-bar .btn { width: auto; }
    .select-hint {
      font-size: 13px; color: var(--ink-soft); font-weight: 600;
      margin-bottom: 10px;
    }
    .inv-row.selectable { cursor: pointer; }
    .inv-row.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
      background: #f2f6ff;
    }
    .sel-check {
      flex: 0 0 auto;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 800;
      background: var(--surface);
    }
    .inv-row.selected .sel-check {
      background: var(--accent); border-color: var(--accent);
    }
    .bundle-actionbar {
      position: sticky;
      bottom: 0;
      display: flex; gap: 10px;
      padding: 12px 0 4px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
    }
    .bundle-actionbar .btn { margin: 0; }

    /* ---- Dashboard (SPE-14) ---- */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px 14px;
    }
    .stat .stat-lbl {
      font-size: 11.5px; font-weight: 700; letter-spacing: .03em;
      text-transform: uppercase; color: var(--ink-faint);
    }
    .stat .stat-val { font-size: 21px; font-weight: 750; margin-top: 3px; letter-spacing: -0.01em; }
    .stat.hero { grid-column: 1 / -1; padding: 18px 16px; }
    .stat.hero .stat-val { font-size: 34px; font-weight: 850; letter-spacing: -0.02em; }
    .stat .stat-val.pos { color: var(--good); }
    .stat .stat-val.neg { color: var(--danger); }
    .stat .stat-note { font-size: 12px; color: var(--ink-soft); margin-top: 5px; }

    .count-strip {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
    }
    .count-pill {
      display: inline-flex; align-items: baseline; gap: 5px;
      font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
      background: var(--surface-2);
      padding: 5px 11px; border-radius: 999px;
    }
    .count-pill b { font-size: 13.5px; color: var(--ink); }

    /* ---- Recent sales rows ---- */
    .sale-row {
      display: flex; gap: 12px; align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left; width: 100%;
      font: inherit; color: inherit;
    }
    .sale-row:active { filter: brightness(.98); }
    .sale-thumb-wrap { position: relative; flex: 0 0 auto; width: 60px; height: 60px; }
    .sale-thumb-wrap .inv-thumb { width: 60px; height: 60px; }
    .sale-thumb-wrap .nbadge {
      position: absolute; right: -4px; bottom: -4px;
      background: var(--ink); color: #fff;
      font-size: 11px; font-weight: 800;
      padding: 2px 7px; border-radius: 999px;
      border: 2px solid var(--surface);
    }
    .sale-meta { min-width: 0; flex: 1 1 auto; }
    .sale-meta .sale-title {
      font-weight: 650; font-size: 14.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sale-meta .sale-sub {
      font-size: 12.5px; color: var(--ink-soft); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sale-right { flex: 0 0 auto; text-align: right; }
    .sale-right .sale-amt { font-weight: 700; font-size: 14.5px; }
    .sale-right .sale-profit { font-size: 12.5px; font-weight: 650; margin-top: 3px; }
    .sale-right .sale-profit.pos { color: var(--good); }
    .sale-right .sale-profit.neg { color: var(--danger); }

    /* Expanded bundle sub-items under a bundle sale row */
    .bundle-children {
      margin: -4px 0 10px;
      padding: 4px 0 4px 12px;
      border-left: 2px solid var(--line);
    }
    .bundle-child {
      display: flex; gap: 10px; align-items: center;
      padding: 7px 8px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%; text-align: left; font: inherit; color: inherit;
      background: none; border: none;
    }
    .bundle-child:active { background: var(--surface-2); }
    .bundle-child .inv-thumb { width: 40px; height: 40px; border-radius: 7px; }
    .bundle-child .bc-meta { min-width: 0; flex: 1 1 auto; }

    /* =========================================================================
       PHASE 6 (SPE-19) — settings gear, settings modal, backup / restore
       ========================================================================= */

    /* Gear button, top-right of the sticky header. */
    header.app-header { position: sticky; } /* (already sticky; kept for locality) */
    .gear-btn {
      position: absolute;
      top: calc(var(--safe-top) + 12px);

    /* Full-screen modal overlay for Settings. */
    .modal-overlay {
      position: fixed; inset: 0;

    .modal-sheet {
      background: var(--bg);

      max-height: 92%;
      display: flex; flex-direction: column;

      border-top-right-radius: 18px;

    }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 18px 12px;

    .modal-head h2 { margin: 0; font-size: 17px; font-weight: 700; }
    .modal-close {

    }
    .modal-body {
      flex: 1 1 auto;

    }

    /* AI mode indicator pill inside settings. */
    .mode-indicator {

    .btn.tiny { width: auto; font-size: 13px; padding: 8px 12px; }
    .settings-btn-row { display: flex; gap: 10px; }

    /* SPE-20: "Copy debug info" on the generation-error step. Small + quiet so it
       reads as a secondary escape hatch, consistent with other ghost buttons. */

<body>
  <div id="app">
    <header class="app-header">
      <button class="gear-btn" id="settingsBtn" type="button" aria-label="Settings" title="Settings">&#9881;</button>
      <h1>Thrift Ledger</h1>
      <p class="sub" id="headerSub">Photo &rarr; listing &rarr; sold &rarr; profit</p>
    </header>

    <main class="app-main">
      <!-- ================= ADD ITEM ================= -->
      <!-- The Add Item tab is a small multi-step flow (SPE-6..9), rendered
           entirely by renderAdd() into #addFlow. Steps: intake -> generate
           -> review/edit -> done. See the [ADD FLOW] section in the script. -->
      <section class="view" id="view-add" data-tab="add">
        <div id="addFlow"></div>
      </section>

      <!-- ================= INVENTORY ================= -->
      <section class="view" id="view-inventory" data-tab="inventory">
        <div id="inventoryList"></div>
      </section>

      <!-- ================= DASHBOARD ================= -->
      <section class="view" id="view-dashboard" data-tab="dashboard">
        <div id="dashboardBody"></div>
      </section>
    </main>

    <nav class="tab-bar" id="tabBar">
      <button data-tab="add" class="active"><span class="ico">&#43;</span>Add Item</button>
      <button data-tab="inventory"><span class="ico">&#128230;</span>Inventory</button>
      <button data-tab="dashboard"><span class="ico">&#128202;</span>Dashboard</button>
    </nav>
  </div>

  <script>
  "use strict";
  /* ===========================================================================
     THRIFT LEDGER  —  app.js (inline, single-file artifact)

     File map for the four agents extending this after SPE-5:
       [DATA MODEL]  canonical schema + invariants (comment block, read first)
       [STORAGE]     async adapter over window.storage / localStorage
       [STORE]       AppStore: state + mutations + subscribe/notify + factories
       [VIEWS]       one render fn per tab; read ONLY through AppStore
       [ROUTER]      tab switching
       [BOOT]        load-on-boot, wire events, first render

     GOLDEN RULES for later phases:
       - Views never touch storage or the raw state object directly. Go through
         AppStore getters/mutators. Mutators call notify() -> views re-render.
       - Never mutate objects returned from getters in place; use AppStore.updateItem.
       - Money is stored as DOLLARS (Number, float). See [DATA MODEL].
       - Bump SCHEMA_VERSION + add a migration if you change record shape.
     =========================================================================== */

  /* ===========================================================================
     [DATA MODEL]  — CANONICAL SCHEMA (v1). This is the contract for SPE-6..14.
     ---------------------------------------------------------------------------
     MONEY UNITS: all money is stored as DOLLARS in a JS Number (e.g. 12.50).
       Not cents. Chosen for readability + because window.storage is JSON and
       these values are small. Round to 2dp on display, not on store.

     Item = {
       id:        string,   // uid(), stable, primary key
       createdAt: number,   // Date.now() epoch ms
       photo:     string|null,   // compressed image dataURL ("data:image/...") or null.
                                 //   Compression handled in SPE-6. Nullable so a
                                 //   record can exist before/without a photo.
       category:  string,   // free text, e.g. "Dress"
       brand:     string,   // free text, e.g. "Zara"  ("" if unknown)
       size:      string,   // free text, e.g. "M"
       condition: string,   // free text enum-ish, e.g. "Like new"
       costPaid:  number,   // DOLLARS Alissa paid to acquire it. Counts toward
                            //   total spend for ALL statuses (incl. not-listing).

       status:    'draft' | 'listed' | 'sold' | 'not-listing',
                            //   draft       - saved, not yet listed on any platform
                            //   listed      - live on >=1 platform, in active inventory
                            //   sold        - sold (single or via a bundle); keeps listing data
                            //   not-listing - deliberately kept off-market (SPE-11):
                            //                 still counts in total spend, hidden from
                            //                 the ACTIVE inventory view.

       listing:   null | {          // AI-generated + user-edited listing content (SPE-7/8)
         title:         string,
         description:   string,
         suggestedPrice:number,     // DOLLARS. Default for sale price (SPE-12), editable.
         platforms: {               // per-platform listing text (SPE-7). "" until generated.
           poshmark: string,
           ebay:     string,
           mercari:  string,
           depop:    string
         }
       },

       sale:      null | {          // set when status becomes 'sold' (SPE-12/13)
         price:    number,          // DOLLARS actually sold for (editable, may != suggested)
         platform: string,          // 'poshmark' | 'ebay' | 'mercari' | 'depop' | other
         fee:      number,          // DOLLARS platform/shipping fee for THIS sale.
                                    //   For a bundled item this is 0 — the fee lives on
                                    //   the Bundle, never split per item (see invariants).
         date:     number,          // epoch ms of sale
         bundleId: string|null      // null = single sale; else FK -> Bundle.id
       }
     }

     Bundle = {                     // one multi-item sale (SPE-13)
       id:         string,          // uid()
       date:       number,          // epoch ms
       platform:   string,          // where the bundle sold
       totalPrice: number,          // DOLLARS for the whole bundle (one number)
       fee:        number,          // DOLLARS one fee for the whole bundle
       itemIds:    string[]         // Item.id[] included in this bundle
     }
     // Bundle profit = totalPrice - sum(costPaid of its items) - fee.
     // Tracked at the bundle level ONLY. Never split back to per-item profit.

     Root persisted blob (single key):
       { schemaVersion:1, items: Item[], bundles: Bundle[] }

     -------------------- INVARIANTS (enforce in later phases) -----------------
     I1. costPaid of EVERY item (any status, incl. 'not-listing' and 'sold')
         counts toward TOTAL SPEND on the dashboard.
     I2. 'not-listing' items are excluded from the ACTIVE inventory view but
         remain in storage and in total-spend math.
     I3. 'sold' items RETAIN their .listing data (do not clear it on sale).
     I4. A bundled item has sale.bundleId set and sale.fee = 0; its revenue/fee
         is represented by its Bundle, not by the item. Dashboards must render
         per-bundle rows, not synthetic per-item splits.
     I5. Single-sale profit  = item.sale.price - item.costPaid - item.sale.fee.
         Bundle profit        = bundle.totalPrice
                                - sum(item.costPaid for item in bundle.itemIds)
                                - bundle.fee.
     =========================================================================== */

  const SCHEMA_VERSION = 1;
  const ROOT_KEY = "thrift-ledger:v1";

  const STATUS = Object.freeze({
    DRAFT: "draft",
    LISTED: "listed",
    SOLD: "sold",
    NOT_LISTING: "not-listing"
  });
  const PLATFORMS = Object.freeze(["poshmark", "ebay", "mercari", "depop"]);

  /* ---------------------------------------------------------------------------
     PLATFORM "create listing" URLs (SPE-9).
     ONE editable map — verified on-device in SPE-18; fix here if a link lands
     wrong. Depop's create URL is a best guess and needs device verification.
     --------------------------------------------------------------------------- */
  const PLATFORM_URLS = Object.freeze({
    poshmark: "https://poshmark.com/create-listing",
    ebay:     "https://www.ebay.com/sl/sell",
    mercari:  "https://www.mercari.com/sell/",
    depop:    "https://www.depop.com/products/create/"   // best guess — verify on device (SPE-18)
  });

  const PLATFORM_LABELS = Object.freeze({
    poshmark: "Poshmark", ebay: "eBay", mercari: "Mercari", depop: "Depop"
  });

  /* Sensible clothing-resale category list for the intake select (SPE-6).
     "Other…" reveals a free-text field so nothing is un-enterable. */
  const CATEGORY_OPTIONS = Object.freeze([
    "Dress", "Top / Blouse", "T-Shirt", "Sweater / Cardigan", "Sweatshirt / Hoodie",
    "Jacket / Coat", "Blazer", "Jeans", "Pants / Trousers", "Shorts", "Skirt",
    "Activewear", "Swimwear", "Jumpsuit / Romper", "Shoes", "Boots", "Sneakers",
    "Bag / Purse", "Accessory", "Jewelry", "Hat"
  ]);

  const CONDITION_OPTIONS = Object.freeze(["NWT", "Excellent", "Good", "Fair"]);
  // How each condition reads in generated copy.
  const CONDITION_LABELS = Object.freeze({
    "NWT": "New With Tags",
    "Excellent": "Excellent",
    "Good": "Good",
    "Fair": "Fair"
  });

  // Photo compression params (SPE-6). Longest edge cap + JPEG quality.
  const PHOTO_MAX_EDGE = 800;
  const PHOTO_QUALITY = 0.7;

  /* ===========================================================================
     PHASE 6 (SPE-19) — static-hosting enablement: direct Anthropic API,
     settings screen, backup / restore.
     ---------------------------------------------------------------------------
     On a static host (GitHub Pages, "Add to Home Screen") window.claude does not
     exist. AIListing resolves generation through a provider chain:
       1. window.claude.complete   (artifact runtime — unchanged)
       2. direct Anthropic Messages API, if an API key is configured
       3. mock generator (clearly labelled)
     The API key lives under its OWN storage key (NOT inside the main data blob),
     so data exports never leak it.
     =========================================================================== */
  const API_KEY_STORAGE = "thrift-ledger:apikey";
  // SPE-20: last AI generation/validation failure snapshot, for user-reported bugs.
  // Overwritten each failure; NEVER contains the API key.
  const AI_DEBUG_STORAGE = "thrift-ledger:lastai-debug";
  const ANTHROPIC_API_URL = "https://api.anthropic.com/v1/messages";
  const ANTHROPIC_VERSION = "2023-06-01";
  const ANTHROPIC_MODEL = "claude-opus-4-8";
  // 60s: web search runs real comparable-price research server-side and is slow.
  const API_TIMEOUT_MS = 60000;
  const API_MAX_CONTINUATIONS = 3;   // pause_turn server-tool-loop continuations

  /* ===========================================================================
     [STORAGE]  — async key/value adapter.
     ---------------------------------------------------------------------------
     Persistence target is claude.ai's `window.storage` (async, private per user).
     Its method names are not guaranteed, so we feature-detect get/set/delete AND
     getItem/setItem/removeItem. Falls back to localStorage for local dev.

     Public API (all async, Promise-returning):
       Storage.get(key)          -> parsed value | null
       Storage.set(key, value)   -> void   (value is JSON-serialized)
       Storage.delete(key)       -> void
       Storage.backend           -> "window.storage" | "localStorage"
     =========================================================================== */
  const Storage = (function () {
    const ws = (typeof window !== "undefined") ? window.storage : null;

    // Pick the matching method name pair the host actually exposes.
    function pick(obj, names) {
      if (!obj) return null;
      for (const n of names) if (typeof obj[n] === "function") return n;
      return null;
    }
    const getM = pick(ws, ["get", "getItem"]);
    const setM = pick(ws, ["set", "setItem"]);
    const delM = pick(ws, ["delete", "remove", "removeItem"]);
    const usable = ws && getM && setM;
    const backend = usable ? "window.storage" : "localStorage";

    // Non-blocking warning sink. Boot registers a DOM-based handler (banner);
    // until then (and if none registers) we just log. Never throws, never blocks.
    let warnSink = null;
    function onWarn(fn) { warnSink = fn; }
    function warn(msg) {
      console.warn("[Storage] " + msg);
      try { if (warnSink) warnSink(msg); } catch (_) {}
    }

    // Values are always stored as JSON strings so both backends behave alike.
    async function rawGet(key) {
      if (usable) return await ws[getM](key);
      return (typeof localStorage !== "undefined") ? localStorage.getItem(key) : null;
    }
    async function rawSet(key, str) {
      if (usable) return await ws[setM](key, str);
      if (typeof localStorage !== "undefined") localStorage.setItem(key, str);
    }
    async function rawDel(key) {
      if (usable && delM) return await ws[delM](key);
      if (typeof localStorage !== "undefined") localStorage.removeItem(key);
    }

    // Warn once when a single blob gets large (photos are the driver). window.storage
    // and localStorage quotas vary; ~4MB is a conservative "getting risky" line.
    const SIZE_WARN_BYTES = 4 * 1024 * 1024;
    let sizeWarned = false;

    return {
      backend,
      onWarn,
      /**
       * get(key) -> parsed value | null.
       * A corrupt/unparseable stored blob must NOT brick the app on boot: we
       * preserve the raw bytes under a timestamped ":corrupt-<ts>" backup key so
       * nothing is silently destroyed, warn non-blockingly, and return null so the
       * caller boots clean. Some hosts hand back already-parsed objects — passed
       * through untouched.
       */
      async get(key) {
        let v;
        try {
          v = await rawGet(key);
        } catch (e) {
          warn("read failed — starting from last good state. (" + (e && e.message || e) + ")");
          return null;
        }
        if (v == null) return null;
        if (typeof v !== "string") return v; // host returned a parsed object
        try {
          return JSON.parse(v);
        } catch (e) {
          // Corrupt JSON. Back up the raw blob before the caller overwrites it.
          try {
            await rawSet(key + ":corrupt-" + Date.now(), v);
            warn("saved data was corrupted; a backup copy was kept and the app started fresh.");
          } catch (_) {
            warn("saved data was corrupted and couldn't be backed up; the app started fresh.");
          }
          return null;
        }
      },
      async set(key, value) {
        let str;
        try {
          str = JSON.stringify(value);
        } catch (e) {
          warn("couldn't serialize data to save: " + (e && e.message || e));
          return;
        }
        if (!sizeWarned && str.length > SIZE_WARN_BYTES) {
          sizeWarned = true;
          warn("your saved photos are getting large (~" + Math.round(str.length / (1024 * 1024)) +
               "MB). If saving starts failing, delete some sold items.");
        }
        try {
          await rawSet(key, str);
        } catch (e) {
          // Quota exceeded or host failure. Must not crash — surface a small warning.
          warn("couldn't save your latest change (storage may be full). " +
               "Recent edits are safe in the app but may not survive a reload until space frees up.");
        }
      },
      async delete(key) {
        try { await rawDel(key); }
        catch (e) { console.warn("[Storage] delete failed:", e); }
      }
    };
  })();

  /* ===========================================================================
     [API KEY]  — SPE-19. Anthropic API key stored under its OWN storage key,
     separate from the main data blob so exports never include it. All async
     over the same Storage adapter (window.storage / localStorage fallback).
     =========================================================================== */
  const ApiKey = (function () {
    let cached = null;   // in-memory copy so the provider check is synchronous-ish
    let loaded = false;

    async function load() {
      try {
        const v = await Storage.get(API_KEY_STORAGE);
        cached = (typeof v === "string" && v.trim()) ? v.trim() : null;
      } catch (_) {
        cached = null;
      }
      loaded = true;
      return cached;
    }
    function get() { return cached; }          // null when unset
    function has() { return !!cached; }
    async function set(key) {
      const k = (key == null ? "" : String(key)).trim();
      cached = k || null;
      if (k) await Storage.set(API_KEY_STORAGE, k);
      else await Storage.delete(API_KEY_STORAGE);
    }
    async function clear() {
      cached = null;
      await Storage.delete(API_KEY_STORAGE);
    }
    // Masked display: sk-ant-…last4 (never reveal the full key on screen).
    function masked() {
      if (!cached) return "";
      const last4 = cached.slice(-4);
      return "sk-ant-…" + last4;
    }
    return { load: load, get: get, has: has, set: set, clear: clear, masked: masked, isLoaded: function () { return loaded; } };
  })();

  /* ===========================================================================
     [STORE]  — AppStore: single source of truth.
     ---------------------------------------------------------------------------
     Holds { schemaVersion, items, bundles }. Views subscribe(); every mutator
     calls persist() (debounced) + notify() so views re-render. Getters return
     data; never mutate returned objects directly — use updateItem.
     =========================================================================== */
  const AppStore = (function () {
    let state = { schemaVersion: SCHEMA_VERSION, items: [], bundles: [] };
    const subscribers = new Set();
    let ready = false;

    // ---- id + factory helpers (exposed so intake code stays consistent) ----
    function uid() {
      return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
    }

    // Factory: a blank Item honoring the schema. Overrides merged shallowly.
    function makeItem(overrides = {}) {
      return Object.assign({
        id: uid(),
        createdAt: Date.now(),
        photo: null,
        category: "",
        brand: "",
        size: "",
        condition: "",
        costPaid: 0,
        status: STATUS.DRAFT,
        listing: null,
        sale: null
      }, overrides);
    }

    function makeListing(overrides = {}) {
      return Object.assign({
        title: "",
        description: "",
        suggestedPrice: 0,
        platforms: { poshmark: "", ebay: "", mercari: "", depop: "" }
      }, overrides);
    }

    function makeBundle(overrides = {}) {
      return Object.assign({
        id: uid(),
        date: Date.now(),
        platform: "",
        totalPrice: 0,
        fee: 0,
        itemIds: []
      }, overrides);
    }

    // ---- migrations: hook for future schema bumps ----
    function migrate(blob) {
      if (!blob || typeof blob !== "object") {
        return { schemaVersion: SCHEMA_VERSION, items: [], bundles: [] };
      }
      // v0/undefined -> v1: ensure required arrays + version exist.
      if (!Array.isArray(blob.items)) blob.items = [];
      if (!Array.isArray(blob.bundles)) blob.bundles = [];
      // (future) if (blob.schemaVersion < 2) { ...transform... }
      blob.schemaVersion = SCHEMA_VERSION;
      return blob;
    }

    // ---- persistence (debounced) ----
    // Debounce coalesces bursts (e.g. per-keystroke listing edits) into one write.
    // Kept short (150ms) to shrink the window where an immediate reload could beat
    // an un-flushed write; flush() on pagehide/hidden covers the rest (SPE-15).
    const PERSIST_DEBOUNCE_MS = 150;
    let persistTimer = null;
    function persist() {
      if (persistTimer) clearTimeout(persistTimer);
      persistTimer = setTimeout(() => {
        persistTimer = null;
        Storage.set(ROOT_KEY, state);
      }, PERSIST_DEBOUNCE_MS);
    }
    // Flush immediately (e.g. before unload). Synchronous on the localStorage
    // backend (write lands before the page tears down); best-effort on the async
    // window.storage backend, where the preceding visibilitychange:hidden flush is
    // the reliable belt.
    async function flush() {
      if (persistTimer) { clearTimeout(persistTimer); persistTimer = null; }
      await Storage.set(ROOT_KEY, state);
    }

    // ---- subscribe / notify ----
    function subscribe(fn) { subscribers.add(fn); return () => subscribers.delete(fn); }
    function notify() { subscribers.forEach(fn => { try { fn(state); } catch (e) { console.error(e); } }); }

    // Internal: any mutation goes through here to keep persist+notify paired.
    function commit() { persist(); notify(); }

    // ---- boot ----
    async function load() {
      const blob = await Storage.get(ROOT_KEY);
      state = migrate(blob);
      ready = true;
      notify();          // first paint with loaded data
      return state;
    }

    // Replace the entire store from an imported backup (SPE-19). Runs the blob
    // through migrate() (which deep-clones nothing but normalizes shape), persists
    // immediately (not debounced — an import is a deliberate, one-shot action),
    // and notifies so every view re-renders. Returns true on success.
    async function replaceAll(blob) {
      try {
        // Clone so we own the object (caller may hold a reference to the parsed file).
        const cloned = JSON.parse(JSON.stringify(blob));
        state = migrate(cloned);
        await flush();   // write through immediately
        notify();
        return true;
      } catch (e) {
        console.error("[AppStore] replaceAll failed:", e);
        return false;
      }
    }

    // ---- read API (return copies of arrays; item objects are shared refs —
    //      treat as read-only, mutate via updateItem) ----
    function getState() { return state; }
    function isReady() { return ready; }

    function getItem(id) { return state.items.find(i => i.id === id) || null; }
    function getBundle(id) { return state.bundles.find(b => b.id === id) || null; }

    /**
     * listItems(filter)
     *   filter omitted            -> all items (newest first)
     *   filter.status = STATUS.x  -> by exact status
     *   filter.active = true      -> ACTIVE inventory view: excludes 'not-listing'
     *                                (invariant I2). By default also excludes sold?
     *                                No — active keeps sold visible; only 'not-listing'
     *                                and nothing else is hidden. Callers refine further.
     */
    function listItems(filter = {}) {
      let out = state.items.slice();
      if (filter.status) out = out.filter(i => i.status === filter.status);
      if (filter.active) out = out.filter(i => i.status !== STATUS.NOT_LISTING);
      out.sort((a, b) => b.createdAt - a.createdAt);
      return out;
    }
    function listBundles() { return state.bundles.slice().sort((a, b) => b.date - a.date); }

    // ---- write API ----
    function addItem(partial = {}) {
      const item = makeItem(partial);
      state.items.push(item);
      commit();
      return item;
    }

    // Shallow-merge patch onto an existing item. Returns updated item or null.
    function updateItem(id, patch) {
      const item = getItem(id);
      if (!item) return null;
      Object.assign(item, patch);
      commit();
      return item;
    }

    function removeItem(id) {
      const n = state.items.length;
      state.items = state.items.filter(i => i.id !== id);
      if (state.items.length !== n) commit();
    }

    function addBundle(partial = {}) {
      const bundle = makeBundle(partial);
      state.bundles.push(bundle);
      commit();
      return bundle;
    }
    function updateBundle(id, patch) {
      const b = getBundle(id);
      if (!b) return null;
      Object.assign(b, patch);
      commit();
      return b;
    }
    function removeBundle(id) {
      const n = state.bundles.length;
      state.bundles = state.bundles.filter(b => b.id !== id);
      if (state.bundles.length !== n) commit();
    }

    return {
      // constants / factories
      STATUS, PLATFORMS, uid, makeItem, makeListing, makeBundle,
      // lifecycle
      load, flush, isReady, subscribe, getState, replaceAll,
      // reads
      getItem, getBundle, listItems, listBundles,
      // writes
      addItem, updateItem, removeItem, addBundle, updateBundle, removeBundle
    };
  })();

  /* ===========================================================================
     [AI LISTING]  — SPE-7. Turn item fields into a listing draft.
     ---------------------------------------------------------------------------
     Live path: window.claude.complete(prompt) -> model text (async). We feature
     -detect it. The prompt asks Claude to research/estimate realistic comparable
     resale prices and reply with ONLY a JSON object of the exact shape:
        { title, description, suggestedPrice, platforms:{poshmark,ebay,mercari,depop} }
     We parse defensively: strip markdown fences, grab the first {...} block,
     JSON.parse in try/catch. On any failure we throw so the UI shows Retry.

     NOTE: complete() takes text only — the photo can't be passed as an image.
     We describe the item from the structured fields and mention that a photo
     exists (so copy can reference "pictured").

     Dev path: when window.claude is absent, MOCK generator returns plausible,
     clearly-labelled placeholder content after a short delay so the whole flow
     is testable locally.
     =========================================================================== */
  const AIListing = (function () {
    // Artifact runtime available?
    function hasClaudeComplete() {
      return typeof window !== "undefined" &&
             window.claude &&
             typeof window.claude.complete === "function";
    }
    // Active provider (SPE-19). Chain: window.claude -> direct API -> mock.
    //   "builtin" -> window.claude.complete   (real research, artifact host)
    //   "api"     -> direct Anthropic Messages API with the user's key
    //   "mock"    -> local placeholder generator
    function mode() {
      if (hasClaudeComplete()) return "builtin";
      if (ApiKey.has()) return "api";
      return "mock";
    }
    // "Live" = produces real research (either built-in or direct API). Kept for
    // callers that only care whether copy will be real vs. mock.
    function isLive() {
      return mode() !== "mock";
    }

    function itemDescriptor(payload) {
      const parts = [];
      if (payload.brand) parts.push("Brand: " + payload.brand);
      if (payload.category) parts.push("Category/type: " + payload.category);
      if (payload.size) parts.push("Size: " + payload.size);
      if (payload.condition) parts.push("Condition: " + (CONDITION_LABELS[payload.condition] || payload.condition));
      parts.push("Seller paid: $" + (Number(payload.costPaid) || 0).toFixed(2) + " to acquire it");
      if (payload.photo) parts.push("A photo of the item is available to the seller (the item is pictured).");
      return parts.join("\n");
    }

    // The exact prompt contract. Kept in one place so SPE-16 can tune copy.
    // When `useWebSearch` is true (direct-API path), instruct the model to run
    // real web-search comparable-price research before pricing.
    function buildPrompt(payload, useWebSearch) {
      const priceTask = useWebSearch
        ? "1. Use web search to research current sold/asking prices for comparable items on\n" +
          "   Poshmark, eBay, Mercari, and Depop before setting suggestedPrice. Pick a single\n" +
          "   suggested list price that is competitive but not underpriced."
        : "1. Research and estimate a realistic comparable resale price (in USD) for this\n" +
          "   item based on its brand, category, and condition on secondhand marketplaces\n" +
          "   (Poshmark, eBay, Mercari, Depop). Pick a single suggested list price that is\n" +
          "   competitive but not underpriced.";
      return [
        "You are an expert secondhand-clothing reseller writing marketplace listings.",
        "",
        "ITEM DETAILS:",
        itemDescriptor(payload),
        "",
        "TASK:",
        priceTask,
        "2. Write a compelling title and description.",
        "3. Write four platform-specific listing texts, each tuned to that platform's culture:",
        "   - poshmark: chatty and friendly, include relevant #hashtags, put the size in the title-like opener.",
        "   - ebay: keyword-stuffed, searchable, include item specifics (brand, size, type, condition, color/material if inferable).",
        "   - mercari: concise and to the point.",
        "   - depop: lowercase, casual, trend-aware, include #hashtags.",
        "",
        "RESPOND WITH ONLY a single JSON object, no prose, no markdown fences, matching EXACTLY:",
        '{',
        '  "title": string,',
        '  "description": string,',
        '  "suggestedPrice": number,',
        '  "platforms": { "poshmark": string, "ebay": string, "mercari": string, "depop": string }',
        '}'
      ].join("\n");
    }

    // Does a parsed object look like our listing (vs. some other JSON, e.g. the
    // nested `platforms` sub-object, a web-search result, or arbitrary prose
    // JSON)? SPE-20: this is the key discriminator that stops the extractor from
    // latching onto the wrong object.
    function looksLikeListing(obj) {
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return false;
      return ("title" in obj) || ("suggestedPrice" in obj) ||
             (obj.platforms && typeof obj.platforms === "object");
    }

    // Scan a string for the balanced {...} object that is our listing.
    // The direct-API web-search path can emit several text blocks and the JSON
    // itself contains a nested `platforms` object, so "last object that parses"
    // is NOT sufficient — it would pick the nested platforms block. We collect
    // every TOP-LEVEL parseable object (skipping any nested inside one we've
    // already consumed) and prefer the last one that looks like a listing;
    // failing that, the last top-level object that parsed at all.
    function extractLastJsonObject(s) {
      let bestListing = null;   // last top-level object with listing shape
      let bestAny = null;       // last top-level object that parsed
      let scanFrom = 0;         // skip past the span of an already-consumed object
      for (let i = 0; i < s.length; i++) {
        if (s[i] !== "{" || i < scanFrom) continue;
        let depth = 0, inStr = false, esc = false;
        for (let j = i; j < s.length; j++) {
          const ch = s[j];
          if (inStr) {
            if (esc) { esc = false; }
            else if (ch === "\\") { esc = true; }
            else if (ch === '"') { inStr = false; }
            continue;
          }
          if (ch === '"') { inStr = true; }
          else if (ch === "{") { depth++; }
          else if (ch === "}") {
            depth--;
            if (depth === 0) {
              const candidate = s.slice(i, j + 1);
              try {
                const obj = JSON.parse(candidate);
                if (obj && typeof obj === "object" && !Array.isArray(obj)) {
                  bestAny = obj;
                  if (looksLikeListing(obj)) bestListing = obj;
                  // Don't descend into this object's nested braces — jump past it.
                  scanFrom = j + 1;
                }
              } catch (_) { /* not valid JSON at this "{"; keep scanning inward */ }
              break;
            }
          }
        }
      }
      return bestListing || bestAny;
    }

    // Defensive parse of the model's text -> listing object (or throw).
    // Accepts either a single string, or the direct-API `content` array (mixed
    // block types) — text blocks are concatenated first.
    function parseResponse(input) {
      let text;
      if (Array.isArray(input)) {
        // content array: keep only text blocks, in order.
        text = input
          .filter(function (b) { return b && b.type === "text" && typeof b.text === "string"; })
          .map(function (b) { return b.text; })
          .join("\n");
      } else {
        text = input;
      }
      if (typeof text !== "string" || !text.trim()) throw new Error("Empty response from AI.");
      let s = text.trim();
      // Strip ```json ... ``` or ``` ... ``` fences.
      s = s.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "");

      // Prefer the LAST balanced JSON object (robust to prose / multiple blocks);
      // fall back to the first-{ to last-} slice for the simple single-object case.
      let obj = extractLastJsonObject(s);
      if (!obj) {
        const start = s.indexOf("{");
        const end = s.lastIndexOf("}");
        if (start === -1 || end === -1 || end <= start) {
          throw new Error("AI response wasn't JSON.");
        }
        try {
          obj = JSON.parse(s.slice(start, end + 1));
        } catch (e) {
          throw new Error("Couldn't parse the AI's JSON.");
        }
      }
      if (!obj || typeof obj !== "object") throw new Error("AI returned no listing.");
      if (!obj.platforms || typeof obj.platforms !== "object") obj.platforms = {};
      return obj;
    }

    async function generateBuiltin(payload) {
      const text = await window.claude.complete(buildPrompt(payload, false));
      return parseResponse(text);
    }

    /* ---- Direct Anthropic Messages API (SPE-19 / SPE-20) ----
       Browser CORS requires anthropic-dangerous-direct-browser-access: true.
       Web search is server-executed; the response content array mixes block
       types (server_tool_use, web_search_tool_result, text, empty thinking).
       We handle pause_turn (server tool loop paused) by re-sending with the
       assistant content appended, up to API_MAX_CONTINUATIONS times, and map
       HTTP errors + stop_reasons to friendly messages.

       SPE-20: we also request structured outputs (output_config.format) so the
       final text block is guaranteed to be exactly the listing JSON. If that
       interacts badly with the web_search tool (a 400 mentioning output_config
       / format), we retry ONCE without it and remember the failure for the rest
       of the session (structuredOutputsBroken) so later generations skip it. And
       we accumulate text blocks across every pause_turn chunk, not just the
       terminal response, so the draft JSON is found even if it arrived earlier. */

    // Session flag: once the API rejects output_config (e.g. web_search combo),
    // stop sending it and fall back to text-scraping for the rest of the session.
    let structuredOutputsBroken = false;

    // JSON schema for the listing. NOTE (SPE-20): no numeric constraints
    // (minimum/maximum) or minLength — those are unsupported by structured
    // outputs and would 400.
    const LISTING_OUTPUT_CONFIG = {
      format: {
        type: "json_schema",
        schema: {
          type: "object",
          properties: {
            title: { type: "string" },
            description: { type: "string" },
            suggestedPrice: { type: "number" },
            platforms: {
              type: "object",
              properties: {
                poshmark: { type: "string" },
                ebay: { type: "string" },
                mercari: { type: "string" },
                depop: { type: "string" }
              },
              required: ["poshmark", "ebay", "mercari", "depop"],
              additionalProperties: false
            }
          },
          required: ["title", "description", "suggestedPrice", "platforms"],
          additionalProperties: false
        }
      }
    };

    // Map a fetch/HTTP failure to a friendly, user-facing message.
    function apiErrorMessage(status) {
      if (status === 401) return "API key looks invalid — check it in Settings.";
      if (status === 429) return "Rate limited — wait a minute and retry.";
      if (status === 529 || (status >= 500 && status < 600)) return "Anthropic is busy — try again.";
      return "The AI request failed (HTTP " + status + "). Try again.";
    }

    // One POST to /v1/messages with a 60s timeout. `body` is the full request
    // object. Returns the parsed JSON response, or throws an Error whose message
    // is already user-friendly.
    async function apiRequest(key, body) {
      const controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
      let timer = null;
      if (controller) timer = setTimeout(function () { controller.abort(); }, API_TIMEOUT_MS);
      let res;
      try {
        res = await fetch(ANTHROPIC_API_URL, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-api-key": key,
            "anthropic-version": ANTHROPIC_VERSION,
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify(body),
          signal: controller ? controller.signal : undefined
        });
      } catch (e) {
        if (timer) clearTimeout(timer);
        if (e && e.name === "AbortError") throw new Error("The AI request timed out. Try again.");
        throw new Error("Couldn't reach Anthropic — check your connection and retry.");
      }
      if (timer) clearTimeout(timer);
      if (!res.ok) {
        // Read the body so callers can inspect the error (SPE-20: detect a 400
        // that names output_config/format so we can retry without it). We still
        // surface a friendly message; the raw text rides along on err.apiBody.
        let bodyText = "";
        try { bodyText = await res.text(); } catch (_) {}
        const err = new Error(apiErrorMessage(res.status));
        err.apiStatus = res.status;
        err.apiBody = bodyText;
        throw err;
      }
      try {
        return await res.json();
      } catch (e) {
        throw new Error("The AI returned an unreadable response. Try again.");
      }
    }

    // SPE-20: does this failure look like the API rejecting output_config/format?
    // (Possible interaction with the web_search tool.) If so we retry once
    // without structured outputs and remember it for the session.
    function isOutputConfigError(err) {
      if (!err || err.apiStatus !== 400) return false;
      const body = (err.apiBody || "").toLowerCase();
      return body.indexOf("output_config") !== -1 || body.indexOf("format") !== -1;
    }

    // SPE-20: persist a redacted debug snapshot of a failed/rejected generation so
    // the user can copy it back to the developer. Overwrites each time; the API
    // key is never part of `response`, so nothing sensitive is stored.
    function captureAiDebug(response) {
      try {
        const content = (response && Array.isArray(response.content)) ? response.content : [];
        const blockTypes = content.map(function (b) {
          return (b && b.type) ? b.type : "unknown";
        });
        const text = content
          .filter(function (b) { return b && b.type === "text" && typeof b.text === "string"; })
          .map(function (b) { return b.text; })
          .join("\n")
          .slice(0, 20000);
        const snapshot = {
          when: new Date().toISOString(),
          stop_reason: (response && response.stop_reason) || null,
          contentBlockTypes: blockTypes,
          text: text
        };
        // Fire-and-forget; storage is async and failure here must not break the flow.
        Storage.set(AI_DEBUG_STORAGE, snapshot);
      } catch (_) { /* debug capture must never throw */ }
    }

    // Build the request body. `useStructured` gates output_config (SPE-20).
    function buildApiBody(messages, useStructured) {
      const body = {
        model: ANTHROPIC_MODEL,
        max_tokens: 8000,
        tools: [{ type: "web_search_20260209", name: "web_search", max_uses: 4 }],
        messages: messages
      };
      if (useStructured) body.output_config = LISTING_OUTPUT_CONFIG;
      return body;
    }

    // Run the pause_turn continuation loop and return the ACCUMULATED content
    // blocks across every chunk (SPE-20 fix 3), plus the terminal response for
    // stop_reason inspection. Throws on terminal error stop_reasons.
    async function runApiLoop(key, messages, useStructured) {
      // Collect ALL content blocks from every response, in order. With structured
      // outputs the draft is in the final chunk anyway, but the fallback path
      // needs earlier chunks in case the JSON landed in a pause_turn chunk.
      const accumulated = [];
      let response = null;

      for (let attempt = 0; attempt <= API_MAX_CONTINUATIONS; attempt++) {
        response = await apiRequest(key, buildApiBody(messages, useStructured));

        if (response && Array.isArray(response.content)) {
          for (let i = 0; i < response.content.length; i++) accumulated.push(response.content[i]);
        }

        const stop = response && response.stop_reason;
        if (stop === "pause_turn") {
          // Server tool loop paused — re-send with the assistant content appended.
          if (attempt >= API_MAX_CONTINUATIONS) {
            throw new Error("The AI took too long researching prices. Try again.");
          }
          messages.push({ role: "assistant", content: response.content });
          continue;
        }
        if (stop === "max_tokens") {
          throw new Error("The AI response was cut off. Try again.");
        }
        if (stop === "refusal") {
          throw new Error("The AI declined to generate this listing.");
        }
        // end_turn (or anything else terminal) — stop looping.
        break;
      }

      if (!response || !Array.isArray(response.content)) {
        throw new Error("The AI returned no listing. Try again.");
      }
      // Return a synthetic response whose content is the accumulated blocks so
      // parseResponse + debug capture see every text block from the whole turn.
      return {
        stop_reason: response.stop_reason,
        content: accumulated,
        _terminal: response
      };
    }

    async function generateApi(payload) {
      const key = ApiKey.get();
      if (!key) throw new Error("No API key configured. Add one in Settings.");

      // Structured outputs guarantee the final text block is the listing JSON —
      // unless we've already learned this session that the API rejects it.
      const useStructured = !structuredOutputsBroken;
      let result;
      try {
        result = await runApiLoop(key, [{ role: "user", content: buildPrompt(payload, true) }], useStructured);
      } catch (err) {
        if (useStructured && isOutputConfigError(err)) {
          // Structured outputs + web_search interaction failed. Remember it for
          // the session and retry ONCE without output_config (graceful degrade).
          structuredOutputsBroken = true;
          result = await runApiLoop(key, [{ role: "user", content: buildPrompt(payload, true) }], false);
        } else {
          throw err;
        }
      }

      try {
        return parseResponse(result.content);
      } catch (parseErr) {
        // Couldn't extract a listing from the accumulated text — snapshot for the
        // user to report, then rethrow so the UI shows the error/retry step.
        captureAiDebug(result);
        throw parseErr;
      }
    }

    // Minimal real request used by the Settings "Test" button. Small, no tools,
    // returns { ok:true } or { ok:false, message } with the mapped error text.
    async function testKey(key) {
      const k = (key == null ? "" : String(key)).trim();
      if (!k) return { ok: false, message: "Enter an API key to test." };
      try {
        await apiRequest(k, {
          model: ANTHROPIC_MODEL,
          max_tokens: 32,
          messages: [{ role: "user", content: "Reply with OK" }]
        });
        return { ok: true };
      } catch (e) {
        return { ok: false, message: (e && e.message) ? e.message : "Test request failed." };
      }
    }

    // ---- MOCK (dev only) — clearly labelled placeholder content. ----
    function generateMock(payload) {
      return new Promise(function (resolve) {
        setTimeout(function () {
          const brand = payload.brand || "Unbranded";
          const cat = payload.category || "item";
          const size = payload.size || "OS";
          const condLabel = CONDITION_LABELS[payload.condition] || payload.condition || "Good";
          const cost = Number(payload.costPaid) || 0;
          // Naive mock price: 3x cost, floored at $12, rounded to .99
          const price = Math.max(12, Math.round(cost * 3)) - 0.01;
          const hashCat = cat.toLowerCase().replace(/[^a-z0-9]+/g, "");
          const hashBrand = brand.toLowerCase().replace(/[^a-z0-9]+/g, "");
          resolve({
            title: brand + " " + cat + " — Size " + size + " (" + condLabel + ")",
            description:
              "[MOCK DRAFT] " + condLabel + " " + brand + " " + cat + " in size " + size + ". " +
              "Great secondhand find, pictured as-is. Smoke-free. Bundle to save on shipping!",
            suggestedPrice: price,
            platforms: {
              poshmark: "Size " + size + " " + brand + " " + cat + "! 💕 " + condLabel +
                        " condition, so cute. Bundle & save! #" + hashBrand + " #" + hashCat + " #poshmark #thrifted",
              ebay: brand + " " + cat + " Size " + size + " Women's " + condLabel +
                    " — Fast Ship (Brand: " + brand + ", Size: " + size + ", Type: " + cat +
                    ", Condition: " + condLabel + ")",
              mercari: brand + " " + cat + ", size " + size + ", " + condLabel + " condition. Ships next day.",
              depop: "*mock* " + brand.toLowerCase() + " " + cat.toLowerCase() + " size " + size.toLowerCase() +
                     " ~ " + condLabel.toLowerCase() + " condition, dm for bundles #" + hashBrand + " #" +
                     hashCat + " #vintage #y2k #thrifted"
            }
          });
        }, 900);
      });
    }

    async function generate(payload) {
      const m = mode();
      if (m === "builtin") return generateBuiltin(payload);
      if (m === "api") return generateApi(payload);
      return generateMock(payload);
    }

    return {
      isLive: isLive, mode: mode, generate: generate,
      buildPrompt: buildPrompt, parseResponse: parseResponse,
      testKey: testKey,
      // SPE-20: debug capture. captureAiDebug stores a redacted snapshot; used by
      // both the parse-failure path (inside generateApi) and the draft-validation
      // path (in the add flow). captureRawDebug builds a snapshot from a plain
      // draft object for the non-API (builtin/mock) validation-failure case.
      captureAiDebug: captureAiDebug,
      captureRawDebug: function (draft, stopReason) {
        try {
          Storage.set(AI_DEBUG_STORAGE, {
            when: new Date().toISOString(),
            stop_reason: stopReason || null,
            contentBlockTypes: [],
            text: (function () {
              try { return JSON.stringify(draft).slice(0, 20000); }
              catch (_) { return ""; }
            })()
          });
        } catch (_) { /* never throw */ }
      }
    };
  })();

  // Human-readable label for the active AI mode (shown in Settings + loading copy).
  function aiModeLabel() {
    switch (AIListing.mode()) {
      case "builtin": return "Claude (built-in)";
      case "api":     return "Claude API (your key)";
      default:        return "Demo mode";
    }
  }

  /* ===========================================================================
     [SETTINGS]  — SPE-19. Modal overlay: API key management, connection test,
     AI mode indicator, and data backup / restore.
     ---------------------------------------------------------------------------
     - API key stored via ApiKey (separate storage key; never in exports).
     - Export: full store (items + bundles + schemaVersion) as a JSON download.
       Includes photo dataURLs (that's the point of a backup). NEVER the key.
     - Import: validate shape defensively, confirm (REPLACES data), load + persist.
     Transient UI scratch lives in settingsState (not persisted).
     =========================================================================== */
  const settingsState = {
    open: false,
    keyInput: "",           // working value of the key field
    feedback: null,         // { kind:'ok'|'err'|'info', msg } test/import result
    confirmImport: null     // { data } parsed import awaiting confirmation
  };

  function openSettings() {
    settingsState.open = true;
    settingsState.keyInput = "";
    settingsState.feedback = null;
    settingsState.confirmImport = null;
    renderSettings();
  }
  function closeSettings() {
    settingsState.open = false;
    const host = document.getElementById("settingsModal");
    if (host) host.remove();
  }

  function settingsModalHTML() {
    const has = ApiKey.has();
    const modeKey = AIListing.mode();
    const fb = settingsState.feedback;

    // ---- AI mode indicator ----
    const modeCard =
      '<div class="card">' +
        '<div class="section-label">AI listing generation</div>' +
        '<span class="mode-indicator ' + modeKey + '"><span class="dot"></span>' +
          escapeHtml(aiModeLabel()) + '</span>' +
        '<div class="privacy-note">' +
          (modeKey === "builtin"
            ? "Running inside the Claude app — listings use Claude with live price research, no key needed."
            : modeKey === "api"
              ? "Using your Anthropic API key with web-search price research."
              : "No AI available — the app generates clearly-labelled demo drafts. Add an API key below to enable real listings.") +
        '</div>' +
      '</div>';

    // ---- API key management ----
    const savedRow = has
      ? '<div class="key-saved-row">' +
          '<span class="masked">' + escapeHtml(ApiKey.masked()) + '</span>' +
          '<button class="btn danger-ghost tiny" type="button" data-act="clear-key">Clear</button>' +
        '</div>'
      : '';

    const keyCard =
      '<div class="card">' +
        '<div class="section-label">Anthropic API key</div>' +
        savedRow +
        '<div class="field">' +
          '<label>' + (has ? "Replace key" : "Paste your key") + '</label>' +
          '<input id="apiKeyInput" type="password" autocomplete="off" autocapitalize="none" ' +

    // ---- Backup / restore ----
    let importBlock;
    if (settingsState.confirmImport) {
      const d = settingsState.confirmImport.data;

      const nBundles = (d.bundles || []).length;
